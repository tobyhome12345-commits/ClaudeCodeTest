<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; cursor: default; }
    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: #a8dadc;
      border: 1px solid #1a3a6a; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }

    /* ── Mobile D-pad (touch devices only) ─────────────────── */
    #m-dpad {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    @media (pointer: coarse) { #m-dpad { display: flex; } }
    .dpad-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    .dpad-btn {
      width: 68px; height: 68px;
      background: rgba(192,132,252,0.18);
      border: 2px solid rgba(192,132,252,0.5);
      border-radius: 14px;
      color: rgba(255,255,255,0.85);
      font-size: 1.7rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: rgba(192,132,252,0.42); }
    .dpad-gap { width: 68px; height: 68px; }
  </style>
</head>
<body>
<a id="hub-btn" href="index.html">&#8592; Hub</a>
<canvas id="canvas"></canvas>
<script>
// ─── Layout ───────────────────────────────────────────────────────────────────
const CELL = 24;
const COLS = 22;
const ROWS = 19;
const HDR  = 68;
const W    = COLS * CELL;        // 528
const H    = ROWS * CELL + HDR;  // 524

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

function applyScale() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
applyScale();
window.addEventListener('resize', applyScale);

// ─── Difficulty configs ───────────────────────────────────────────────────────
const DIFFICULTIES = [
  {
    id: 'easy',
    label: 'EASY',
    color: '#69f0ae',
    desc: 'Walls wrap around  ·  Slower speed',
    wrapWalls: true,
    speedMult: 0.72,
  },
  {
    id: 'medium',
    label: 'MEDIUM',
    color: '#ffab40',
    desc: 'Walls kill  ·  Normal speed',
    wrapWalls: false,
    speedMult: 1.0,
  },
  {
    id: 'hard',
    label: 'HARD',
    color: '#ff4444',
    desc: 'Walls kill  ·  1.5× faster',
    wrapWalls: false,
    speedMult: 1.55,
  },
];

function diffConfig() {
  return DIFFICULTIES.find(d => d.id === difficulty) || DIFFICULTIES[1];
}

// ─── Speed levels (score-based) ───────────────────────────────────────────────
const STEP_RATES = [
  { threshold: 0,  rate: 7  },
  { threshold: 5,  rate: 8  },
  { threshold: 12, rate: 9  },
  { threshold: 22, rate: 11 },
  { threshold: 35, rate: 13 },
  { threshold: 50, rate: 15 },
  { threshold: 70, rate: 18 },
];
const LEVEL_COLORS = ['#69f0ae','#b2ff59','#ffff00','#ffab40','#ff6d00','#ff4444','#ff00ff'];

function getStepRate(sc) {
  let r = STEP_RATES[0].rate;
  for (const t of STEP_RATES) if (sc >= t.threshold) r = t.rate;
  return r * diffConfig().speedMult;
}
function getLevel(sc) {
  let lv = 1;
  for (let i = 1; i < STEP_RATES.length; i++) if (sc >= STEP_RATES[i].threshold) lv = i + 1;
  return lv;
}

// ─── State ────────────────────────────────────────────────────────────────────
let state      = 'select'; // select | playing | paused | dead
let difficulty = 'medium';
let snake      = [];
let dir        = { x:1, y:0 };
let pendDir    = null;
let food       = null;
let bonus      = null;
let score      = 0;
let best       = parseInt(localStorage.getItem('snakeBest') || '0', 10);
let stepTimer  = 0;
let gameTime   = 0;
let deathFlash = 0;
let ateFlash   = 0;
let scorePopups = [];
let mouseX = 0, mouseY = 0;

// ─── Init ─────────────────────────────────────────────────────────────────────
function initGame() {
  const sx = Math.floor(COLS / 2), sy = Math.floor(ROWS / 2);
  snake       = [{ x:sx, y:sy }, { x:sx-1, y:sy }, { x:sx-2, y:sy }];
  dir         = { x:1, y:0 };
  pendDir     = null;
  score       = 0;
  stepTimer   = 0;
  gameTime    = 0;
  bonus       = null;
  deathFlash  = 0;
  ateFlash    = 0;
  scorePopups = [];
  food        = spawnFood();
  state       = 'playing';
}

function spawnFood() {
  let cell;
  do { cell = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
  while (snake.some(s => s.x===cell.x && s.y===cell.y) ||
         (bonus && bonus.x===cell.x && bonus.y===cell.y));
  return { x:cell.x, y:cell.y, value:1 };
}

function spawnBonus() {
  let cell, tries = 0;
  do {
    cell = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
    if (++tries > 200) return null;
  } while (snake.some(s => s.x===cell.x && s.y===cell.y) ||
           (food && food.x===cell.x && food.y===cell.y));
  return { x:cell.x, y:cell.y, value:3, ttl:9.0 };
}

// ─── Input ────────────────────────────────────────────────────────────────────
const DIRS = {
  arrowup:'up', w:'up', arrowdown:'down', s:'down',
  arrowleft:'left', a:'left', arrowright:'right', d:'right',
};
const OPP = { up:'down', down:'up', left:'right', right:'left' };

function curDirName() {
  if (dir.x===1)  return 'right';
  if (dir.x===-1) return 'left';
  if (dir.y===1)  return 'down';
  return 'up';
}
function nameToDir(n) {
  return ({right:{x:1,y:0},left:{x:-1,y:0},up:{x:0,y:-1},down:{x:0,y:1}})[n];
}

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === ' ' || k === 'enter') {
    e.preventDefault();
    if (state === 'dead')   { state = 'select'; return; }
    if (state === 'paused') { state = 'playing'; return; }
    return;
  }
  if (k === 'p' || k === 'escape') {
    e.preventDefault();
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
    return;
  }
  const d = DIRS[k];
  if (!d) return;
  e.preventDefault();
  if (state === 'playing') {
    const cur = curDirName();
    if (d !== cur && d !== OPP[cur]) pendDir = d;
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top)  * (H / rect.height);
  canvas.style.cursor = (state === 'select' && getHoveredDiff() !== null) ? 'pointer' : 'default';
});

function getDiffBtnRect(i) {
  const bw = 300, bh = 72, gap = 14;
  const total = DIFFICULTIES.length * bh + (DIFFICULTIES.length - 1) * gap;
  const startY = HDR + (H - HDR - total) / 2 - 16;
  return { x: (W - bw) / 2, y: startY + i * (bh + gap), w: bw, h: bh };
}

function getHoveredDiff() {
  for (let i = 0; i < DIFFICULTIES.length; i++) {
    const r = getDiffBtnRect(i);
    if (mouseX >= r.x && mouseX <= r.x+r.w && mouseY >= r.y && mouseY <= r.y+r.h)
      return i;
  }
  return null;
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (W / rect.width);
  const cy = (e.clientY - rect.top)  * (H / rect.height);

  if (state === 'select') {
    for (let i = 0; i < DIFFICULTIES.length; i++) {
      const r = getDiffBtnRect(i);
      if (cx >= r.x && cx <= r.x+r.w && cy >= r.y && cy <= r.y+r.h) {
        difficulty = DIFFICULTIES[i].id;
        initGame();
        return;
      }
    }
    return;
  }
  if (state === 'dead')   { state = 'select'; return; }
  if (state === 'paused') { state = 'playing'; return; }
});

// ─── Game step ────────────────────────────────────────────────────────────────
function step() {
  if (pendDir) { dir = nameToDir(pendDir); pendDir = null; }

  const head = snake[0];
  let nx = head.x + dir.x;
  let ny = head.y + dir.y;

  if (diffConfig().wrapWalls) {
    nx = ((nx % COLS) + COLS) % COLS;
    ny = ((ny % ROWS) + ROWS) % ROWS;
  } else {
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { killSnake(); return; }
  }

  // Self collision (skip tail tip — it moves away this same tick)
  for (let i = 0; i < snake.length - 1; i++) {
    if (snake[i].x === nx && snake[i].y === ny) { killSnake(); return; }
  }

  snake.unshift({ x:nx, y:ny });
  let grew = false;

  if (food && nx === food.x && ny === food.y) {
    addScore(food.value, nx, ny);
    food = spawnFood();
    grew = true;
    ateFlash = 1;
    if (!bonus && Math.random() < 0.28) {
      const b = spawnBonus();
      if (b) bonus = b;
    }
  }
  if (bonus && nx === bonus.x && ny === bonus.y) {
    addScore(bonus.value, nx, ny);
    bonus = null;
    grew = true;
    ateFlash = 1;
  }

  if (!grew) snake.pop();
}

function addScore(v, gx, gy) {
  score += v;
  if (score > best) { best = score; localStorage.setItem('snakeBest', best); }
  scorePopups.push({ x: gx*CELL+CELL/2, y: HDR+gy*CELL, text:'+'+v, t:1.0,
                     color: v > 1 ? '#ffd740' : '#69f0ae' });
}

function killSnake() {
  state      = 'dead';
  deathFlash = 1.0;
}

// ─── Colour helpers ───────────────────────────────────────────────────────────
function hexToRgb(h) {
  const v = parseInt(h.replace('#',''), 16);
  return [(v>>16)&0xff, (v>>8)&0xff, v&0xff];
}
function lerpRgb(a, b, t) {
  return a.map((c,i) => Math.round(c*(1-t)+b[i]*t));
}
const HEAD_RGB = hexToRgb('#00e676');
const MID_RGB  = hexToRgb('#00b248');
const TAIL_RGB = hexToRgb('#004d20');

function snakeColor(i, len) {
  const t = i / Math.max(len-1, 1);
  const rgb = t < 0.5 ? lerpRgb(HEAD_RGB, MID_RGB, t*2) : lerpRgb(MID_RGB, TAIL_RGB, (t-0.5)*2);
  return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawBackground() {
  const hg = ctx.createLinearGradient(0,0,0,HDR);
  hg.addColorStop(0,'#06090f'); hg.addColorStop(1,'#0d121e');
  ctx.fillStyle = hg;
  ctx.fillRect(0,0,W,HDR);

  ctx.fillStyle = '#080d14';
  ctx.fillRect(0,HDR,W,H-HDR);

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth   = 0.5;
  for (let c=0; c<=COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL,HDR); ctx.lineTo(c*CELL,H); ctx.stroke();
  }
  for (let r=0; r<=ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0,HDR+r*CELL); ctx.lineTo(W,HDR+r*CELL); ctx.stroke();
  }

  ctx.strokeStyle = '#1a3a6a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0,HDR); ctx.lineTo(W,HDR); ctx.stroke();

  // Border glow — difficulty colour on select screen, level colour in-game
  let lcol;
  if (state === 'select') {
    lcol = '#a8dadc';
  } else {
    const lv = getLevel(state === 'playing' || state === 'paused' ? score : 0);
    lcol = LEVEL_COLORS[Math.min(lv-1, LEVEL_COLORS.length-1)];
  }
  ctx.strokeStyle = lcol + '55'; ctx.lineWidth = 3;
  ctx.strokeRect(1.5, HDR+1.5, W-3, H-HDR-3);
}

function drawHUD() {
  // Left: SNAKE label
  ctx.fillStyle = '#00e676';
  ctx.font      = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('SNAKE', 16, 20);

  // Left: difficulty badge (only during play)
  if (state === 'playing' || state === 'paused' || state === 'dead') {
    const dc = diffConfig();
    ctx.fillStyle   = dc.color + '28';
    ctx.strokeStyle = dc.color + '88';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.roundRect(14, 26, 56, 18, 9); ctx.fill();
    ctx.beginPath(); ctx.roundRect(14, 26, 56, 18, 9); ctx.stroke();
    ctx.fillStyle = dc.color;
    ctx.font      = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(dc.label, 42, 39);
  }

  // Centre: score
  const sc = state === 'select' ? 0 : score;
  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 30px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(sc, W/2, 46);

  // Right: best
  ctx.fillStyle = '#4a5880';
  ctx.font      = 'bold 10px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('BEST', W-16, 22);
  ctx.fillStyle = '#7986a8';
  ctx.font      = 'bold 16px sans-serif';
  ctx.fillText(best, W-16, 42);

  // Speed level badge (right of center, playing only)
  if (state === 'playing' || state === 'paused') {
    const lv   = getLevel(score);
    const lcol = LEVEL_COLORS[Math.min(lv-1, LEVEL_COLORS.length-1)];
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(W/2+32, HDR/2-12, 46, 22, 11); ctx.fill();
    ctx.fillStyle = lcol;
    ctx.font      = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`LVL ${lv}`, W/2+55, HDR/2+4);
  }

  // Controls hint
  ctx.fillStyle = '#222d42';
  ctx.font      = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('WASD / ↑↓←→  ·  [P] Pause', 16, 61);

  ctx.textAlign = 'left';
}

function drawSnake() {
  const len  = snake.length;
  const dead = state === 'dead';
  const flash = dead ? Math.max(0, deathFlash) : 1;

  for (let i = len-1; i >= 0; i--) {
    const seg    = snake[i];
    const isHead = i === 0;
    const pad    = isHead ? 1 : 2;
    const x      = seg.x * CELL + pad;
    const y      = HDR + seg.y * CELL + pad;
    const sz     = CELL - pad * 2;
    const rad    = isHead ? 7 : 5;

    ctx.save();
    if (dead) {
      ctx.globalAlpha = flash;
      ctx.fillStyle   = Math.floor(deathFlash*10)%2 ? '#e94560' : '#3a0010';
    } else {
      ctx.fillStyle = snakeColor(i, len);
      if (isHead) { ctx.shadowColor='#00e676'; ctx.shadowBlur = ateFlash>0 ? 22 : 10; }
    }
    ctx.beginPath(); ctx.roundRect(x,y,sz,sz,rad); ctx.fill();

    // Eyes
    if (isHead && !dead) {
      ctx.shadowBlur = 0;
      const cx = seg.x*CELL+CELL/2, cy = HDR+seg.y*CELL+CELL/2;
      const ex = dir.y!==0 ? 5:0, ey = dir.x!==0 ? 5:0;
      const fx = dir.x*3, fy = dir.y*3;
      const e1x=cx+fx-ex, e1y=cy+fy-ey, e2x=cx+fx+ex, e2y=cy+fy+ey;
      ctx.fillStyle='#052010';
      ctx.beginPath(); ctx.arc(e1x,e1y,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x,e2y,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(e1x+0.8,e1y-0.8,1.2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x+0.8,e2y-0.8,1.2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // Tongue flick
  if (!dead && snake.length > 0) {
    const head = snake[0];
    if (Math.sin(gameTime*14) > 0.2) {
      const tx = head.x*CELL+CELL/2 + dir.x*(CELL/2+4);
      const ty = HDR+head.y*CELL+CELL/2 + dir.y*(CELL/2+4);
      ctx.strokeStyle='#ff4060'; ctx.lineWidth=1.5; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(tx-dir.x*4, ty-dir.y*4);
      ctx.lineTo(tx+dir.x*3-dir.y*4, ty+dir.y*3-dir.x*4);
      ctx.moveTo(tx-dir.x*4, ty-dir.y*4);
      ctx.lineTo(tx+dir.x*3+dir.y*4, ty+dir.y*3+dir.x*4);
      ctx.stroke();
    }
  }
}

function drawFood() {
  if (!food) return;
  const cx = food.x*CELL+CELL/2, cy = HDR+food.y*CELL+CELL/2;
  const r  = CELL*0.32 + Math.sin(gameTime*4.5)*1.8;
  ctx.save();
  ctx.shadowColor='#ff4081'; ctx.shadowBlur=16;
  ctx.fillStyle='#ff4081';
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle='#fce4ec';
  ctx.beginPath(); ctx.arc(cx-r*0.28,cy-r*0.28,r*0.38,0,Math.PI*2); ctx.fill();
}

function drawBonus() {
  if (!bonus) return;
  const cx = bonus.x*CELL+CELL/2, cy = HDR+bonus.y*CELL+CELL/2;
  const r  = CELL*0.34 + Math.sin(gameTime*6)*2;
  const frac = Math.min(1, bonus.ttl/2);
  ctx.save();
  ctx.globalAlpha=frac;
  ctx.shadowColor='#ffd740'; ctx.shadowBlur=20;
  ctx.fillStyle='#ffd740';
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff8e1';
  ctx.beginPath(); ctx.arc(cx-r*0.25,cy-r*0.25,r*0.36,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#4a3000'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
  ctx.fillText('+3',cx,cy+3.5);
  ctx.restore();
  ctx.textAlign='left';
}

function drawScorePopups() {
  for (const p of scorePopups) {
    ctx.save();
    ctx.globalAlpha=p.t; ctx.fillStyle=p.color;
    ctx.font='bold 15px sans-serif'; ctx.textAlign='center';
    ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.fillText(p.text,p.x,p.y);
    ctx.restore();
  }
  ctx.textAlign='left';
}

// ─── Difficulty select screen ──────────────────────────────────────────────────
function drawDifficultySelect() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, HDR, W, H-HDR);

  // Title
  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('CHOOSE DIFFICULTY', W/2, HDR + 44);

  const hov = getHoveredDiff();

  DIFFICULTIES.forEach((diff, i) => {
    const r     = getDiffBtnRect(i);
    const isHov = hov === i;

    ctx.save();
    ctx.globalAlpha = isHov ? 1 : 0.82;

    // Card bg
    ctx.fillStyle = isHov ? 'rgba(255,255,255,0.09)' : 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 12); ctx.fill();

    // Border
    ctx.strokeStyle = diff.color + (isHov ? 'cc' : '55');
    ctx.lineWidth   = isHov ? 2 : 1;
    ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 12); ctx.stroke();

    // Left accent bar
    ctx.fillStyle = diff.color;
    ctx.beginPath(); ctx.roundRect(r.x, r.y, 5, r.h, [12,0,0,12]); ctx.fill();

    // Label
    ctx.fillStyle = diff.color;
    ctx.font      = 'bold 17px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(diff.label, r.x+20, r.y+28);

    // Description
    ctx.fillStyle = '#8896b0';
    ctx.font      = '12px sans-serif';
    ctx.fillText(diff.desc, r.x+20, r.y+50);

    // Arrow
    if (isHov) {
      ctx.fillStyle = diff.color;
      ctx.font      = 'bold 16px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('▶', r.x+r.w-14, r.y+r.h/2+6);
    }
    ctx.restore();
  });

  ctx.textAlign = 'left';
}

// ─── Generic overlay panel ─────────────────────────────────────────────────────
function drawPanel(title, lines, accentColor, hint) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, HDR, W, H-HDR);

  const pw = 310, ph = 58 + lines.length*34 + 28;
  const px = (W-pw)/2, py = HDR + (H-HDR-ph)/2;

  ctx.fillStyle = '#060a12';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.fill();
  ctx.strokeStyle = accentColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.stroke();

  ctx.fillStyle = accentColor;
  ctx.font      = 'bold 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(title, W/2, py+44);

  ctx.fillStyle = '#b0b8cc';
  ctx.font      = '14px sans-serif';
  lines.forEach((l,i) => ctx.fillText(l, W/2, py+78+i*34));

  ctx.fillStyle = '#2e3850';
  ctx.font      = '12px sans-serif';
  ctx.fillText(hint || 'Click or [Space] to continue', W/2, py+ph-11);
  ctx.textAlign = 'left';
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lastTs = 0;

function loop(ts) {
  const dt = Math.min((ts-lastTs)/1000, 0.1);
  lastTs = ts;

  if (state === 'playing') {
    gameTime  += dt;
    stepTimer += dt;
    ateFlash   = Math.max(0, ateFlash - dt*5);

    const interval = 1 / getStepRate(score);
    if (stepTimer >= interval) { stepTimer -= interval; step(); }

    if (bonus) { bonus.ttl -= dt; if (bonus.ttl <= 0) bonus = null; }

    for (const p of scorePopups) { p.t -= dt*1.8; p.y -= dt*35; }
    scorePopups = scorePopups.filter(p => p.t > 0);
  }

  if (state === 'dead') {
    deathFlash -= dt*2.5;
    for (const p of scorePopups) { p.t -= dt*1.8; p.y -= dt*35; }
    scorePopups = scorePopups.filter(p => p.t > 0);
  }

  // Draw
  drawBackground();

  if (state !== 'select') {
    drawFood();
    drawBonus();
    drawSnake();
    drawScorePopups();
  }

  drawHUD();

  if (state === 'select') {
    drawDifficultySelect();
  } else if (state === 'paused') {
    drawPanel('PAUSED', ['Press [P] or click to continue'], '#a8dadc');
  } else if (state === 'dead' && deathFlash <= 0) {
    const newBest = score >= best && score > 0;
    drawPanel(
      newBest ? 'NEW BEST! \uD83C\uDFC6' : 'GAME OVER',
      [`Score: ${score}`, `Best: ${best}`],
      newBest ? '#ffd740' : '#e94560',
      'Click or [Space] to choose difficulty'
    );
  }

  requestAnimationFrame(loop);
}

// ─── Start ────────────────────────────────────────────────────────────────────
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });

// ─── Mobile D-pad ─────────────────────────────────────────────────────────────
function mobileDir(name) {
  if (state === 'dead')   { state = 'select'; return; }
  if (state === 'paused') { state = 'playing'; return; }
  if (state !== 'playing') return;
  const cur = curDirName();
  if (name !== cur && name !== OPP[cur]) pendDir = name;
}
['up','down','left','right'].forEach(d => {
  const btn = document.getElementById('md-' + d);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); mobileDir(d); }, { passive: false });
});
</script>

<!-- Mobile D-pad -->
<div id="m-dpad">
  <div class="dpad-row"><button class="dpad-btn" id="md-up">▲</button></div>
  <div class="dpad-row">
    <button class="dpad-btn" id="md-left">◀</button>
    <div class="dpad-gap"></div>
    <button class="dpad-btn" id="md-right">▶</button>
  </div>
  <div class="dpad-row"><button class="dpad-btn" id="md-down">▼</button></div>
</div>

</body>
