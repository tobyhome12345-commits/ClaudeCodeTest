<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Crosser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; }

    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: #a8dadc;
      border: 1px solid #1a3a6a; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }

    /* ── Mobile D-pad (touch only) ──────────────────────────── */
    #m-dpad {
      display: none;
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      flex-direction: column; align-items: center; gap: 5px;
      pointer-events: none;
    }
    @media (pointer: coarse) { #m-dpad { display: flex; } }
    .dpad-row { display: flex; align-items: center; gap: 5px; }
    .dpad-btn {
      pointer-events: all;
      width: 72px; height: 72px;
      background: rgba(0,200,160,0.14);
      border: 2px solid rgba(0,200,160,0.5);
      border-radius: 16px;
      color: rgba(255,255,255,0.88);
      font-size: 1.9rem;
      display: flex; align-items: center; justify-content: center;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .dpad-btn:active { background: rgba(0,200,160,0.34); }
    .dpad-gap { width: 72px; height: 72px; }
  </style>
</head>
<body>

<a id="hub-btn" href="index.html">&#8592; Hub</a>
<canvas id="canvas"></canvas>

<div id="m-dpad">
  <div class="dpad-row">
    <button class="dpad-btn" id="m-up">▲</button>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="m-left">◀</button>
    <div class="dpad-gap"></div>
    <button class="dpad-btn" id="m-right">▶</button>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="m-down">▼</button>
  </div>
</div>

<script>
// ── Canvas / scaling ─────────────────────────────────────────────
const W = 480, H = 640;
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

function scaleCanvas() {
  const s = Math.min(window.innerWidth / W, (window.innerHeight) / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// ── Grid constants ────────────────────────────────────────────────
// 480 × 640:  top 64 px = HUD,  remaining 576 = 12 rows × 48 px
const TILE   = 48;
const COLS   = 10;
const ROWS   = 12;
const HUD_H  = H - ROWS * TILE;           // 64 px
const rowY   = r => HUD_H + r * TILE;

// ── Lane definitions ──────────────────────────────────────────────
// row 0 = goal, row 6 = safe median, row 11 = start — no cars
const LANE_DEFS = [
  { row:  1, dir:  1, spd: 125, color: '#f87060', count: 2, len: 1 },
  { row:  2, dir: -1, spd:  95, color: '#60c0f8', count: 3, len: 1 },
  { row:  3, dir:  1, spd:  75, color: '#f0c030', count: 2, len: 2 },
  { row:  4, dir: -1, spd: 100, color: '#c084fc', count: 3, len: 1 },
  { row:  5, dir:  1, spd: 115, color: '#ff8844', count: 2, len: 1 },
  // row 6 = median safe zone
  { row:  7, dir: -1, spd: 120, color: '#f87060', count: 2, len: 1 },
  { row:  8, dir:  1, spd:  80, color: '#5af0a0', count: 3, len: 2 },
  { row:  9, dir: -1, spd:  70, color: '#60c0f8', count: 2, len: 1 },
  { row: 10, dir:  1, spd: 105, color: '#c084fc', count: 3, len: 1 },
];
const ROAD_ROWS = new Set(LANE_DEFS.map(l => l.row));

// ── Game state ────────────────────────────────────────────────────
let gameState = 'title';   // title | playing | dead | win | gameover
let score, hiScore = 0, lives, level;
let player, cars, particles, stateTimer;
let lastTime = 0;

// ── Input ─────────────────────────────────────────────────────────
function tryMove(dx, dy) {
  if (gameState === 'title' || gameState === 'gameover') { startGame(); return; }
  if (gameState !== 'playing' || !player.alive) return;
  player.col = Math.max(0, Math.min(COLS - 1, player.col + dx));
  player.row = Math.max(0, Math.min(ROWS - 1, player.row + dy));
  if (player.row === 0) onGoal();
}

window.addEventListener('keydown', e => {
  const code = e.code;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','Enter'].includes(code))
    e.preventDefault();
  if (code === 'ArrowUp'    || code === 'KeyW') tryMove( 0, -1);
  if (code === 'ArrowDown'  || code === 'KeyS') tryMove( 0,  1);
  if (code === 'ArrowLeft'  || code === 'KeyA') tryMove(-1,  0);
  if (code === 'ArrowRight' || code === 'KeyD') tryMove( 1,  0);
  if (code === 'Space' || code === 'Enter') {
    if (gameState === 'title' || gameState === 'gameover') startGame();
  }
});

function bindDpad(id, dx, dy) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const go = e => { e.preventDefault(); tryMove(dx, dy); };
  btn.addEventListener('touchstart', go, { passive: false });
  btn.addEventListener('mousedown',  go);
}
bindDpad('m-up',    0, -1);
bindDpad('m-down',  0,  1);
bindDpad('m-left', -1,  0);
bindDpad('m-right', 1,  0);

canvas.addEventListener('click',    () => { if (gameState === 'title' || gameState === 'gameover') startGame(); });
canvas.addEventListener('touchend', e  => { e.preventDefault(); if (gameState === 'title' || gameState === 'gameover') startGame(); }, { passive: false });

// ── Factories ─────────────────────────────────────────────────────
function makePlayer() {
  return { col: 4, row: 11, alive: true };
}

function makeCars(lvl) {
  const out = [];
  const mult = 1 + (lvl - 1) * 0.2;
  for (const def of LANE_DEFS) {
    const gap = W / def.count;
    for (let i = 0; i < def.count; i++) {
      const offset = Math.random() * gap * 0.6;
      const sx = def.dir > 0 ? i * gap + offset : W - (i * gap + offset);
      out.push({
        row:   def.row,
        x:     sx,
        w:     def.len * TILE - 6,
        spd:   def.spd * mult * def.dir,
        color: def.color,
      });
    }
  }
  return out;
}

// ── Events ────────────────────────────────────────────────────────
function startGame(fresh = true) {
  if (fresh) { score = 0; lives = 3; level = 1; }
  player     = makePlayer();
  cars       = makeCars(level);
  particles  = [];
  stateTimer = 0;
  gameState  = 'playing';
}

function onGoal() {
  score += 100 + level * 50;
  if (score > hiScore) hiScore = score;
  burst(player.col * TILE + TILE / 2, rowY(0) + TILE / 2, '#00ff50', 26);
  player.alive  = false;
  gameState     = 'win';
  stateTimer    = 1.5;
}

function onHit() {
  burst(player.col * TILE + TILE / 2, rowY(player.row) + TILE / 2, '#f87060', 22);
  player.alive = false;
  lives--;
  gameState    = 'dead';
  stateTimer   = 1.1;
}

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 55 + Math.random() * 210;
    const t = 0.35 + Math.random() * 0.55;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: t, maxLife: t, r: 2 + Math.random()*3, color });
  }
}

// ── Update ────────────────────────────────────────────────────────
function update(dt) {
  // Cars always scroll (animated even on overlays)
  for (const c of cars) {
    c.x += c.spd * dt;
    if (c.spd > 0 && c.x > W + TILE)        c.x = -c.w;
    if (c.spd < 0 && c.x < -c.w - TILE)     c.x = W;
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.91; p.vy *= 0.91; p.life -= dt;
    return p.life > 0;
  });

  if (gameState === 'playing' && player.alive) {
    // Collision: player footprint vs car rects (pixel-based)
    const px1 = player.col * TILE + 7;
    const px2 = (player.col + 1) * TILE - 7;
    for (const c of cars) {
      if (c.row !== player.row) continue;
      if (px1 < c.x + c.w - 4 && px2 > c.x + 4) { onHit(); return; }
    }
  }

  if (gameState === 'dead' || gameState === 'win') {
    stateTimer -= dt;
    if (stateTimer <= 0) {
      if (gameState === 'dead') {
        if (lives <= 0) gameState = 'gameover';
        else            startGame(false);
      } else {
        level++;
        startGame(false);
      }
    }
  }
}

// ── Drawing helpers ───────────────────────────────────────────────
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y,   x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x,   y+h, x,   y+h-r);
  ctx.lineTo(x, y+r);   ctx.quadraticCurveTo(x,   y,   x+r, y);
  ctx.closePath();
}

// ── Draw: background ─────────────────────────────────────────────
function drawBg() {
  // HUD strip
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.strokeStyle = 'rgba(0,200,160,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(W, HUD_H); ctx.stroke();

  // Goal row
  ctx.fillStyle = '#051a05';
  ctx.fillRect(0, rowY(0), W, TILE);
  ctx.fillStyle = 'rgba(0,255,80,0.07)';
  ctx.fillRect(0, rowY(0), W, TILE);
  ctx.strokeStyle = 'rgba(0,255,80,0.45)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, rowY(1)); ctx.lineTo(W, rowY(1)); ctx.stroke();

  // Road rows
  ctx.setLineDash([10, 12]);
  for (let r = 1; r <= 10; r++) {
    if (r === 6) continue;
    const col = r % 2 === 0 ? '#0f0f22' : '#0d0d1a';
    ctx.fillStyle = col;
    ctx.fillRect(0, rowY(r), W, TILE);
    ctx.strokeStyle = 'rgba(255,220,50,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, rowY(r)); ctx.lineTo(W, rowY(r)); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Median safe zone
  ctx.fillStyle = '#0e0e28';
  ctx.fillRect(0, rowY(6), W, TILE);
  ctx.fillStyle = 'rgba(100,100,255,0.06)';
  ctx.fillRect(0, rowY(6), W, TILE);
  ctx.strokeStyle = 'rgba(120,120,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, rowY(6));   ctx.lineTo(W, rowY(6));   ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, rowY(7));   ctx.lineTo(W, rowY(7));   ctx.stroke();

  // Start zone
  ctx.fillStyle = '#051a05';
  ctx.fillRect(0, rowY(11), W, TILE);
  ctx.fillStyle = 'rgba(0,255,80,0.04)';
  ctx.fillRect(0, rowY(11), W, TILE);
  ctx.strokeStyle = 'rgba(0,255,80,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, rowY(11)); ctx.lineTo(W, rowY(11)); ctx.stroke();

  // Row labels
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,255,80,0.45)';
  ctx.font      = 'bold 11px monospace';
  ctx.letterSpacing = '4px';
  ctx.fillText('GOAL', W/2, rowY(0) + TILE/2 + 4);
  ctx.letterSpacing = '0px';
  ctx.fillStyle = 'rgba(120,120,255,0.32)';
  ctx.font      = '11px monospace';
  ctx.fillText('SAFE ZONE', W/2, rowY(6) + TILE/2 + 4);
}

// ── Draw: cars ────────────────────────────────────────────────────
function drawCar(c) {
  const y = rowY(c.row);
  ctx.save();
  ctx.shadowColor = c.color;
  ctx.shadowBlur  = 12;
  ctx.fillStyle   = c.color + '28';
  rrect(c.x + 2, y + 5, c.w - 4, TILE - 10, 7);
  ctx.fill();
  ctx.strokeStyle = c.color;
  ctx.lineWidth   = 1.8;
  rrect(c.x + 2, y + 5, c.w - 4, TILE - 10, 7);
  ctx.stroke();
  // windshield highlight
  ctx.globalAlpha = 0.5;
  ctx.fillStyle   = c.color;
  ctx.shadowBlur  = 0;
  const ww = Math.min(c.w * 0.26, 16);
  const wx = c.spd > 0 ? c.x + c.w - ww - 7 : c.x + 7;
  ctx.fillRect(wx, y + 9, ww, TILE - 18);
  ctx.restore();
}

// ── Draw: player ──────────────────────────────────────────────────
function drawPlayer() {
  if (!player || !player.alive) return;
  const cx = player.col * TILE + TILE / 2;
  const cy = rowY(player.row) + TILE / 2;
  const r  = TILE * 0.31;
  ctx.save();
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur  = 22;
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth   = 2.5;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(0,255,255,0.11)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle  = '#00ffff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(cx,          cy - r * 0.62);
  ctx.lineTo(cx - r*0.4,  cy + r * 0.32);
  ctx.lineTo(cx + r*0.4,  cy + r * 0.32);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ── Draw: particles ───────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 9;
    ctx.fillStyle   = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Draw: HUD ─────────────────────────────────────────────────────
function drawHUD() {
  ctx.save();
  ctx.shadowBlur = 0;
  const midY = HUD_H / 2 + 6;

  // Score
  ctx.fillStyle  = '#e8eaf6';
  ctx.font       = 'bold 16px monospace';
  ctx.textAlign  = 'left';
  ctx.fillText(`${score}`, 16, midY);

  // Hi-score
  ctx.fillStyle = '#334';
  ctx.font      = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`HI  ${hiScore}`, W / 2, midY);

  // Lives (hearts)
  ctx.textAlign = 'right';
  const hearts = '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3 - lives));
  ctx.fillStyle  = '#f87060';
  ctx.shadowColor = '#f87060';
  ctx.shadowBlur  = 6;
  ctx.font        = '18px monospace';
  ctx.fillText(hearts, W - 16, midY);

  // Level badge
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = 'rgba(192,132,252,0.18)';
  rrect(W/2 - 30, midY - 20, 60, 24, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(192,132,252,0.4)';
  ctx.lineWidth   = 1;
  rrect(W/2 - 30, midY - 20, 60, 24, 12);
  ctx.stroke();
  ctx.fillStyle   = '#c084fc';
  ctx.font        = 'bold 11px monospace';
  ctx.textAlign   = 'center';
  ctx.fillText(`LV ${level}`, W/2, midY - 4);

  ctx.restore();
}

// ── Draw: overlays ────────────────────────────────────────────────
function overlay(title, sub, hint, titleColor) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,20,0.82)';
  ctx.fillRect(0, 0, W, H);
  ctx.shadowColor = titleColor || '#00ffff';
  ctx.shadowBlur  = 28;
  ctx.fillStyle   = titleColor || '#00ffff';
  ctx.font        = 'bold 2.6rem monospace';
  ctx.textAlign   = 'center';
  ctx.fillText(title, W/2, H/2 - 32);
  ctx.shadowBlur = 0;
  if (sub) {
    ctx.fillStyle = '#a8dadc';
    ctx.font      = '1rem monospace';
    ctx.fillText(sub, W/2, H/2 + 14);
  }
  if (hint) {
    ctx.fillStyle = '#445';
    ctx.font      = '0.75rem monospace';
    ctx.fillText(hint, W/2, H/2 + 46);
  }
  ctx.restore();
}

function drawDeadFlash() {
  const alpha = Math.min(1, stateTimer * 2.5) * 0.55;
  ctx.save();
  ctx.fillStyle = `rgba(0,0,20,${alpha})`;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle   = '#f87060';
  ctx.shadowColor = '#f87060';
  ctx.shadowBlur  = 20;
  ctx.font        = 'bold 2rem monospace';
  ctx.textAlign   = 'center';
  ctx.fillText('OUCH!', W/2, H/2 - 10);
  ctx.shadowBlur = 0;
  ctx.fillStyle  = '#888';
  ctx.font       = '0.85rem monospace';
  const rem = lives > 0 ? `${lives} ${lives === 1 ? 'life' : 'lives'} remaining` : 'No lives left…';
  ctx.fillText(rem, W/2, H/2 + 24);
  ctx.restore();
}

function drawWinFlash() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,20,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle   = '#00ff50';
  ctx.shadowColor = '#00ff50';
  ctx.shadowBlur  = 24;
  ctx.font        = 'bold 2rem monospace';
  ctx.textAlign   = 'center';
  ctx.fillText('NICE!', W/2, H/2 - 10);
  ctx.shadowBlur = 0;
  ctx.fillStyle  = '#888';
  ctx.font       = '0.85rem monospace';
  ctx.fillText(`+${100 + level * 50} pts  ·  Level ${level + 1} up…`, W/2, H/2 + 24);
  ctx.restore();
}

// ── Game loop ──────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  update(dt);

  ctx.clearRect(0, 0, W, H);
  drawBg();
  if (cars)       for (const c of cars) drawCar(c);
  drawParticles();
  drawPlayer();
  drawHUD();

  if      (gameState === 'title')    overlay('CROSSER', 'Dodge the traffic · reach the GOAL', '↑↓←→  ·  WASD  ·  tap the d-pad');
  else if (gameState === 'dead')     drawDeadFlash();
  else if (gameState === 'win')      drawWinFlash();
  else if (gameState === 'gameover') overlay('GAME OVER', `Score: ${score}  ·  Reached level ${level}`, 'Tap or press any key to retry', '#f87060');

  requestAnimationFrame(loop);
}

// ── Bootstrap ─────────────────────────────────────────────────────
score = 0; hiScore = 0; lives = 3; level = 1;
player = makePlayer();
cars = makeCars(1);
particles = [];

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
