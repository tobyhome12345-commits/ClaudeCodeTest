<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000011; overflow: hidden; width: 100vw; height: 100vh; font-family: monospace; }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(0,0,0,0.82);
      color: #0ff; font-family: monospace; z-index: 20;
    }
    #overlay h1 {
      font-size: clamp(2.2rem, 8vw, 3.5rem);
      letter-spacing: 10px;
      text-shadow: 0 0 30px #0ff, 0 0 60px rgba(0,255,255,0.3);
    }
    #overlay .edition { color: #c084fc; font-size: 0.8rem; letter-spacing: 5px; margin-top: -10px; }
    #overlay .controls {
      color: #aaa; font-size: 0.82rem; line-height: 2.2;
      text-align: center; border: 1px solid #1a3a6a;
      padding: 1rem 2rem; border-radius: 10px;
      background: rgba(0,0,50,0.4);
    }
    #overlay .controls span { color: #0ff; }
    .btn {
      background: transparent; border: 2px solid #0ff;
      color: #0ff; font-family: monospace; font-size: 0.95rem;
      padding: 0.65rem 2.4rem; cursor: pointer; letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 0.2s; border-radius: 4px;
    }
    .btn:hover { background: rgba(0,255,255,0.12); box-shadow: 0 0 24px rgba(0,255,255,0.5); }
    #overlay.hidden { display: none; }
    #home {
      position: fixed; bottom: 18px; left: 18px;
      color: #444; font-size: 0.7rem; letter-spacing: 1px;
      text-decoration: none; z-index: 30;
      transition: color 0.2s;
    }
    #home:hover { color: #0ff; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>ASTEROIDS</h1>
  <div class="edition">NEON EDITION</div>
  <div class="controls">
    <span>← →</span> &nbsp; Rotate &nbsp;&nbsp;&nbsp; <span>↑ / W</span> &nbsp; Thrust<br>
    <span>SPACE</span> &nbsp; Fire &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <span>P</span> &nbsp;&nbsp;&nbsp;&nbsp; Pause
  </div>
  <button class="btn" id="startBtn">LAUNCH</button>
</div>

<a id="home" href="index.html">← GAME HUB</a>

<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

// ── Resize ──────────────────────────────────────────────────────
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ───────────────────────────────────────────────────
const SHIP_SIZE    = 16;
const THRUST_ACC   = 230;
const ROTATE_SPD   = 3.8;
const FRICTION     = 0.988;
const BULLET_SPD   = 530;
const BULLET_TTL   = 1.1;
const BULLET_MAX   = 6;
const INVINCIBLE_T = 2.8;
const SAFE_R       = 120;
const BASE_ROIDS   = 4;

const ROID_DATA = [
  { r: 42, spd: 55,  score: 20, verts: 9,  color: '#c084fc' },
  { r: 22, spd: 105, score: 50, verts: 7,  color: '#a8dadc' },
  { r: 11, spd: 165, score: 100, verts: 6, color: '#e8d5f0' },
];

// ── Input ───────────────────────────────────────────────────────
const keys = {};
let   fireReady = true;

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'Space' && fireReady) { tryFire(); fireReady = false; }
  if (e.code === 'KeyP') { if (gameState === 'playing') gameState = 'paused'; else if (gameState === 'paused') gameState = 'playing'; }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space') fireReady = true;
});

// ── State ───────────────────────────────────────────────────────
let gameState = 'start';
let score, hiScore = 0, lives, wave;
let ship, bullets, asteroids, particles;
let lastTime = 0;

// ── Factories ────────────────────────────────────────────────────
function makeShip() {
  return { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, thrusting: false, invTimer: INVINCIBLE_T };
}

function makeAsteroid(x, y, si) {
  const d = ROID_DATA[si];
  const ang = Math.random() * Math.PI * 2;
  const spd = d.spd * (0.65 + Math.random() * 0.7);
  const verts   = d.verts;
  const offsets = Array.from({ length: verts }, () => 0.65 + Math.random() * 0.65);
  return {
    x, y,
    vx: Math.cos(ang) * spd,
    vy: Math.sin(ang) * spd,
    r: d.r, si, verts, offsets,
    rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 1.4,
  };
}

function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 55 + Math.random() * 195;
    const life = 0.45 + Math.random() * 0.75;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life, maxLife: life, r: 1.4 + Math.random()*2.2, color });
  }
}

// ── Helpers ──────────────────────────────────────────────────────
function d2(ax, ay, bx, by) { const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }

function wrap(obj) {
  const pad = 65;
  if (obj.x < -pad)    obj.x += W + pad*2;
  if (obj.x > W+pad)   obj.x -= W + pad*2;
  if (obj.y < -pad)    obj.y += H + pad*2;
  if (obj.y > H+pad)   obj.y -= H + pad*2;
}

function shipTip(s) {
  return { x: s.x + Math.cos(s.angle)*SHIP_SIZE, y: s.y + Math.sin(s.angle)*SHIP_SIZE };
}

// ── Game actions ──────────────────────────────────────────────────
function tryFire() {
  if (gameState !== 'playing') return;
  if (bullets.length >= BULLET_MAX) return;
  if (ship.invTimer > 0) return;
  const tip = shipTip(ship);
  bullets.push({ x: tip.x, y: tip.y, vx: Math.cos(ship.angle)*BULLET_SPD + ship.vx, vy: Math.sin(ship.angle)*BULLET_SPD + ship.vy, ttl: BULLET_TTL });
}

function spawnWave() {
  const count = BASE_ROIDS + wave - 1;
  for (let i = 0; i < count; i++) {
    let x, y, tries = 0;
    do {
      x = Math.random() * W;
      y = Math.random() * H;
      tries++;
    } while (tries < 50 && d2(x, y, ship.x, ship.y) < (SAFE_R + ROID_DATA[0].r) ** 2);
    asteroids.push(makeAsteroid(x, y, 0));
  }
}

function killShip() {
  burst(ship.x, ship.y, '#0ff', 20);
  burst(ship.x, ship.y, '#fff', 10);
  lives--;
  if (lives <= 0) {
    if (score > hiScore) hiScore = score;
    gameState = 'gameover';
    showOverlay(`GAME OVER`, `Score: ${score}  ·  Wave: ${wave}`, 'PLAY AGAIN');
  } else {
    ship = makeShip();
    ship.invTimer = INVINCIBLE_T;
  }
}

function startGame() {
  score = 0; lives = 3; wave = 1;
  ship = makeShip();
  bullets = []; asteroids = []; particles = [];
  spawnWave();
  gameState = 'playing';
  overlay.classList.add('hidden');
}

function showOverlay(title, sub, btnLabel) {
  overlay.innerHTML = `
    <h1>${title}</h1>
    <div class="edition" style="color:#a8dadc;margin-top:-8px">${sub}</div>
    <button class="btn" id="startBtn">${btnLabel}</button>
  `;
  document.getElementById('startBtn').addEventListener('click', startGame);
  overlay.classList.remove('hidden');
}

// ── Update ───────────────────────────────────────────────────────
function update(dt) {
  // Ship
  if (keys['ArrowLeft']  || keys['KeyA']) ship.angle -= ROTATE_SPD * dt;
  if (keys['ArrowRight'] || keys['KeyD']) ship.angle += ROTATE_SPD * dt;
  ship.thrusting = !!(keys['ArrowUp'] || keys['KeyW']);
  if (ship.thrusting) {
    ship.vx += Math.cos(ship.angle) * THRUST_ACC * dt;
    ship.vy += Math.sin(ship.angle) * THRUST_ACC * dt;
  }
  const fr = Math.pow(FRICTION, dt * 60);
  ship.vx *= fr; ship.vy *= fr;
  ship.x  += ship.vx * dt; ship.y += ship.vy * dt;
  wrap(ship);
  if (ship.invTimer > 0) ship.invTimer -= dt;

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx * dt; b.y += b.vy * dt; b.ttl -= dt; wrap(b);
    return b.ttl > 0;
  });

  // Asteroids
  for (const a of asteroids) {
    a.x += a.vx * dt; a.y += a.vy * dt; a.rot += a.rotSpd * dt; wrap(a);
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life -= dt;
    return p.life > 0;
  });

  // Bullet × Asteroid
  const deadB = new Set(), deadA = new Set(), newRoids = [];
  for (let i = 0; i < bullets.length; i++) {
    for (let j = 0; j < asteroids.length; j++) {
      if (deadA.has(j)) continue;
      const b = bullets[i], a = asteroids[j];
      if (d2(b.x, b.y, a.x, a.y) < a.r * a.r) {
        deadB.add(i); deadA.add(j);
        score += ROID_DATA[a.si].score;
        burst(a.x, a.y, ROID_DATA[a.si].color, 6 + (2 - a.si) * 5);
        if (a.si < 2) {
          newRoids.push(makeAsteroid(a.x, a.y, a.si + 1));
          newRoids.push(makeAsteroid(a.x, a.y, a.si + 1));
        }
      }
    }
  }
  bullets   = bullets.filter((_, i) => !deadB.has(i));
  asteroids = asteroids.filter((_, i) => !deadA.has(i));
  asteroids.push(...newRoids);

  // Ship × Asteroid
  if (ship.invTimer <= 0) {
    for (const a of asteroids) {
      if (d2(ship.x, ship.y, a.x, a.y) < (a.r + SHIP_SIZE * 0.65) ** 2) {
        killShip(); break;
      }
    }
  }

  // Wave clear
  if (asteroids.length === 0) {
    wave++;
    ship.invTimer = INVINCIBLE_T;
    spawnWave();
  }
}

// ── Draw ──────────────────────────────────────────────────────────
function glow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }

function drawShip(s) {
  if (s.invTimer > 0 && Math.floor(s.invTimer * 9) % 2 === 0) return;
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  glow('#0ff', 14);
  ctx.beginPath();
  ctx.moveTo(SHIP_SIZE, 0);
  ctx.lineTo(-SHIP_SIZE * 0.68, SHIP_SIZE * 0.58);
  ctx.lineTo(-SHIP_SIZE * 0.38, 0);
  ctx.lineTo(-SHIP_SIZE * 0.68, -SHIP_SIZE * 0.58);
  ctx.closePath();
  ctx.stroke();
  // Thruster flame
  if (s.thrusting && Math.random() > 0.25) {
    const flicker = 6 + Math.random() * 11;
    ctx.strokeStyle = `hsl(${20 + Math.random()*30|0},100%,60%)`;
    glow('#f80', 12);
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(-SHIP_SIZE * 0.38, SHIP_SIZE * 0.24);
    ctx.lineTo(-SHIP_SIZE * 0.38 - flicker, 0);
    ctx.lineTo(-SHIP_SIZE * 0.38, -SHIP_SIZE * 0.24);
    ctx.stroke();
  }
  ctx.restore();
}

function drawAsteroid(a) {
  const d = ROID_DATA[a.si];
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.strokeStyle = d.color;
  ctx.lineWidth = 1.8;
  glow(d.color, 10);
  ctx.beginPath();
  for (let i = 0; i <= a.verts; i++) {
    const ang = (i / a.verts) * Math.PI * 2;
    const r   = a.r * a.offsets[i % a.verts];
    i === 0 ? ctx.moveTo(Math.cos(ang)*r, Math.sin(ang)*r)
            : ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
  }
  ctx.stroke();
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = '#ff0';
  glow('#ff0', 10);
  ctx.beginPath();
  ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
  ctx.fillStyle = p.color;
  glow(p.color, 8);
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.shadowBlur = 0;

  // Score
  ctx.fillStyle = '#e8eaf6';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(score, 22, 38);

  // Hi-score
  ctx.fillStyle = '#555';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`HI  ${hiScore}`, W/2, 28);

  // Wave
  ctx.fillStyle = '#c084fc';
  ctx.textAlign = 'right';
  ctx.fillText(`WAVE  ${wave}`, W - 22, 28);
  ctx.textAlign = 'left';

  // Lives (mini ship icons)
  for (let i = 0; i < lives; i++) {
    const lx = W - 22 - i * 24, ly = 50;
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(-Math.PI / 2);
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 1.5;
    glow('#0ff', 6);
    ctx.beginPath();
    ctx.moveTo(9, 0);
    ctx.lineTo(-6, 5.5);
    ctx.lineTo(-3.5, 0);
    ctx.lineTo(-6, -5.5);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,30,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 3rem monospace';
  ctx.textAlign = 'center';
  glow('#0ff', 20);
  ctx.fillText('PAUSED', W/2, H/2);
  ctx.font = '0.95rem monospace';
  ctx.fillStyle = '#888';
  ctx.shadowBlur = 0;
  ctx.fillText('P  ·  resume', W/2, H/2 + 42);
  ctx.textAlign = 'left';
}

// ── Game loop ─────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.fillStyle = '#000011';
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'playing' || gameState === 'paused') {
    if (gameState === 'playing') update(dt);
    for (const p of particles)  drawParticle(p);
    for (const b of bullets)    drawBullet(b);
    for (const a of asteroids)  drawAsteroid(a);
    drawShip(ship);
    drawHUD();
    if (gameState === 'paused') drawPauseScreen();
  }

  requestAnimationFrame(loop);
}

// ── Bootstrap ─────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
