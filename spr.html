<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scissors Paper Rock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:   #0d0d1a;
      --mid:    #16213e;
      --panel:  #0f1f3d;
      --border: #1a3a6a;
      --text:   #e8eaf6;
      --muted:  #7986a8;
      --red:    #e94560;
      --blue:   #a8dadc;
      --green:  #5a9449;
      --yellow: #f0c030;
      --teal:   #00c8a0;
      --purple: #c084fc;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── Hub button ── */
    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: var(--blue);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: var(--blue); color: #fff; }

    /* ── Page wrapper ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 80px 20px 40px;
    }

    /* ── Title ── */
    .title-badge {
      font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--teal); border: 1px solid var(--teal);
      border-radius: 20px; padding: 0.26rem 0.9rem;
      margin-bottom: 1.1rem; opacity: 0.85;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800; letter-spacing: 2px;
      text-align: center; line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    h1 .accent { color: var(--teal); }
    .subtitle {
      font-size: 0.95rem; color: var(--muted);
      text-align: center; line-height: 1.6;
      margin-bottom: 1.6rem;
    }

    /* ── Divider ── */
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      border-radius: 2px; margin: 0 auto 1.8rem;
    }

    /* ── Scoreboard ── */
    .scoreboard {
      display: flex;
      gap: 1.2rem;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 420px;
    }
    .score-block {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 0.8rem;
      text-align: center;
    }
    .score-block.player { border-color: rgba(0,200,160,0.35); }
    .score-block.cpu    { border-color: rgba(233,69,96,0.35); }
    .score-block.draws  { border-color: rgba(240,192,48,0.35); }
    .score-label {
      font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.35rem;
    }
    .score-value {
      font-size: 2.2rem; font-weight: 800; line-height: 1;
    }
    .score-block.player .score-value { color: var(--teal); }
    .score-block.cpu    .score-value { color: var(--red); }
    .score-block.draws  .score-value { color: var(--yellow); }

    /* ── Choice buttons ── */
    .choices-label {
      font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1.1rem; text-align: center;
    }
    .choices {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .choice-btn {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 1.4rem 1.2rem 1.1rem;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      text-align: center;
      min-width: 110px;
      user-select: none;
    }
    .choice-btn:hover {
      transform: translateY(-6px);
    }
    .choice-btn[data-choice="scissors"]:hover {
      border-color: var(--red);
      box-shadow: 0 14px 35px rgba(233,69,96,0.25);
    }
    .choice-btn[data-choice="paper"]:hover {
      border-color: var(--blue);
      box-shadow: 0 14px 35px rgba(168,218,220,0.2);
    }
    .choice-btn[data-choice="rock"]:hover {
      border-color: var(--teal);
      box-shadow: 0 14px 35px rgba(0,200,160,0.25);
    }
    .choice-btn:active { transform: scale(0.93); }
    .choice-btn.disabled { pointer-events: none; opacity: 0.4; }

    .choice-emoji {
      font-size: 3rem; line-height: 1;
      margin-bottom: 0.5rem;
      display: block;
    }
    .choice-name {
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .choice-btn[data-choice="scissors"] .choice-name { color: var(--red); }
    .choice-btn[data-choice="paper"]    .choice-name { color: var(--blue); }
    .choice-btn[data-choice="rock"]     .choice-name { color: var(--teal); }

    /* ── Battle arena ── */
    .arena {
      width: 100%; max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.4rem 1.2rem;
      margin-bottom: 1.6rem;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
    }
    .arena.hidden { visibility: hidden; }

    .arena-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 100%;
    }
    .arena-side {
      flex: 1;
      text-align: center;
    }
    .arena-who {
      font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.3rem;
    }
    .arena-emoji {
      font-size: 3.5rem; line-height: 1;
      display: block;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    .arena-emoji.pop { animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .arena-vs {
      font-size: 1.1rem; font-weight: 800;
      color: var(--border); letter-spacing: 2px;
      flex-shrink: 0;
    }

    .arena-result {
      font-size: 1.4rem; font-weight: 800;
      text-align: center;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .arena-result.win  { color: var(--teal); }
    .arena-result.lose { color: var(--red); }
    .arena-result.draw { color: var(--yellow); }

    .arena-sub {
      font-size: 0.82rem; color: var(--muted);
      text-align: center;
    }

    /* ── Waiting state ── */
    .arena-prompt {
      font-size: 0.9rem; color: var(--muted);
      text-align: center;
    }

    /* ── Reset button ── */
    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 0.55rem 1.5rem;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; font-family: inherit;
      transition: border-color 0.2s, color 0.2s, transform 0.12s;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); transform: scale(1.03); }

    @media (max-width: 400px) {
      .choices { gap: 0.6rem; }
      .choice-btn { min-width: 90px; padding: 1.1rem 0.8rem 0.9rem; }
      .choice-emoji { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<a id="hub-btn" href="index.html">&#8592; Hub</a>

<div class="page">

  <div class="title-badge">Classic Game</div>
  <h1>Scissors<br><span class="accent">Paper Rock</span></h1>
  <p class="subtitle">Pick your move. Beat the computer.<br>Scissors cuts Paper · Paper covers Rock · Rock crushes Scissors.</p>
  <div class="divider"></div>

  <!-- ── Scoreboard ── -->
  <div class="scoreboard">
    <div class="score-block player">
      <div class="score-label">You</div>
      <div class="score-value" id="score-player">0</div>
    </div>
    <div class="score-block draws">
      <div class="score-label">Draws</div>
      <div class="score-value" id="score-draws">0</div>
    </div>
    <div class="score-block cpu">
      <div class="score-label">CPU</div>
      <div class="score-value" id="score-cpu">0</div>
    </div>
  </div>

  <!-- ── Choice buttons ── -->
  <p class="choices-label">Choose your move</p>
  <div class="choices" id="choices">
    <button class="choice-btn" data-choice="scissors" onclick="play('scissors')">
      <span class="choice-emoji">✂️</span>
      <span class="choice-name">Scissors</span>
    </button>
    <button class="choice-btn" data-choice="paper" onclick="play('paper')">
      <span class="choice-emoji">📄</span>
      <span class="choice-name">Paper</span>
    </button>
    <button class="choice-btn" data-choice="rock" onclick="play('rock')">
      <span class="choice-emoji">🪨</span>
      <span class="choice-name">Rock</span>
    </button>
  </div>

  <!-- ── Battle arena ── -->
  <div class="arena hidden" id="arena">
    <div class="arena-row">
      <div class="arena-side">
        <div class="arena-who">You</div>
        <span class="arena-emoji" id="arena-player"></span>
      </div>
      <div class="arena-vs">VS</div>
      <div class="arena-side">
        <div class="arena-who">CPU</div>
        <span class="arena-emoji" id="arena-cpu"></span>
      </div>
    </div>
    <div class="arena-result" id="arena-result"></div>
    <div class="arena-sub" id="arena-sub"></div>
  </div>

  <button class="btn-reset" onclick="resetScores()">Reset Scores</button>

</div>

<script>
// ── Starfield ─────────────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H, stars;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function makeStars() {
    return Array.from({ length: 160 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.3 + 0.2,
      spd: Math.random() * 0.18 + 0.04,
      alpha: Math.random() * 0.55 + 0.08,
      dA: (Math.random() - 0.5) * 0.007,
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.alpha = Math.max(0.05, Math.min(0.75, s.alpha + s.dA));
      if (s.alpha <= 0.05 || s.alpha >= 0.75) s.dA *= -1;
      s.y += s.spd;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(168,218,220,${s.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize(); stars = makeStars();
  window.addEventListener('resize', () => { resize(); stars = makeStars(); });
  draw();
})();

// ── Game logic ────────────────────────────────────────────────────────
const CHOICES = ['scissors', 'paper', 'rock'];
const EMOJI = { scissors: '✂️', paper: '📄', rock: '🪨' };

// beats[a] === b means a beats b
const BEATS = { scissors: 'paper', paper: 'rock', rock: 'scissors' };

const RESULT_TEXT = {
  win:  { label: 'You Win! 🎉', css: 'win' },
  lose: { label: 'CPU Wins! 💀', css: 'lose' },
  draw: { label: "It's a Draw! 🤝", css: 'draw' },
};

const SUB_TEXT = {
  'scissors-paper':   'Scissors cuts Paper',
  'paper-rock':       'Paper covers Rock',
  'rock-scissors':    'Rock crushes Scissors',
};

let scores = { player: 0, cpu: 0, draws: 0 };
let locked = false;

function play(playerChoice) {
  if (locked) return;
  locked = true;

  // Disable buttons briefly
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));

  const cpuChoice = CHOICES[Math.floor(Math.random() * 3)];

  // Show arena
  const arena = document.getElementById('arena');
  arena.classList.remove('hidden');

  // Animate CPU "thinking" with shuffle
  const cpuEl = document.getElementById('arena-cpu');
  const playerEl = document.getElementById('arena-player');
  const resultEl = document.getElementById('arena-result');
  const subEl = document.getElementById('arena-sub');

  // Clear previous result
  resultEl.textContent = '';
  subEl.textContent = '';
  playerEl.classList.remove('pop');
  cpuEl.classList.remove('pop');

  // Show player choice immediately
  playerEl.textContent = EMOJI[playerChoice];
  void playerEl.offsetWidth; // reflow
  playerEl.classList.add('pop');

  // Shuffle CPU display
  let shuffles = 0;
  const shuffleInterval = setInterval(() => {
    cpuEl.textContent = EMOJI[CHOICES[Math.floor(Math.random() * 3)]];
    shuffles++;
    if (shuffles >= 8) {
      clearInterval(shuffleInterval);
      // Reveal actual CPU choice
      cpuEl.textContent = EMOJI[cpuChoice];
      void cpuEl.offsetWidth;
      cpuEl.classList.add('pop');

      // Determine result
      let outcome;
      if (playerChoice === cpuChoice) {
        outcome = 'draw';
      } else if (BEATS[playerChoice] === cpuChoice) {
        outcome = 'win';
      } else {
        outcome = 'lose';
      }

      // Update scores
      if (outcome === 'win')  scores.player++;
      else if (outcome === 'lose') scores.cpu++;
      else scores.draws++;

      updateScoreDisplay();

      // Show result text
      setTimeout(() => {
        const r = RESULT_TEXT[outcome];
        resultEl.textContent = r.label;
        resultEl.className = 'arena-result ' + r.css;

        // Sub text for wins/losses
        const key = outcome === 'win'
          ? `${playerChoice}-${cpuChoice}`
          : outcome === 'lose'
          ? `${cpuChoice}-${playerChoice}`
          : null;
        subEl.textContent = key && SUB_TEXT[key] ? SUB_TEXT[key] : '';

        // Re-enable after short delay
        setTimeout(() => {
          document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('disabled'));
          locked = false;
        }, 400);
      }, 150);
    }
  }, 80);
}

function updateScoreDisplay() {
  document.getElementById('score-player').textContent = scores.player;
  document.getElementById('score-cpu').textContent    = scores.cpu;
  document.getElementById('score-draws').textContent  = scores.draws;
}

function resetScores() {
  scores = { player: 0, cpu: 0, draws: 0 };
  updateScoreDisplay();
  document.getElementById('arena').classList.add('hidden');
  document.getElementById('arena-result').textContent = '';
  document.getElementById('arena-sub').textContent = '';
}
</script>
</body>
</html>
