<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      cursor: crosshair;
      display: block;
    }
    #back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      background: rgba(13,13,26,0.82);
      color: #a8dadc;
      border: 1px solid #1a3a6a;
      border-radius: 20px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-decoration: none;
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    #back-btn:hover {
      background: rgba(168,218,220,0.12);
      border-color: #a8dadc;
      color: #fff;
    }
  </style>
</head>
<body>
<a id="back-btn" href="index.html">&#8592; Hub</a>
<canvas id="gameCanvas" width="800" height="600"></canvas>

  return {
    hp:    Math.min(1 + (wave - 1) * 0.15, 5),
    speed: Math.min(1 + (wave - 1) * 0.04, 2.0),
  };

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ============================================================
// INPUT
// ============================================================
const keys = {};
const mouse = { x: CANVAS_W / 2, y: CANVAS_H / 2, down: false };

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyR' && game.state === 'gameover') resetGame();
  if (e.code === 'Space' && game.state === 'shop') closeShop();
  if (e.code === 'KeyF' && game.state === 'playing') placeTrap('spike_trap');
  if (e.code === 'KeyG' && game.state === 'playing') placeTrap('mine');
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
  mouse.y = (e.clientY - rect.top)  * (CANVAS_H / rect.height);
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup',   e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
  const my = (e.clientY - rect.top)  * (CANVAS_H / rect.height);
  if (game.state === 'shop') {
    for (const area of shop.clickAreas) {
      if (mx >= area.x && mx <= area.x + area.w && my >= area.y && my <= area.y + area.h) {
        area.action();
        break;
      }
    }
    return;
  }
  if (game.state === 'gameover') resetGame();
});

// ============================================================
// UTILITY
// ============================================================
function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function drawSprite(ctx, sprite, x, y, cellSize, angle) {
  ctx.save();
  ctx.translate(x, y);
  if (angle) ctx.rotate(angle);
  const rows = sprite.length;
  const cols = sprite[0].length;
  const ox = -(cols * cellSize) / 2;
  const oy = -(rows * cellSize) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = sprite[r][c];
      if (!idx) continue;
      ctx.fillStyle = PALETTE[idx];
      ctx.fillRect(ox + c * cellSize, oy + r * cellSize, cellSize, cellSize);
    }
  }
  ctx.restore();
}

function drawHealthBar(ctx, cx, y, w, h, frac) {
  ctx.fillStyle = '#222';
  ctx.fillRect(cx - w / 2, y, w, h);
  let color;
  if (frac > 0.6) color = PALETTE[14];
  else if (frac > 0.3) color = PALETTE[4];
  else color = PALETTE[13];
  ctx.fillStyle = color;
  ctx.fillRect(cx - w / 2, y, Math.max(0, w * frac), h);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - w / 2, y, w, h);
}

// ============================================================
// MAP BACKGROUNDS
// ============================================================
function drawBackground(ctx) {
  switch (game.currentMap) {
    case 'map_desert':  drawDesertBg(ctx);  break;
    case 'map_dungeon': drawDungeonBg(ctx); break;
    case 'map_ice':     drawIceBg(ctx);     break;
    default:            drawDefaultBg(ctx); break;
  }
}

function drawDefaultBg(ctx) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CANVAS_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= CANVAS_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }
}

function drawDesertBg(ctx) {
  ctx.fillStyle = '#c8a96e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = '#b8956a';
  for (let x = 0; x < CANVAS_W; x += 80) {
    for (let y = 0; y < CANVAS_H; y += 80) {
      if ((Math.floor(x / 80) + Math.floor(y / 80)) % 2 === 0) ctx.fillRect(x, y, 80, 80);
    }
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CANVAS_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= CANVAS_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }
}

function drawDungeonBg(ctx) {
  ctx.fillStyle = '#1e1e1e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = '#2a2a2a';
  for (let y = 0; y < CANVAS_H; y += 32) {
    const offset = (Math.floor(y / 32) % 2 === 0) ? 0 : 24;
    for (let x = -24 + offset; x < CANVAS_W; x += 48) {
      ctx.fillRect(x + 1, y + 1, 46, 30);
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CANVAS_W; x += 48) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= CANVAS_H; y += 32) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }
}

function drawIceBg(ctx) {
  ctx.fillStyle = '#cce7ff';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = '#b8d9f5';
  for (let x = 0; x < CANVAS_W; x += 60) {
    for (let y = 0; y < CANVAS_H; y += 60) {
      if ((Math.floor(x / 60) + Math.floor(y / 60)) % 3 === 0) ctx.fillRect(x, y, 58, 58);
    }
  }
  ctx.strokeStyle = 'rgba(100,160,220,0.15)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CANVAS_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= CANVAS_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }
}

// ============================================================
// PLAYER
// ============================================================
class Player {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.hp = PLAYER_MAX_HP;
    this.maxHp = PLAYER_MAX_HP;
    this.angle = 0;
    this.vx = 0; this.vy = 0;
    this.lastFired = 0;
    this.invincibleUntil = 0;
    this.alive = true;
    this.muzzleFlash = 0;
  }

  get speed() { return PLAYER_BASE_SPEED + game.speedBonus; }

  update(dt, now) {
    let dx = 0, dy = 0;
    if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
    if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
    if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
    if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }

    const targetVx = dx * this.speed;
    const targetVy = dy * this.speed;

    if (game.currentMap === 'map_ice') {
      this.vx += (targetVx - this.vx) * 0.07;
      this.vy += (targetVy - this.vy) * 0.07;
    } else {
      this.vx = targetVx;
      this.vy = targetVy;
    }

    this.x = Math.max(PLAYER_RADIUS, Math.min(CANVAS_W - PLAYER_RADIUS, this.x + this.vx));
    this.y = Math.max(PLAYER_RADIUS, Math.min(CANVAS_H - PLAYER_RADIUS, this.y + this.vy));

    this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);

    // Weapon switching: keys 1-5
    const wKeys = ['Digit1','Digit2','Digit3','Digit4','Digit5'];
    for (let i = 0; i < wKeys.length; i++) {
      if (keys[wKeys[i]]) {
        const wid = WEAPON_ORDER[i];
        if (game.ownedWeapons.has(wid)) game.currentWeapon = wid;
      }
    }

    const w = WEAPONS[game.currentWeapon];
    const adjustedRate = Math.floor(w.fireRate * game.fireRateMultiplier);
    if (mouse.down && now - this.lastFired >= adjustedRate) {
      const bx = this.x + Math.cos(this.angle) * 20;
      const by = this.y + Math.sin(this.angle) * 20;
      for (let p = 0; p < w.pellets; p++) {
        const spreadAngle = this.angle + (Math.random() - 0.5) * w.spread * 2;
        bullets.push(createBullet(bx, by, spreadAngle, w.bulletSpeed, w.damage, w.bulletSize, false, PALETTE[w.colorIdx], w.pierce));
      }
      this.lastFired = now;
      this.muzzleFlash = now + 60;
    }
  }

  takeDamage(amount, now) {
    if (now < this.invincibleUntil) return;
    this.hp -= amount;
    this.invincibleUntil = now + PLAYER_INVINCIBILITY_MS;
    if (this.hp <= 0) { this.hp = 0; this.alive = false; }
  }

  draw(ctx, now) {
    const flickering = now < this.invincibleUntil;
    if (flickering) ctx.globalAlpha = Math.sin(now / 50) > 0 ? 1 : 0.3;

    drawSprite(ctx, PLAYER_SPRITE, this.x, this.y, CELL, this.angle - Math.PI / 2);

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    const w = WEAPONS[game.currentWeapon];
    ctx.fillStyle = PALETTE[12];
    if (w.pellets > 1) {
      ctx.fillRect(8, -5, 12, 4);
      ctx.fillRect(8,  1, 12, 4);
    } else {
      const len = w === WEAPONS.sniper ? 22 : (w === WEAPONS.plasma ? 18 : 16);
      ctx.fillRect(8, -3, len, 6);
    }
    if (now < this.muzzleFlash) {
      ctx.fillStyle = PALETTE[18];
      ctx.fillRect(w.pellets > 1 ? 20 : 24, -4, 8, 8);
    }
    ctx.restore();

    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BULLETS
// ============================================================
function createBullet(x, y, angle, speed, damage, size, isEnemy, color, pierce) {
  return {
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    damage, size, isEnemy, color,
    pierce: !!pierce,
    piercedEnemies: pierce ? new Set() : null,
    alive: true,
  };
}

function updateBullets(dt) {
  const s = dt / 16.67;
  for (const b of bullets) {
    if (!b.alive) continue;
    b.x += b.vx * s;
    b.y += b.vy * s;
    if (b.x < -20 || b.x > CANVAS_W + 20 || b.y < -20 || b.y > CANVAS_H + 20) b.alive = false;
  }
}

function drawBullets(ctx) {
  for (const b of bullets) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x - b.size / 2, b.y - b.size / 2, b.size, b.size);
    if (!b.isEnemy) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = PALETTE[4];
      ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
      ctx.globalAlpha = 1;
    }
  }
}

// ============================================================
// PARTICLES
// ============================================================
function createParticle(x, y, color) {
  const angle = Math.random() * Math.PI * 2;
  const spd = 0.5 + Math.random() * PARTICLE_SPEED_MAX;
  return {
    x, y,
    vx: Math.cos(angle) * spd,
    vy: Math.sin(angle) * spd,
    color,
    size: Math.random() < 0.5 ? 4 : 2,
    born: performance.now(),
    lifetime: PARTICLE_LIFETIME * (0.7 + Math.random() * 0.6),
    alive: true,
  };
}

function updateAndDrawParticles(ctx, now) {
  for (const p of particles) {
    if (!p.alive) continue;
    const age = now - p.born;
    if (age > p.lifetime) { p.alive = false; continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    ctx.globalAlpha = 1 - age / p.lifetime;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

const DEATH_COLORS = {
  grunt:   [PALETTE[7],  PALETTE[8],  PALETTE[1]],
  charger: [PALETTE[9],  PALETTE[10], PALETTE[1]],
  tank:    [PALETTE[11], PALETTE[12], PALETTE[1]],
  shooter: [PALETTE[16], PALETTE[17], PALETTE[1]],
};

function spawnDeathParticles(enemy) {
  const colors = DEATH_COLORS[enemy.type];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(createParticle(enemy.x, enemy.y, colors[Math.floor(Math.random() * colors.length)]));
  }
}

// ============================================================
// TRAPS
// ============================================================
function createTrap(type, x, y) {
  if (type === 'spike_trap') {
    return { type, x, y, alive: true, uses: 3, radius: 20, damage: 25, lastTrigger: 0, cooldown: 800 };
  }
  return { type: 'mine', x, y, alive: true, radius: 20, damage: 70, armed: false, armDelay: 1000, placedAt: performance.now() };
}

function placeTrap(type) {
  if ((game.trapInventory[type] || 0) <= 0) return;
  game.trapInventory[type]--;
  traps.push(createTrap(type, player.x, player.y));
}

function killEnemy(e) {
  e.alive = false;
  spawnDeathParticles(e);
  game.score += e.score;
  game.gold += e.gold;
}

function updateTraps(now) {
  for (const t of traps) {
    if (!t.alive) continue;
    if (t.type === 'spike_trap') {
      if (now - t.lastTrigger < t.cooldown) continue;
      for (const e of enemies) {
        if (!e.alive) continue;
        if (dist(t, e) < t.radius + e.radius) {
          e.hp -= t.damage;
          t.lastTrigger = now;
          t.uses--;
          for (let i = 0; i < 6; i++) particles.push(createParticle(t.x, t.y, PALETTE[5]));
          if (e.hp <= 0) killEnemy(e);
          if (t.uses <= 0) t.alive = false;
          break;
        }
      }
    } else if (t.type === 'mine') {
      if (!t.armed) {
        if (now - t.placedAt > t.armDelay) t.armed = true;
        continue;
      }
      for (const e of enemies) {
        if (!e.alive) continue;
        if (dist(t, e) < t.radius + e.radius) {
          // Explosion — damage all enemies in blast radius
          for (const e2 of enemies) {
            if (!e2.alive) continue;
            if (dist(t, e2) < 85) {
              e2.hp -= t.damage;
              if (e2.hp <= 0) killEnemy(e2);
            }
          }
          for (let i = 0; i < 24; i++) particles.push(createParticle(t.x, t.y, PALETTE[28]));
          for (let i = 0; i < 12; i++) particles.push(createParticle(t.x, t.y, PALETTE[4]));
          t.alive = false;
          break;
        }
      }
    }
  }
}

function drawTraps(ctx, now) {
  for (const t of traps) {
    if (!t.alive) continue;
    if (t.type === 'spike_trap') {
      ctx.fillStyle = PALETTE[29];
      ctx.fillRect(t.x - 13, t.y - 13, 26, 26);
      ctx.fillStyle = PALETTE[15];
      for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 3; j++) {
          ctx.fillRect(t.x - 9 + i * 9, t.y - 9 + j * 9, 5, 5);
        }
      }
      ctx.font = 'bold 9px monospace';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(t.uses, t.x, t.y - 16);
      ctx.textAlign = 'left';
    } else if (t.type === 'mine') {
      if (t.armed) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 150);
        ctx.globalAlpha = 0.3 + 0.2 * pulse;
        ctx.fillStyle = PALETTE[28];
        ctx.beginPath();
        ctx.arc(t.x, t.y, 85, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = t.armed ? PALETTE[28] : '#666';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 5, 0, Math.PI * 2);
      ctx.fill();
      if (!t.armed) {
        ctx.font = '7px monospace';
        ctx.fillStyle = '#aaa';
        ctx.textAlign = 'center';
        ctx.fillText('ARM', t.x, t.y + 20);
        ctx.textAlign = 'left';
      }
    }
  }
}

// ============================================================
// ENEMIES
// ============================================================
function createEnemy(type, x, y) {
  const s = ENEMY_STATS[type];
  const scale = getDifficultyScale(waveManager.wave);
  const scaledHp = Math.ceil(s.hp * scale.hp);
  return {
    type, x, y,
    hp: scaledHp, maxHp: scaledHp,
    speed: s.speed * scale.speed,
    radius: s.radius,
    score: Math.ceil(s.score * (1 + (waveManager.wave - 1) * 0.1)),
    gold: s.gold,
    damage: s.damage,
    attackRate: s.attackRate,
    attackRange: s.attackRange,
    angle: 0,
    vx: 0, vy: 0,
    alive: true,
    lastAttack: 0,
    chargeState: 'idle',
    chargeTimer: 0,
    chargeAngle: 0,
    lastFired: 0,
    strafeDir: 1,
    strafeTimer: 0,
  };
}

function updateGrunt(e, player, dt, now) {
  const ang = Math.atan2(player.y - e.y, player.x - e.x);
  e.angle = ang;
  const s = dt / 16.67;
  e.x += Math.cos(ang) * e.speed * s;
  e.y += Math.sin(ang) * e.speed * s;
  if (dist(e, player) < e.attackRange + PLAYER_RADIUS) {
    if (now - e.lastAttack > e.attackRate) {
      player.takeDamage(e.damage, now);
      e.lastAttack = now;
    }
  }
}

function updateTank(e, player, dt, now) {
  updateGrunt(e, player, dt, now);
}

function updateCharger(e, player, dt, now) {
  const s = dt / 16.67;
  const ang = Math.atan2(player.y - e.y, player.x - e.x);
  if (e.chargeState === 'idle') {
    e.angle = ang;
    e.x += Math.cos(ang) * e.speed * 0.8 * s;
    e.y += Math.sin(ang) * e.speed * 0.8 * s;
    if (dist(e, player) < 300) {
      e.chargeState = 'windingUp';
      e.chargeTimer = now + CHARGER_WINDUP;
      e.chargeAngle = ang;
    }
  } else if (e.chargeState === 'windingUp') {
    if (now > e.chargeTimer) {
      e.chargeState = 'charging';
      e.chargeTimer = now + CHARGER_CHARGE_DURATION;
    }
  } else if (e.chargeState === 'charging') {
    e.x += Math.cos(e.chargeAngle) * CHARGER_CHARGE_SPEED * s;
    e.y += Math.sin(e.chargeAngle) * CHARGER_CHARGE_SPEED * s;
    if (dist(e, player) < e.attackRange + PLAYER_RADIUS) {
      player.takeDamage(e.damage, now);
      e.chargeState = 'cooldown';
      e.chargeTimer = now + CHARGER_COOLDOWN;
    }
    if (now > e.chargeTimer ||
        e.x < -50 || e.x > CANVAS_W + 50 ||
        e.y < -50 || e.y > CANVAS_H + 50) {
      e.x = Math.max(0, Math.min(CANVAS_W, e.x));
      e.y = Math.max(0, Math.min(CANVAS_H, e.y));
      e.chargeState = 'cooldown';
      e.chargeTimer = now + CHARGER_COOLDOWN;
    }
  } else if (e.chargeState === 'cooldown') {
    if (now > e.chargeTimer) e.chargeState = 'idle';
  }
}

function updateShooter(e, player, dt, now) {
  const s = dt / 16.67;
  const d = dist(e, player);
  const ang = Math.atan2(player.y - e.y, player.x - e.x);
  e.angle = ang;
  if (d < SHOOTER_PREFERRED_DIST - 30) {
    e.x += Math.cos(ang + Math.PI) * e.speed * s;
    e.y += Math.sin(ang + Math.PI) * e.speed * s;
  } else if (d > SHOOTER_PREFERRED_DIST + 40) {
    e.x += Math.cos(ang) * e.speed * s;
    e.y += Math.sin(ang) * e.speed * s;
  } else {
    if (now > e.strafeTimer) {
      e.strafeDir *= -1;
      e.strafeTimer = now + 1200 + Math.random() * 800;
    }
    const strafeAng = ang + Math.PI / 2 * e.strafeDir;
    e.x += Math.cos(strafeAng) * e.speed * s;
    e.y += Math.sin(strafeAng) * e.speed * s;
  }
  e.x = Math.max(e.radius, Math.min(CANVAS_W - e.radius, e.x));
  e.y = Math.max(e.radius, Math.min(CANVAS_H - e.radius, e.y));
  if (now - e.lastFired > e.attackRate) {
    bullets.push(createBullet(e.x, e.y, ang, SHOOTER_BULLET_SPEED, e.damage, SHOOTER_BULLET_SIZE, true, PALETTE[13], false));
    e.lastFired = now;
  }
}

function updateEnemies(dt, now) {
  for (const e of enemies) {
    if (!e.alive) continue;
    switch (e.type) {
      case 'grunt':   updateGrunt(e, player, dt, now);   break;
      case 'charger': updateCharger(e, player, dt, now); break;
      case 'tank':    updateTank(e, player, dt, now);    break;
      case 'shooter': updateShooter(e, player, dt, now); break;
    }
  }
}

function drawEnemy(ctx, e, now) {
  if (e.type === 'charger' && e.chargeState === 'windingUp') {
    const pulse = 0.5 + 0.5 * Math.sin(now / 80);
    ctx.globalAlpha = 0.4 + 0.4 * pulse;
    ctx.fillStyle = PALETTE[9];
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius + 6 + pulse * 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  drawSprite(ctx, ENEMY_SPRITES[e.type], e.x, e.y, CELL, e.angle - Math.PI / 2);
  if (e.type === 'shooter') {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle);
    ctx.fillStyle = PALETTE[12];
    ctx.fillRect(6, -2, 10, 4);
    ctx.restore();
  }
  drawHealthBar(ctx, e.x, e.y - e.radius - 10, e.radius * 2 + 4, 4, e.hp / e.maxHp);
}

function drawEnemies(ctx, now) {
  for (const e of enemies) {
    if (e.alive) drawEnemy(ctx, e, now);
  }
}

// ============================================================
// SEPARATION
// ============================================================
function separateEnemies() {
  for (let i = 0; i < enemies.length; i++) {
    if (!enemies[i].alive) continue;
    for (let j = i + 1; j < enemies.length; j++) {
      if (!enemies[j].alive) continue;
      const d = dist(enemies[i], enemies[j]);
      const minD = enemies[i].radius + enemies[j].radius;
      if (d < minD && d > 0.01) {
        const overlap = (minD - d) / 2;
        const ax = (enemies[i].x - enemies[j].x) / d;
        const ay = (enemies[i].y - enemies[j].y) / d;
        enemies[i].x += ax * overlap * 0.5;
        enemies[i].y += ay * overlap * 0.5;
        enemies[j].x -= ax * overlap * 0.5;
        enemies[j].y -= ay * overlap * 0.5;
      }
    }
  }
}

// ============================================================
// COLLISION
// ============================================================
function checkPlayerBulletsVsEnemies() {
  for (const b of bullets) {
    if (b.isEnemy || !b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (b.pierce && b.piercedEnemies.has(e)) continue;
      if (dist(b, e) < e.radius + b.size / 2) {
        e.hp -= b.damage;
        for (let i = 0; i < 4; i++) particles.push(createParticle(b.x, b.y, PALETTE[15]));
        if (b.pierce) {
          b.piercedEnemies.add(e);
        } else {
          b.alive = false;
        }
        if (e.hp <= 0) killEnemy(e);
        if (!b.pierce) break;
      }
    }
  }
}

function checkEnemyBulletsVsPlayer(now) {
  for (const b of bullets) {
    if (!b.isEnemy || !b.alive) continue;
    if (dist(b, player) < PLAYER_RADIUS + b.size / 2) {
      player.takeDamage(b.damage, now);
      b.alive = false;
    }
  }
}

// ============================================================
// WAVE MANAGER
// ============================================================
const waveManager = {
  wave: 1,
  spawnQueue: [],
  spawnTimer: 0,
  shopOpened: false,
};

function buildWave(waveNum) {
  const types = [];
  const isBossWave = waveNum > 0 && waveNum % 5 === 0;

  if (waveNum === 1) {
    for (let i = 0; i < 5; i++) types.push('grunt');
  } else if (waveNum === 2) {
    for (let i = 0; i < 7; i++) types.push('grunt');
    types.push('charger');
  } else if (waveNum === 3) {
    for (let i = 0; i < 6; i++) types.push('grunt');
    for (let i = 0; i < 3; i++) types.push('charger');
    types.push('tank');
  } else if (waveNum === 4) {
    for (let i = 0; i < 5; i++) types.push('grunt');
    for (let i = 0; i < 3; i++) types.push('charger');
    for (let i = 0; i < 2; i++) types.push('tank');
    types.push('shooter');
  } else {
    const g = Math.min(3 + Math.floor(waveNum * 0.7), 14);
    const c = Math.min(1 + Math.floor(waveNum / 2), 7);
    const t = Math.min(Math.floor(waveNum / 3), 6);
    const s = Math.min(Math.floor(waveNum / 2), 6);
    for (let i = 0; i < g; i++) types.push('grunt');
    for (let i = 0; i < c; i++) types.push('charger');
    for (let i = 0; i < t; i++) types.push('tank');
    for (let i = 0; i < s; i++) types.push('shooter');
    if (isBossWave) {
      // Boss wave: extra heavies
      for (let i = 0; i < 4; i++) types.push('tank');
      for (let i = 0; i < 3; i++) types.push('charger');
      for (let i = 0; i < 2; i++) types.push('shooter');
    }
  }
  for (let i = types.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [types[i], types[j]] = [types[j], types[i]];
  }
  return types;
}

function randomSpawnPos() {
  const edge = Math.floor(Math.random() * 4);
  switch (edge) {
    case 0: return { x: Math.random() * CANVAS_W, y: -30 };
    case 1: return { x: CANVAS_W + 30, y: Math.random() * CANVAS_H };
    case 2: return { x: Math.random() * CANVAS_W, y: CANVAS_H + 30 };
    case 3: return { x: -30, y: Math.random() * CANVAS_H };
  }
}

function updateWaveManager(now) {
  if (game.state === 'shop') return;

  if (waveManager.spawnQueue.length > 0 && now > waveManager.spawnTimer) {
    const type = waveManager.spawnQueue.shift();
    const pos = randomSpawnPos();
    enemies.push(createEnemy(type, pos.x, pos.y));
    waveManager.spawnTimer = now + SPAWN_INTERVAL;
  }

  if (!waveManager.shopOpened &&
      waveManager.spawnQueue.length === 0 &&
      enemies.filter(e => e.alive).length === 0) {
    waveManager.wave++;
    game.wave = waveManager.wave;
    waveManager.shopOpened = true;
    openShop();
  }
}

// ============================================================
// SHOP
// ============================================================
const shop = {
  open: false,
  tab: 'WEAPONS',
  clickAreas: [],
};

function openShop() {
  shop.open = true;
  shop.tab = 'WEAPONS';
  game.state = 'shop';
}

function closeShop() {
  shop.open = false;
  game.state = 'playing';
  waveManager.shopOpened = false;
  waveManager.spawnQueue = buildWave(waveManager.wave);
  waveManager.spawnTimer = performance.now() + 600;
  bullets = [];
}

function shopBuy(itemId) {
  const item = SHOP_ITEMS.find(i => i.id === itemId);
  if (!item || game.gold < item.cost) return;
  if (item.oneTime && game.purchased.has(itemId)) return;

  game.gold -= item.cost;

  switch (itemId) {
    case 'shotgun':
    case 'rapidfire':
    case 'sniper':
    case 'plasma':
      game.ownedWeapons.add(itemId);
      game.currentWeapon = itemId;
      game.purchased.add(itemId);
      break;
    case 'spike_trap':
      game.trapInventory.spike_trap++;
      break;
    case 'mine':
      game.trapInventory.mine++;
      break;
    case 'medkit':
      player.maxHp += 30;
      player.hp = player.maxHp;
      break;
    case 'boots':
      game.speedBonus += 0.6;
      break;
    case 'clip':
      game.fireRateMultiplier = Math.max(0.3, game.fireRateMultiplier * 0.85);
      break;
    case 'map_desert':
    case 'map_dungeon':
    case 'map_ice':
      game.purchased.add(itemId);
      game.currentMap = itemId;
      break;
  }
}

function drawShop(ctx) {
  shop.clickAreas = [];

  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const px = 55, py = 35, pw = CANVAS_W - 110, ph = CANVAS_H - 70;
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = PALETTE[4];
  ctx.lineWidth = 2;
  ctx.strokeRect(px, py, pw, ph);

  // Wave banner
  const isBoss = (waveManager.wave - 1) % 5 === 0 && waveManager.wave > 1;
  ctx.textAlign = 'center';
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = isBoss ? PALETTE[5] : PALETTE[14];
  const completedWave = waveManager.wave - 1;
  ctx.fillText(
    isBoss ? `BOSS WAVE ${completedWave} CLEARED!` : `WAVE ${completedWave} COMPLETE`,
    CANVAS_W / 2, py + 28
  );

  // Gold display
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = PALETTE[26];
  ctx.fillText(`GOLD: ${game.gold}`, CANVAS_W / 2, py + 50);

  // Tabs
  const tabRowY = py + 62;
  const tabW = pw / SHOP_TABS.length;
  SHOP_TABS.forEach((tab, i) => {
    const tx = px + i * tabW;
    const active = shop.tab === tab;
    ctx.fillStyle = active ? '#1e3a5f' : '#111e2d';
    ctx.fillRect(tx, tabRowY, tabW - 3, 26);
    ctx.strokeStyle = active ? PALETTE[4] : '#2a2a3a';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx, tabRowY, tabW - 3, 26);
    ctx.fillStyle = active ? '#fff' : '#666';
    ctx.font = `${active ? 'bold ' : ''}11px monospace`;
    ctx.fillText(tab, tx + (tabW - 3) / 2, tabRowY + 17);
    shop.clickAreas.push({ x: tx, y: tabRowY, w: tabW - 3, h: 26, action: () => { shop.tab = tab; } });
  });

  // Item grid
  const items = SHOP_ITEMS.filter(i => i.cat === shop.tab);
  const gridY = tabRowY + 34;
  const colW = pw / 2;

  items.forEach((item, idx) => {
    const col = idx % 2;
    const row = Math.floor(idx / 2);
    const ix = px + col * colW + 6;
    const iy = gridY + row * 96;
    const iw = colW - 12;
    const ih = 88;

    const owned = item.oneTime && game.purchased.has(item.id);
    const equipped = game.currentWeapon === item.id;
    const activeMap = game.currentMap === item.id;
    const canAfford = game.gold >= item.cost;

    ctx.fillStyle = (equipped || activeMap) ? '#0d2d0d' : owned ? '#111' : '#0a1929';
    ctx.fillRect(ix, iy, iw, ih);
    ctx.strokeStyle = (equipped || activeMap) ? PALETTE[14] : (canAfford && !owned ? PALETTE[4] : '#2a2a3a');
    ctx.lineWidth = 1;
    ctx.strokeRect(ix, iy, iw, ih);

    // Item name
    ctx.textAlign = 'left';
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = owned ? '#555' : '#ddd';
    ctx.fillText(item.name, ix + 8, iy + 17);

    // Description
    ctx.font = '9px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText(item.desc, ix + 8, iy + 31);

    // Cost
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = canAfford ? PALETTE[26] : '#633';
    ctx.fillText(`${item.cost}G`, ix + 8, iy + 50);

    // Inventory count for consumables
    if (item.id === 'spike_trap') {
      ctx.fillStyle = PALETTE[28]; ctx.font = '9px monospace';
      ctx.fillText(`owned: ${game.trapInventory.spike_trap}`, ix + 8, iy + 65);
    } else if (item.id === 'mine') {
      ctx.fillStyle = PALETTE[28]; ctx.font = '9px monospace';
      ctx.fillText(`owned: ${game.trapInventory.mine}`, ix + 8, iy + 65);
    }

    // Action button
    const btnX = ix + iw - 72;
    const btnY = iy + ih - 28;
    const btnW = 64, btnH = 20;

    let btnLabel, btnBg, btnFg, clickable = true;
    if (equipped) {
      btnLabel = 'EQUIPPED'; btnBg = '#1a4d1a'; btnFg = PALETTE[14]; clickable = false;
    } else if (activeMap) {
      btnLabel = 'ACTIVE'; btnBg = '#1a4d1a'; btnFg = PALETTE[14]; clickable = false;
    } else if (owned && item.cat === 'WEAPONS') {
      btnLabel = 'EQUIP'; btnBg = '#1e3a5f'; btnFg = '#7ec8e3';
    } else if (owned && item.cat === 'MAPS') {
      btnLabel = 'ACTIVATE'; btnBg = '#1e3a5f'; btnFg = '#7ec8e3';
    } else if (owned) {
      btnLabel = 'OWNED'; btnBg = '#222'; btnFg = '#444'; clickable = false;
    } else if (!canAfford) {
      btnLabel = 'BUY'; btnBg = '#2a1a1a'; btnFg = '#633'; clickable = false;
    } else {
      btnLabel = 'BUY'; btnBg = '#1a4d1a'; btnFg = '#68d391';
    }

    ctx.fillStyle = btnBg;
    ctx.fillRect(btnX, btnY, btnW, btnH);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(btnX, btnY, btnW, btnH);
    ctx.font = 'bold 8px monospace';
    ctx.fillStyle = btnFg;
    ctx.textAlign = 'center';
    ctx.fillText(btnLabel, btnX + btnW / 2, btnY + 13);
    ctx.textAlign = 'left';

    if (clickable) {
      shop.clickAreas.push({
        x: btnX, y: btnY, w: btnW, h: btnH,
        action: () => {
          if (owned && item.cat === 'WEAPONS') { game.currentWeapon = item.id; return; }
          if (owned && item.cat === 'MAPS') { game.currentMap = item.id; return; }
          shopBuy(item.id);
        },
      });
    }
  });

  // Next wave button
  const nextBtnW = 210, nextBtnH = 34;
  const nextBtnX = CANVAS_W / 2 - nextBtnW / 2;
  const nextBtnY = py + ph - 46;
  const blink = Math.sin(performance.now() / 350) > 0;
  ctx.fillStyle = blink ? '#1a5c2a' : '#143d1c';
  ctx.fillRect(nextBtnX, nextBtnY, nextBtnW, nextBtnH);
  ctx.strokeStyle = PALETTE[14];
  ctx.lineWidth = 2;
  ctx.strokeRect(nextBtnX, nextBtnY, nextBtnW, nextBtnH);
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  const isBossNext = waveManager.wave % 5 === 0;
  ctx.fillText(
    isBossNext ? `START BOSS WAVE ${waveManager.wave}` : `START WAVE ${waveManager.wave}`,
    CANVAS_W / 2, nextBtnY + 22
  );
  ctx.textAlign = 'left';
  ctx.lineWidth = 1;
  shop.clickAreas.push({ x: nextBtnX, y: nextBtnY, w: nextBtnW, h: nextBtnH, action: closeShop });

  // Controls hint at bottom
  ctx.font = '9px monospace';
  ctx.fillStyle = '#3a3a4a';
  ctx.textAlign = 'center';
  ctx.fillText('SPACE to start next wave', CANVAS_W / 2, py + ph - 8);
  ctx.textAlign = 'left';
}

// ============================================================
// HUD & OVERLAYS
// ============================================================
function drawHUD(ctx, now) {
  // HP
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 12, 33);
  drawHealthBar(ctx, 110, 20, 150, 14, player.hp / player.maxHp);
  ctx.font = '10px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`${player.hp} / ${player.maxHp}`, 189, 31);

  // Wave + enemy count
  ctx.textAlign = 'center';
  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`WAVE ${game.wave}`, CANVAS_W / 2, 24);
  const remaining = enemies.filter(e => e.alive).length + waveManager.spawnQueue.length;
  ctx.font = '11px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText(`ENEMIES: ${remaining}`, CANVAS_W / 2, 40);

  // Score + gold
  ctx.textAlign = 'right';
  ctx.font = '13px monospace';
  ctx.fillStyle = PALETTE[4];
  ctx.fillText(`SCORE: ${String(game.score).padStart(6, '0')}`, CANVAS_W - 12, 20);
  ctx.fillStyle = PALETTE[26];
  ctx.fillText(`GOLD: ${game.gold}`, CANVAS_W - 12, 36);

  // Weapon indicator
  const w = WEAPONS[game.currentWeapon];
  ctx.textAlign = 'left';
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = PALETTE[w.colorIdx];
  ctx.fillText(`[${w.name}]  1-5:switch`, 12, 58);

  // Trap inventory
  ctx.font = '10px monospace';
  ctx.fillStyle = PALETTE[28];
  ctx.fillText(`F:SPIKE(${game.trapInventory.spike_trap})  G:MINE(${game.trapInventory.mine})`, 12, 73);

  // Map tag
  if (game.currentMap !== 'default') {
    ctx.fillStyle = '#444';
    ctx.font = '9px monospace';
    ctx.fillText(`MAP: ${game.currentMap.replace('map_','').toUpperCase()}`, 12, 87);
  }

  ctx.textAlign = 'left';
}

function drawGameOver(ctx) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.strokeStyle = PALETTE[5];
  ctx.lineWidth = 4;
  ctx.strokeRect(40, CANVAS_H / 2 - 130, CANVAS_W - 80, 260);

  ctx.textAlign = 'center';
  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = PALETTE[5];
  ctx.fillText('GAME OVER', CANVAS_W / 2, CANVAS_H / 2 - 50);

  ctx.font = 'bold 24px monospace';
  ctx.fillStyle = PALETTE[4];
  ctx.fillText(`SCORE: ${String(game.score).padStart(6, '0')}`, CANVAS_W / 2, CANVAS_H / 2 + 10);

  ctx.font = '18px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`WAVE REACHED: ${game.wave}`, CANVAS_W / 2, CANVAS_H / 2 + 48);

  ctx.font = '13px monospace';
  ctx.fillStyle = PALETTE[14];
  if (Math.sin(performance.now() / 400) > 0) {
    ctx.fillText('[ CLICK OR PRESS R TO RESTART ]', CANVAS_W / 2, CANVAS_H / 2 + 92);
  }
  ctx.textAlign = 'left';
}

// ============================================================
// GAME STATE
// ============================================================
const game = {
  state: 'playing',
  score: 0,
  wave: 1,
  lastTime: 0,
  gold: 0,
  currentWeapon: 'pistol',
  ownedWeapons: new Set(['pistol']),
  speedBonus: 0,
  fireRateMultiplier: 1.0,
  trapInventory: { spike_trap: 0, mine: 0 },
  purchased: new Set(),
  currentMap: 'default',
};

let player = new Player(CANVAS_W / 2, CANVAS_H / 2);
let enemies = [];
let bullets = [];
let particles = [];
let traps = [];

waveManager.spawnQueue = buildWave(1);
waveManager.spawnTimer = performance.now() + 1000;

function resetGame() {
  player = new Player(CANVAS_W / 2, CANVAS_H / 2);
  enemies = []; bullets = []; particles = []; traps = [];
  game.score = 0; game.wave = 1; game.state = 'playing';
  game.gold = 0; game.currentWeapon = 'pistol';
  game.ownedWeapons = new Set(['pistol']);
  game.speedBonus = 0; game.fireRateMultiplier = 1.0;
  game.trapInventory = { spike_trap: 0, mine: 0 };
  game.purchased = new Set();
  game.currentMap = 'default';
  waveManager.wave = 1; waveManager.shopOpened = false;
  waveManager.spawnQueue = buildWave(1);
  waveManager.spawnTimer = performance.now() + 1000;
  shop.open = false;
}

function pruneArrays() {
  bullets   = bullets.filter(b => b.alive);
  enemies   = enemies.filter(e => e.alive);
  particles = particles.filter(p => p.alive);
  traps     = traps.filter(t => t.alive);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - game.lastTime, 50);
  game.lastTime = timestamp;
  const now = timestamp;

  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground(ctx);

  if (game.state === 'playing') {
    updateWaveManager(now);
    if (player.alive) {
      player.update(dt, now);
      updateEnemies(dt, now);
      updateBullets(dt);
      updateTraps(now);
      checkPlayerBulletsVsEnemies();
      checkEnemyBulletsVsPlayer(now);
      separateEnemies();
    }
    updateAndDrawParticles(ctx, now);
    drawTraps(ctx, now);
    drawBullets(ctx);
    drawEnemies(ctx, now);
    if (player.alive) player.draw(ctx, now);
    drawHUD(ctx, now);
    if (!player.alive) game.state = 'gameover';

  } else if (game.state === 'shop') {
    updateAndDrawParticles(ctx, now);
    drawTraps(ctx, now);
    if (player.alive) player.draw(ctx, now);
    drawShop(ctx);

  } else if (game.state === 'gameover') {
    drawGameOver(ctx);
  }

  pruneArrays();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(ts => { game.lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
