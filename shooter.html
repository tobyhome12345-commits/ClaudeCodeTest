<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      cursor: crosshair;
      display: block;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<script>
// ============================================================
// CONSTANTS
// ============================================================
const CANVAS_W = 800, CANVAS_H = 600;
const CELL = 4;

const PLAYER_SPEED = 3;
const PLAYER_MAX_HP = 100;
const PLAYER_FIRE_RATE = 150;
const PLAYER_BULLET_SPEED = 9;
const PLAYER_BULLET_DAMAGE = 20;
const PLAYER_BULLET_SIZE = 4;
const PLAYER_INVINCIBILITY_MS = 500;
const PLAYER_RADIUS = 14;

const CHARGER_CHARGE_SPEED = 5.5;
const CHARGER_CHARGE_DURATION = 650;
const CHARGER_COOLDOWN = 1800;
const CHARGER_WINDUP = 500;
const SHOOTER_PREFERRED_DIST = 220;
const SHOOTER_BULLET_SPEED = 4;
const SHOOTER_BULLET_SIZE = 3;

const PARTICLE_COUNT = 12;
const PARTICLE_SPEED_MAX = 3.5;
const PARTICLE_LIFETIME = 600;
const WAVE_INTERMISSION_MS = 3000;
const SPAWN_INTERVAL = 800;

const ENEMY_STATS = {
  grunt:   { hp: 30,  speed: 1.0, radius: 12, score: 10, damage: 10, attackRate: 900,  attackRange: 22 },
  charger: { hp: 50,  speed: 1.4, radius: 12, score: 25, damage: 20, attackRate: 0,    attackRange: 22 },
  tank:    { hp: 120, speed: 0.7, radius: 20, score: 50, damage: 30, attackRate: 800,  attackRange: 36 },
  shooter: { hp: 40,  speed: 1.2, radius: 12, score: 30, damage: 10, attackRate: 1800, attackRange: 999 },
};

// ============================================================
// COLOR PALETTE
// ============================================================
const PALETTE = {
  0:  null,
  1:  '#e8d5b0',  // skin
  2:  '#4a90d9',  // player blue
  3:  '#2c5282',  // player dark blue
  4:  '#f6e05e',  // yellow
  5:  '#e53e3e',  // red (enemy eye)
  6:  '#822727',  // dark red
  7:  '#68d391',  // grunt green
  8:  '#276749',  // grunt dark green
  9:  '#d69e2e',  // charger orange
  10: '#7b341e',  // charger dark
  11: '#718096',  // tank gray
  12: '#2d3748',  // dark gray / gun
  13: '#fc8181',  // health bad
  14: '#9ae6b4',  // health good
  15: '#ffffff',  // white
  16: '#805ad5',  // shooter purple
  17: '#44337a',  // shooter dark purple
  18: '#fbd38d',  // muzzle flash
  19: '#f687b3',  // pink particle
};

// ============================================================
// SPRITES (2D arrays of palette indices, 0 = transparent)
// ============================================================
const PLAYER_SPRITE = [
  [0, 0, 3, 3, 3, 3, 0, 0],
  [0, 3, 2, 2, 2, 2, 3, 0],
  [3, 2, 1, 1, 1, 1, 2, 3],
  [3, 2, 1, 4, 4, 1, 2, 3],
  [3, 2, 1, 4, 4, 1, 2, 3],
  [3, 2, 1, 1, 1, 1, 2, 3],
  [0, 3, 2, 2, 2, 2, 3, 0],
  [0, 0, 3, 3, 3, 3, 0, 0],
];

const GRUNT_SPRITE = [
  [0, 8, 7, 7, 8, 0],
  [8, 7, 1, 1, 7, 8],
  [7, 1, 5, 5, 1, 7],
  [7, 1, 5, 5, 1, 7],
  [8, 7, 1, 1, 7, 8],
  [0, 8, 7, 7, 8, 0],
];

const CHARGER_SPRITE = [
  [0, 9,10,10, 9, 0],
  [9,10, 1, 1,10, 9],
  [9, 1, 5, 5, 1, 9],
  [9, 1, 5, 5, 1, 9],
  [9,10, 1, 1,10, 9],
  [0, 9,10,10, 9, 0],
];

const TANK_SPRITE = [
  [0, 0,12,11,11,11,11,12, 0, 0],
  [0,12,11,11,11,11,11,11,12, 0],
  [12,11,11, 1, 1, 1, 1,11,11,12],
  [11,11, 1, 5, 5, 5, 5, 1,11,11],
  [11,11, 1, 5,12,12, 5, 1,11,11],
  [11,11, 1, 5,12,12, 5, 1,11,11],
  [11,11, 1, 5, 5, 5, 5, 1,11,11],
  [12,11,11, 1, 1, 1, 1,11,11,12],
  [0,12,11,11,11,11,11,11,12, 0],
  [0, 0,12,11,11,11,11,12, 0, 0],
];

const SHOOTER_SPRITE = [
  [0,17,16,16,17, 0],
  [17,16, 1, 1,16,17],
  [16, 1,16,16, 1,16],
  [16, 1,16,16, 1,16],
  [17,16, 1, 1,16,17],
  [0,17,16,16,17, 0],
];

const ENEMY_SPRITES = { grunt: GRUNT_SPRITE, charger: CHARGER_SPRITE, tank: TANK_SPRITE, shooter: SHOOTER_SPRITE };

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ============================================================
// INPUT
// ============================================================
const keys = {};
const mouse = { x: CANVAS_W / 2, y: CANVAS_H / 2, down: false };

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyR' && game.state === 'gameover') resetGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
  mouse.y = (e.clientY - rect.top)  * (CANVAS_H / rect.height);
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup',   e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('click', () => { if (game.state === 'gameover') resetGame(); });

// ============================================================
// UTILITY
// ============================================================
function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function drawSprite(ctx, sprite, x, y, cellSize, angle) {
  ctx.save();
  ctx.translate(x, y);
  if (angle) ctx.rotate(angle);
  const rows = sprite.length;
  const cols = sprite[0].length;
  const ox = -(cols * cellSize) / 2;
  const oy = -(rows * cellSize) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = sprite[r][c];
      if (!idx) continue;
      ctx.fillStyle = PALETTE[idx];
      ctx.fillRect(ox + c * cellSize, oy + r * cellSize, cellSize, cellSize);
    }
  }
  ctx.restore();
}

function drawHealthBar(ctx, cx, y, w, h, frac) {
  ctx.fillStyle = '#222';
  ctx.fillRect(cx - w / 2, y, w, h);
  let color;
  if (frac > 0.6) color = PALETTE[14];
  else if (frac > 0.3) color = PALETTE[4];
  else color = PALETTE[13];
  ctx.fillStyle = color;
  ctx.fillRect(cx - w / 2, y, Math.max(0, w * frac), h);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - w / 2, y, w, h);
}

// ============================================================
// PLAYER
// ============================================================
class Player {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.hp = PLAYER_MAX_HP;
    this.maxHp = PLAYER_MAX_HP;
    this.angle = 0;
    this.vx = 0; this.vy = 0;
    this.lastFired = 0;
    this.invincibleUntil = 0;
    this.alive = true;
    this.muzzleFlash = 0;
  }

  update(dt, now) {
    let dx = 0, dy = 0;
    if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
    if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
    if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
    if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
    this.vx = dx * PLAYER_SPEED;
    this.vy = dy * PLAYER_SPEED;

    this.x = Math.max(PLAYER_RADIUS, Math.min(CANVAS_W - PLAYER_RADIUS, this.x + this.vx));
    this.y = Math.max(PLAYER_RADIUS, Math.min(CANVAS_H - PLAYER_RADIUS, this.y + this.vy));

    this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);

    if (mouse.down && now - this.lastFired >= PLAYER_FIRE_RATE) {
      const bx = this.x + Math.cos(this.angle) * 20;
      const by = this.y + Math.sin(this.angle) * 20;
      bullets.push(createBullet(bx, by, this.angle, PLAYER_BULLET_SPEED, PLAYER_BULLET_DAMAGE, PLAYER_BULLET_SIZE, false, PALETTE[15]));
      this.lastFired = now;
      this.muzzleFlash = now + 60;
    }
  }

  takeDamage(amount, now) {
    if (now < this.invincibleUntil) return;
    this.hp -= amount;
    this.invincibleUntil = now + PLAYER_INVINCIBILITY_MS;
    if (this.hp <= 0) { this.hp = 0; this.alive = false; }
  }

  draw(ctx, now) {
    const flickering = now < this.invincibleUntil;
    if (flickering) {
      const flicker = Math.sin(now / 50);
      ctx.globalAlpha = flicker > 0 ? 1 : 0.3;
    }

    drawSprite(ctx, PLAYER_SPRITE, this.x, this.y, CELL, this.angle - Math.PI / 2);

    // Gun barrel
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle = PALETTE[12];
    ctx.fillRect(8, -3, 16, 6);
    if (now < this.muzzleFlash) {
      ctx.fillStyle = PALETTE[18];
      ctx.fillRect(24, -4, 8, 8);
    }
    ctx.restore();

    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BULLETS
// ============================================================
function createBullet(x, y, angle, speed, damage, size, isEnemy, color) {
  return {
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    damage, size, isEnemy, color,
    alive: true,
  };
}

function updateBullets(dt) {
  const s = dt / 16.67;
  for (const b of bullets) {
    if (!b.alive) continue;
    b.x += b.vx * s;
    b.y += b.vy * s;
    if (b.x < -20 || b.x > CANVAS_W + 20 || b.y < -20 || b.y > CANVAS_H + 20) {
      b.alive = false;
    }
  }
}

function drawBullets(ctx) {
  for (const b of bullets) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x - b.size / 2, b.y - b.size / 2, b.size, b.size);
    if (!b.isEnemy) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = PALETTE[4];
      ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
      ctx.globalAlpha = 1;
    }
  }
}

// ============================================================
// PARTICLES
// ============================================================
function createParticle(x, y, color) {
  const angle = Math.random() * Math.PI * 2;
  const spd = 0.5 + Math.random() * PARTICLE_SPEED_MAX;
  return {
    x, y,
    vx: Math.cos(angle) * spd,
    vy: Math.sin(angle) * spd,
    color,
    size: Math.random() < 0.5 ? 4 : 2,
    born: performance.now(),
    lifetime: PARTICLE_LIFETIME * (0.7 + Math.random() * 0.6),
    alive: true,
  };
}

function updateAndDrawParticles(ctx, now) {
  const s = 1;
  for (const p of particles) {
    if (!p.alive) continue;
    const age = now - p.born;
    if (age > p.lifetime) { p.alive = false; continue; }
    p.x += p.vx * s;
    p.y += p.vy * s;
    p.vx *= 0.96;
    p.vy *= 0.96;
    const alpha = 1 - age / p.lifetime;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

const DEATH_COLORS = {
  grunt:   [PALETTE[7],  PALETTE[8],  PALETTE[1]],
  charger: [PALETTE[9],  PALETTE[10], PALETTE[1]],
  tank:    [PALETTE[11], PALETTE[12], PALETTE[1]],
  shooter: [PALETTE[16], PALETTE[17], PALETTE[1]],
};

function spawnDeathParticles(enemy) {
  const colors = DEATH_COLORS[enemy.type];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(createParticle(enemy.x, enemy.y, colors[Math.floor(Math.random() * colors.length)]));
  }
}

// ============================================================
// ENEMIES
// ============================================================
function createEnemy(type, x, y) {
  const s = ENEMY_STATS[type];
  return {
    type, x, y,
    hp: s.hp, maxHp: s.hp,
    speed: s.speed,
    radius: s.radius,
    score: s.score,
    damage: s.damage,
    attackRate: s.attackRate,
    attackRange: s.attackRange,
    angle: 0,
    vx: 0, vy: 0,
    alive: true,
    lastAttack: 0,
    // charger state
    chargeState: 'idle',
    chargeTimer: 0,
    chargeAngle: 0,
    // shooter state
    lastFired: 0,
    strafeDir: 1,
    strafeTimer: 0,
  };
}

function updateGrunt(e, player, dt, now) {
  const ang = Math.atan2(player.y - e.y, player.x - e.x);
  e.angle = ang;
  const s = dt / 16.67;
  e.x += Math.cos(ang) * e.speed * s;
  e.y += Math.sin(ang) * e.speed * s;
  if (dist(e, player) < e.attackRange + PLAYER_RADIUS) {
    if (now - e.lastAttack > e.attackRate) {
      player.takeDamage(e.damage, now);
      e.lastAttack = now;
    }
  }
}

function updateTank(e, player, dt, now) {
  updateGrunt(e, player, dt, now); // same logic, different stats
}

function updateCharger(e, player, dt, now) {
  const s = dt / 16.67;
  const ang = Math.atan2(player.y - e.y, player.x - e.x);

  if (e.chargeState === 'idle') {
    e.angle = ang;
    e.x += Math.cos(ang) * e.speed * 0.8 * s;
    e.y += Math.sin(ang) * e.speed * 0.8 * s;
    if (dist(e, player) < 300) {
      e.chargeState = 'windingUp';
      e.chargeTimer = now + CHARGER_WINDUP;
      e.chargeAngle = ang;
    }
  } else if (e.chargeState === 'windingUp') {
    // stand still, pulse handled in draw
    if (now > e.chargeTimer) {
      e.chargeState = 'charging';
      e.chargeTimer = now + CHARGER_CHARGE_DURATION;
    }
  } else if (e.chargeState === 'charging') {
    e.x += Math.cos(e.chargeAngle) * CHARGER_CHARGE_SPEED * s;
    e.y += Math.sin(e.chargeAngle) * CHARGER_CHARGE_SPEED * s;
    if (dist(e, player) < e.attackRange + PLAYER_RADIUS) {
      player.takeDamage(e.damage, now);
      e.chargeState = 'cooldown';
      e.chargeTimer = now + CHARGER_COOLDOWN;
    }
    if (now > e.chargeTimer ||
        e.x < -50 || e.x > CANVAS_W + 50 ||
        e.y < -50 || e.y > CANVAS_H + 50) {
      e.x = Math.max(0, Math.min(CANVAS_W, e.x));
      e.y = Math.max(0, Math.min(CANVAS_H, e.y));
      e.chargeState = 'cooldown';
      e.chargeTimer = now + CHARGER_COOLDOWN;
    }
  } else if (e.chargeState === 'cooldown') {
    if (now > e.chargeTimer) e.chargeState = 'idle';
  }
}

function updateShooter(e, player, dt, now) {
  const s = dt / 16.67;
  const d = dist(e, player);
  const ang = Math.atan2(player.y - e.y, player.x - e.x);
  e.angle = ang;

  if (d < SHOOTER_PREFERRED_DIST - 30) {
    // retreat
    e.x += Math.cos(ang + Math.PI) * e.speed * s;
    e.y += Math.sin(ang + Math.PI) * e.speed * s;
  } else if (d > SHOOTER_PREFERRED_DIST + 40) {
    // approach
    e.x += Math.cos(ang) * e.speed * s;
    e.y += Math.sin(ang) * e.speed * s;
  } else {
    // strafe
    if (now > e.strafeTimer) {
      e.strafeDir *= -1;
      e.strafeTimer = now + 1200 + Math.random() * 800;
    }
    const strafeAng = ang + Math.PI / 2 * e.strafeDir;
    e.x += Math.cos(strafeAng) * e.speed * s;
    e.y += Math.sin(strafeAng) * e.speed * s;
  }

  // Clamp to canvas
  e.x = Math.max(e.radius, Math.min(CANVAS_W - e.radius, e.x));
  e.y = Math.max(e.radius, Math.min(CANVAS_H - e.radius, e.y));

  // Fire bullet at player
  if (now - e.lastFired > e.attackRate) {
    bullets.push(createBullet(e.x, e.y, ang, SHOOTER_BULLET_SPEED, e.damage, SHOOTER_BULLET_SIZE, true, PALETTE[13]));
    e.lastFired = now;
  }
}

function updateEnemies(dt, now) {
  for (const e of enemies) {
    if (!e.alive) continue;
    switch (e.type) {
      case 'grunt':   updateGrunt(e, player, dt, now);   break;
      case 'charger': updateCharger(e, player, dt, now); break;
      case 'tank':    updateTank(e, player, dt, now);    break;
      case 'shooter': updateShooter(e, player, dt, now); break;
    }
  }
}

function drawEnemy(ctx, e, now) {
  if (e.type === 'charger' && e.chargeState === 'windingUp') {
    const pulse = 0.5 + 0.5 * Math.sin(now / 80);
    ctx.globalAlpha = 0.4 + 0.4 * pulse;
    ctx.fillStyle = PALETTE[9];
    const r = e.radius + 6 + pulse * 6;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  drawSprite(ctx, ENEMY_SPRITES[e.type], e.x, e.y, CELL, e.angle - Math.PI / 2);

  // Shooter gun barrel
  if (e.type === 'shooter') {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle);
    ctx.fillStyle = PALETTE[12];
    ctx.fillRect(6, -2, 10, 4);
    ctx.restore();
  }

  // HP bar
  const barW = e.radius * 2 + 4;
  const barY = e.y - e.radius - 10;
  drawHealthBar(ctx, e.x, barY, barW, 4, e.hp / e.maxHp);
}

function drawEnemies(ctx, now) {
  for (const e of enemies) {
    if (e.alive) drawEnemy(ctx, e, now);
  }
}

// ============================================================
// SEPARATION
// ============================================================
function separateEnemies() {
  for (let i = 0; i < enemies.length; i++) {
    if (!enemies[i].alive) continue;
    for (let j = i + 1; j < enemies.length; j++) {
      if (!enemies[j].alive) continue;
      const d = dist(enemies[i], enemies[j]);
      const minD = enemies[i].radius + enemies[j].radius;
      if (d < minD && d > 0.01) {
        const overlap = (minD - d) / 2;
        const ax = (enemies[i].x - enemies[j].x) / d;
        const ay = (enemies[i].y - enemies[j].y) / d;
        enemies[i].x += ax * overlap * 0.5;
        enemies[i].y += ay * overlap * 0.5;
        enemies[j].x -= ax * overlap * 0.5;
        enemies[j].y -= ay * overlap * 0.5;
      }
    }
  }
}

// ============================================================
// COLLISION
// ============================================================
function checkPlayerBulletsVsEnemies() {
  for (const b of bullets) {
    if (b.isEnemy || !b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (dist(b, e) < e.radius + b.size / 2) {
        e.hp -= b.damage;
        b.alive = false;
        // small hit spark
        for (let i = 0; i < 4; i++) {
          particles.push(createParticle(b.x, b.y, PALETTE[15]));
        }
        if (e.hp <= 0) {
          e.alive = false;
          spawnDeathParticles(e);
          game.score += e.score;
        }
        break;
      }
    }
  }
}

function checkEnemyBulletsVsPlayer(now) {
  for (const b of bullets) {
    if (!b.isEnemy || !b.alive) continue;
    if (dist(b, player) < PLAYER_RADIUS + b.size / 2) {
      player.takeDamage(b.damage, now);
      b.alive = false;
    }
  }
}

// ============================================================
// WAVE MANAGER
// ============================================================
const waveManager = {
  wave: 1,
  spawnQueue: [],
  spawnTimer: 0,
  intermissionActive: false,
  intermissionEnd: 0,
};

function buildWave(waveNum) {
  const types = [];
  if (waveNum === 1) {
    for (let i = 0; i < 5; i++) types.push('grunt');
  } else if (waveNum === 2) {
    for (let i = 0; i < 6; i++) types.push('grunt');
    types.push('charger');
  } else if (waveNum === 3) {
    for (let i = 0; i < 5; i++) types.push('grunt');
    for (let i = 0; i < 2; i++) types.push('charger');
    types.push('tank');
  } else if (waveNum === 4) {
    for (let i = 0; i < 4; i++) types.push('grunt');
    for (let i = 0; i < 3; i++) types.push('charger');
    for (let i = 0; i < 2; i++) types.push('tank');
    types.push('shooter');
  } else {
    const g = Math.min(4 + waveNum, 10);
    const c = Math.min(1 + Math.floor(waveNum / 2), 5);
    const t = Math.min(Math.floor(waveNum / 3), 4);
    const s = Math.min(Math.floor(waveNum / 2), 4);
    for (let i = 0; i < g; i++) types.push('grunt');
    for (let i = 0; i < c; i++) types.push('charger');
    for (let i = 0; i < t; i++) types.push('tank');
    for (let i = 0; i < s; i++) types.push('shooter');
  }
  // Shuffle
  for (let i = types.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [types[i], types[j]] = [types[j], types[i]];
  }
  return types;
}

function randomSpawnPos() {
  const edge = Math.floor(Math.random() * 4);
  switch (edge) {
    case 0: return { x: Math.random() * CANVAS_W, y: -30 };
    case 1: return { x: CANVAS_W + 30, y: Math.random() * CANVAS_H };
    case 2: return { x: Math.random() * CANVAS_W, y: CANVAS_H + 30 };
    case 3: return { x: -30, y: Math.random() * CANVAS_H };
  }
}

function updateWaveManager(now) {
  if (waveManager.intermissionActive) {
    if (now > waveManager.intermissionEnd) {
      waveManager.intermissionActive = false;
      waveManager.spawnQueue = buildWave(waveManager.wave);
      waveManager.spawnTimer = now + 500;
    }
    return;
  }

  if (waveManager.spawnQueue.length > 0 && now > waveManager.spawnTimer) {
    const type = waveManager.spawnQueue.shift();
    const pos = randomSpawnPos();
    enemies.push(createEnemy(type, pos.x, pos.y));
    waveManager.spawnTimer = now + SPAWN_INTERVAL;
  }

  if (waveManager.spawnQueue.length === 0 && enemies.filter(e => e.alive).length === 0) {
    waveManager.wave++;
    game.wave = waveManager.wave;
    waveManager.intermissionActive = true;
    waveManager.intermissionEnd = now + WAVE_INTERMISSION_MS;
  }
}

// ============================================================
// HUD & OVERLAYS
// ============================================================
function drawBackground(ctx) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CANVAS_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= CANVAS_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }
}

function drawHUD(ctx, now) {
  // HP bar
  const hpFrac = player.hp / player.maxHp;
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('HP', 12, 33);
  drawHealthBar(ctx, 110, 20, 150, 14, hpFrac);
  ctx.font = '10px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(`${player.hp} / ${player.maxHp}`, 189, 31);

  // Wave
  ctx.textAlign = 'center';
  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`WAVE ${game.wave}`, CANVAS_W / 2, 24);
  const alive = enemies.filter(e => e.alive).length;
  const remaining = alive + waveManager.spawnQueue.length;
  ctx.font = '11px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText(`ENEMIES: ${remaining}`, CANVAS_W / 2, 40);

  // Score
  ctx.textAlign = 'right';
  ctx.font = '14px monospace';
  ctx.fillStyle = PALETTE[4];
  ctx.fillText(`SCORE: ${String(game.score).padStart(6, '0')}`, CANVAS_W - 16, 28);

  ctx.textAlign = 'left';
}

function drawIntermission(ctx, now) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, CANVAS_H / 2 - 50, CANVAS_W, 90);

  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = PALETTE[14];
  ctx.fillText(`WAVE ${game.wave - 1} COMPLETE!`, CANVAS_W / 2, CANVAS_H / 2 - 8);

  const sec = Math.ceil((waveManager.intermissionEnd - now) / 1000);
  ctx.font = '16px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`NEXT WAVE IN ${Math.max(0, sec)}s`, CANVAS_W / 2, CANVAS_H / 2 + 24);

  ctx.textAlign = 'left';
}

function drawGameOver(ctx) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Decorative pixel border
  ctx.strokeStyle = PALETTE[5];
  ctx.lineWidth = 4;
  ctx.strokeRect(40, CANVAS_H / 2 - 130, CANVAS_W - 80, 260);

  ctx.textAlign = 'center';
  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = PALETTE[5];
  ctx.fillText('GAME OVER', CANVAS_W / 2, CANVAS_H / 2 - 50);

  ctx.font = 'bold 24px monospace';
  ctx.fillStyle = PALETTE[4];
  ctx.fillText(`SCORE: ${String(game.score).padStart(6, '0')}`, CANVAS_W / 2, CANVAS_H / 2 + 10);

  ctx.font = '18px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`WAVE REACHED: ${game.wave}`, CANVAS_W / 2, CANVAS_H / 2 + 48);

  ctx.font = '13px monospace';
  ctx.fillStyle = PALETTE[14];
  const blink = Math.sin(performance.now() / 400) > 0;
  if (blink) ctx.fillText('[ CLICK OR PRESS R TO RESTART ]', CANVAS_W / 2, CANVAS_H / 2 + 92);

  ctx.textAlign = 'left';
}

// ============================================================
// GAME STATE
// ============================================================
const game = { state: 'playing', score: 0, wave: 1, lastTime: 0 };

let player = new Player(CANVAS_W / 2, CANVAS_H / 2);
let enemies = [];
let bullets = [];
let particles = [];

waveManager.spawnQueue = buildWave(1);
waveManager.spawnTimer = performance.now() + 1000;

function resetGame() {
  player = new Player(CANVAS_W / 2, CANVAS_H / 2);
  enemies = [];
  bullets = [];
  particles = [];
  game.score = 0;
  game.wave = 1;
  game.state = 'playing';
  waveManager.wave = 1;
  waveManager.spawnQueue = buildWave(1);
  waveManager.spawnTimer = performance.now() + 1000;
  waveManager.intermissionActive = false;
}

function pruneArrays() {
  bullets   = bullets.filter(b => b.alive);
  enemies   = enemies.filter(e => e.alive);
  particles = particles.filter(p => p.alive);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - game.lastTime, 50);
  game.lastTime = timestamp;
  const now = timestamp;

  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground(ctx);

  if (game.state === 'playing' || game.state === 'intermission') {
    updateWaveManager(now);

    if (player.alive) {
      player.update(dt, now);
      updateEnemies(dt, now);
      updateBullets(dt);
      checkPlayerBulletsVsEnemies();
      checkEnemyBulletsVsPlayer(now);
      separateEnemies();
    }

    updateAndDrawParticles(ctx, now);
    drawBullets(ctx);
    drawEnemies(ctx, now);
    if (player.alive) player.draw(ctx, now);
    drawHUD(ctx, now);

    if (waveManager.intermissionActive) drawIntermission(ctx, now);

    if (!player.alive) game.state = 'gameover';

  } else if (game.state === 'gameover') {
    drawGameOver(ctx);
  }

  pruneArrays();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(ts => { game.lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
