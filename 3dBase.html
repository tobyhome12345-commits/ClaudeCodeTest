<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; cursor: none; }
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.72);
      color: #e8d5b0; font-family: monospace; font-size: 16px; z-index: 10;
    }
    #overlay h1 { font-size: 36px; letter-spacing: 4px; margin-bottom: 8px; color: #fff; }
    #overlay .hint { font-size: 13px; color: #aaa; margin-top: 16px; }
    #overlay .controls { font-size: 13px; color: #c8c8c8; line-height: 2; text-align: center; }
    #overlay.hidden { display: none; }
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      width: 10px; height: 10px;
      border: 2px solid rgba(255,255,255,0.75); border-radius: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 5; display: none;
    }
    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #e8d5b0; font-family: monospace; font-size: 13px; line-height: 1.8;
      z-index: 5; pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="crosshair"></div>
<div id="hud"></div>
<div id="overlay">
  <h1>EXPLORER</h1>
  <div class="controls">
    WASD &nbsp;&nbsp; Move / Swim<br>
    SHIFT &nbsp; Sprint<br>
    SPACE &nbsp; Jump<br>
    E &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Open / Close door<br>
    MOUSE &nbsp; Look
  </div>
  <div class="hint">Click to explore &mdash; ESC to pause</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const WALK_SPEED        = 6;
const SPRINT_SPEED      = 14;
const SWIM_SPEED        = 3;
const JUMP_FORCE        = 9;
const GRAVITY           = -22;
const WATER_LEVEL       = 0;
const BUOYANCY_K        = 14;
const WATER_DAMPING     = 0.87;

const CAM_DISTANCE      = 8;
const CAM_PITCH_MIN     = 0.05;
const CAM_PITCH_MAX     = 1.65;
const CAM_HEIGHT_OFFSET = 1.6;
const MOUSE_SENSITIVITY = 0.0025;

const PLAYER_BODY_W     = 0.5;
const PLAYER_BODY_H     = 1.0;
const PLAYER_BODY_D     = 0.5;
const PLAYER_BODY_COLOR = 0x4a90d9;
const PLAYER_HEAD_COLOR = 0x2c5282;
const PLAYER_RADIUS     = 0.25;  // collision radius

const BOB_FREQ          = 8;
const BOB_AMPLITUDE     = 0.06;
const SPRINT_BOB_MULT   = 1.6;

const GROUND_SIZE       = 200;
const GROUND_SEGS       = 100;
const GROUND_COLOR      = 0x3a8a3a;
const WATER_COLOR       = 0x1a6ea0;

// Village terrain: perfectly flat within VILLAGE_INNER units of centre,
// then blends back to natural terrain by VILLAGE_OUTER units.
const VILLAGE_FLOOR     = 1.55;
const VILLAGE_INNER     = 17;   // all house/path positions are within this
const VILLAGE_OUTER     = 30;

const TREE_COUNT        = 150;
const TREE_TRUNK_COLOR  = 0x6b4226;
const TREE_LEAF_COLOR   = 0x2d6a2d;

const DOOR_INTERACT_DIST = 2.8;
const FOG_COLOR         = 0x87ceeb;
const FOG_NEAR          = 40;
const FOG_FAR           = 120;

// ═══════════════════════════════════════════════════════════════
// SCENE SETUP
// ═══════════════════════════════════════════════════════════════
const canvas    = document.getElementById('gameCanvas');
const overlay   = document.getElementById('overlay');
const crosshair = document.getElementById('crosshair');
const hudEl     = document.getElementById('hud');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(FOG_COLOR);
scene.fog = new THREE.Fog(FOG_COLOR, FOG_NEAR, FOG_FAR);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════
const keys = {};
let ePressedThisFrame = false;

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') ePressedThisFrame = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ═══════════════════════════════════════════════════════════════
// TERRAIN HEIGHT
// ═══════════════════════════════════════════════════════════════
// Perfectly flat at VILLAGE_FLOOR within VILLAGE_INNER units, then blends
// smoothly to natural sine-wave terrain by VILLAGE_OUTER units.
function terrainHeight(x, z) {
  const raw =
    Math.sin(x * 0.08) * Math.cos(z * 0.06) * 3.5 +
    Math.sin(x * 0.15 + 1.2) * Math.sin(z * 0.12) * 2.0 +
    Math.cos(x * 0.05 + z * 0.04) * 1.5 +
    Math.sin(x * 0.25 + 0.5) * Math.cos(z * 0.20) * 0.8;
  const d     = Math.sqrt(x * x + z * z);
  const blend = d <= VILLAGE_INNER ? 1
              : d >= VILLAGE_OUTER ? 0
              : 1 - (d - VILLAGE_INNER) / (VILLAGE_OUTER - VILLAGE_INNER);
  return raw * (1 - blend) + VILLAGE_FLOOR * blend;
}

// ═══════════════════════════════════════════════════════════════
// CAMERA ORBIT STATE
// ═══════════════════════════════════════════════════════════════
const cam = { yaw: 0, pitch: 0.6, distance: CAM_DISTANCE };
const camTarget = new THREE.Vector3();

function updateCamera(playerPos) {
  camTarget.set(playerPos.x, playerPos.y + CAM_HEIGHT_OFFSET, playerPos.z);
  const sp = Math.sin(cam.pitch), cp = Math.cos(cam.pitch);
  const sy = Math.sin(cam.yaw),   cy = Math.cos(cam.yaw);
  camera.position.set(
    camTarget.x + cam.distance * sp * sy,
    camTarget.y + cam.distance * cp,
    camTarget.z + cam.distance * sp * cy
  );
  camera.lookAt(camTarget);
}

// ═══════════════════════════════════════════════════════════════
// WALL COLLIDERS
// ═══════════════════════════════════════════════════════════════
// Each entry: { minX, maxX, minZ, maxZ, enabled }
// Populated by createWallColliders() called from buildHouse().
const wallColliders = [];

function checkWall(x, z) {
  const r = PLAYER_RADIUS;
  for (const w of wallColliders) {
    if (!w.enabled) continue;
    if (x > w.minX - r && x < w.maxX + r &&
        z > w.minZ - r && z < w.maxZ + r) return true;
  }
  return false;
}

// Build 5 permanent wall colliders + 1 door-gap collider for a house.
// All coordinates are in world space. Returns the index of the door-gap collider.
// ry must be a multiple of PI/2 — cos/sin are rounded to integers for exact math.
function createWallColliders(hx, hz, ry, W, D) {
  const wh = 0.18; // half-thickness of each collider box
  const dW = 0.9;  // door width (matches visual)

  // Local-space wall AABBs  [lx_min, lx_max, lz_min, lz_max]
  const localWalls = [
    [-W/2 - wh,  W/2 + wh,   D/2 - wh,  D/2 + wh], // back
    [-W/2 - wh, -W/2 + wh,  -D/2,        D/2     ], // left
    [ W/2 - wh,  W/2 + wh,  -D/2,        D/2     ], // right
    [-W/2,      -dW/2,      -D/2 - wh,  -D/2 + wh], // front-left  (beside door)
    [ dW/2,      W/2,       -D/2 - wh,  -D/2 + wh], // front-right (beside door)
    [-dW/2,      dW/2,      -D/2 - wh,  -D/2 + wh], // door gap    (toggled by E)
  ];

  const c = Math.round(Math.cos(ry));
  const s = Math.round(Math.sin(ry));

  function toWorld(lx, lz) {
    return [hx + lx * c - lz * s, hz + lx * s + lz * c];
  }

  const doorGapIdx = wallColliders.length + 5; // 5 permanent walls pushed first

  localWalls.forEach((wall, i) => {
    const [lx1, lx2, lz1, lz2] = wall;
    const pts = [toWorld(lx1,lz1), toWorld(lx2,lz1), toWorld(lx1,lz2), toWorld(lx2,lz2)];
    wallColliders.push({
      minX: Math.min(...pts.map(p => p[0])),
      maxX: Math.max(...pts.map(p => p[0])),
      minZ: Math.min(...pts.map(p => p[1])),
      maxZ: Math.max(...pts.map(p => p[1])),
      enabled: true, // door-gap starts enabled (= door is closed)
    });
  });

  return doorGapIdx;
}

// ═══════════════════════════════════════════════════════════════
// PLAYER CLASS
// ═══════════════════════════════════════════════════════════════
class Player {
  constructor() {
    this.pos         = new THREE.Vector3(0, VILLAGE_FLOOR, 0);
    this.vy          = 0;
    this.onGround    = true;
    this.isSwimming  = false;
    this.walkTime    = 0;
    this.isMoving    = false;
    this.isSprinting = false;
    this.facingYaw   = 0;
    this._buildMesh();
  }

  _buildMesh() {
    this.bodyMesh = new THREE.Mesh(
      new THREE.BoxGeometry(PLAYER_BODY_W, PLAYER_BODY_H, PLAYER_BODY_D),
      new THREE.MeshLambertMaterial({ color: PLAYER_BODY_COLOR })
    );
    this.headMesh = new THREE.Mesh(
      new THREE.BoxGeometry(PLAYER_BODY_W*0.8, PLAYER_BODY_H*0.4, PLAYER_BODY_D*0.8),
      new THREE.MeshLambertMaterial({ color: PLAYER_HEAD_COLOR })
    );
    this.bodyMesh.castShadow = true;
    this.headMesh.castShadow = true;
    this.headMesh.position.y = PLAYER_BODY_H / 2 + PLAYER_BODY_H * 0.2;
    this.group = new THREE.Group();
    this.group.add(this.bodyMesh);
    this.group.add(this.headMesh);
    scene.add(this.group);
  }

  update(dt) {
    const dtS      = dt / 1000;
    const terrainH = terrainHeight(this.pos.x, this.pos.z);
    const overLake  = terrainH < WATER_LEVEL;

    // ── Swim state ────────────────────────────────────────────
    if (overLake && this.pos.y <= WATER_LEVEL + 0.15) this.isSwimming = true;
    else if (!overLake) this.isSwimming = false;

    // ── Speed ────────────────────────────────────────────────
    const speed = this.isSwimming ? SWIM_SPEED
                : (keys['ShiftLeft'] || keys['ShiftRight']) ? SPRINT_SPEED
                : WALK_SPEED;
    this.isSprinting = !this.isSwimming && speed === SPRINT_SPEED;

    // ── Horizontal movement with wall sliding ─────────────────
    let dx = 0, dz = 0;
    if (keys['KeyW'] || keys['ArrowUp'])    dz -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  dz += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
    this.isMoving = (dx !== 0 || dz !== 0);

    if (this.isMoving) {
      const len     = Math.sqrt(dx*dx + dz*dz);
      dx /= len; dz /= len;
      const cosY    = Math.cos(cam.yaw), sinY = Math.sin(cam.yaw);
      const worldDx = dx * cosY + dz * sinY;
      const worldDz = dx * -sinY + dz * cosY;
      const moveX   = worldDx * speed * dtS;
      const moveZ   = worldDz * speed * dtS;

      // Axis-separated collision — try X then Z independently for sliding
      let newX = this.pos.x + moveX;
      let newZ = this.pos.z + moveZ;
      if (checkWall(newX, this.pos.z)) newX = this.pos.x;
      if (checkWall(newX, newZ))       newZ = this.pos.z;
      this.pos.x = newX;
      this.pos.z = newZ;

      this.facingYaw = Math.atan2(worldDx, worldDz);
    }

    // ── Jump ────────────────────────────────────────────────
    if (keys['Space'] && this.onGround && !this.isSwimming) {
      this.vy = JUMP_FORCE;
      this.onGround = false;
    }

    // ── Vertical physics ─────────────────────────────────────
    const recalcH    = terrainHeight(this.pos.x, this.pos.z);
    const recalcLake = recalcH < WATER_LEVEL;

    if (this.isSwimming) {
      this.vy += (WATER_LEVEL - this.pos.y) * BUOYANCY_K * dtS;
      this.vy *= WATER_DAMPING;
      this.vy  = Math.max(-3, Math.min(3, this.vy));
      this.pos.y += this.vy * dtS;
      this.pos.y  = Math.min(this.pos.y, WATER_LEVEL);
      this.onGround = this.pos.y >= WATER_LEVEL - 0.05;
      if (!recalcLake && this.pos.y <= recalcH) {
        this.isSwimming = false; this.pos.y = recalcH; this.vy = 0; this.onGround = true;
      }
    } else if (!this.onGround) {
      this.vy      += GRAVITY * dtS;
      this.pos.y   += this.vy * dtS;
      if (this.pos.y <= recalcH) {
        this.pos.y = recalcH; this.vy = 0; this.onGround = true;
      }
      if (recalcLake && this.pos.y <= WATER_LEVEL) {
        this.isSwimming = true; this.vy *= 0.3; this.pos.y = Math.min(this.pos.y, WATER_LEVEL);
      }
    } else {
      this.pos.y = recalcH;
    }

    // ── Walking bob ──────────────────────────────────────────
    if (this.isMoving && this.onGround && !this.isSwimming)
      this.walkTime += dtS * BOB_FREQ * (this.isSprinting ? SPRINT_BOB_MULT : 1);
    else
      this.walkTime += dtS * 4;
    const bobOffset = (this.isMoving && this.onGround && !this.isSwimming)
      ? Math.sin(this.walkTime * Math.PI * 2) * BOB_AMPLITUDE : 0;

    // ── Sync mesh ─────────────────────────────────────────────
    this.group.position.set(this.pos.x, this.pos.y + PLAYER_BODY_H/2 + bobOffset, this.pos.z);
    this.group.rotation.y = this.facingYaw;
    const lean = this.isSprinting && this.isMoving ? -0.18 : 0;
    this.bodyMesh.rotation.x = lean;
    this.headMesh.rotation.x = lean;
  }
}

// ═══════════════════════════════════════════════════════════════
// DOOR SYSTEM
// ═══════════════════════════════════════════════════════════════
// Each entry: { pivot, open, worldPos, doorColliderIdx }
const doors = [];

function tryInteractDoor(playerPos) {
  for (const d of doors) {
    const dx = playerPos.x - d.worldPos.x;
    const dz = playerPos.z - d.worldPos.z;
    if (dx*dx + dz*dz < DOOR_INTERACT_DIST * DOOR_INTERACT_DIST) {
      d.open = !d.open;
      d.pivot.rotation.y = d.open ? Math.PI / 2 : 0;
      wallColliders[d.doorColliderIdx].enabled = !d.open;
      return;
    }
  }
}

function nearestDoor(playerPos) {
  for (const d of doors) {
    const dx = playerPos.x - d.worldPos.x;
    const dz = playerPos.z - d.worldPos.z;
    if (dx*dx + dz*dz < DOOR_INTERACT_DIST * DOOR_INTERACT_DIST) return d;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// HOUSE BUILDER
// ═══════════════════════════════════════════════════════════════
function addBox(parent, px, py, pz, w, h, d, color, noShadow) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(px, py, pz);
  m.castShadow    = !noShadow;
  m.receiveShadow = true;
  parent.add(m);
  return m;
}

// Houses are positioned at exactly terrainHeight(hx, hz) = VILLAGE_FLOOR (since
// all houses sit within VILLAGE_INNER). The walls start at local y=0 = ground level.
function buildHouse(hx, hz, ry, cfg) {
  const { W, D, H, wallColor, roofColor, roofType, doorColor, furnish } = cfg;
  const wt = 0.15, dW = 0.9, dH = 1.9;
  const g  = new THREE.Group();

  // ── Walls ─────────────────────────────────────────────────
  addBox(g, 0,             H/2,       D/2,         W + wt*2, H,    wt, wallColor); // back
  addBox(g, -W/2,          H/2,       0,            wt,       H,    D,  wallColor); // left
  addBox(g,  W/2,          H/2,       0,            wt,       H,    D,  wallColor); // right
  const sw = (W - dW) / 2;
  addBox(g, -(dW/2+sw/2),  H/2,      -D/2,          sw,       H,    wt, wallColor); // front-L
  addBox(g,  (dW/2+sw/2),  H/2,      -D/2,          sw,       H,    wt, wallColor); // front-R
  if (H - dH > 0.05)
    addBox(g, 0, dH+(H-dH)/2, -D/2,  dW, H-dH, wt, wallColor); // above door

  // ── Windows ───────────────────────────────────────────────
  const winColor = 0xadd8e6, fColor = 0x4a3010;
  const winY = H * 0.58, winH = 0.65;
  [-1, 1].forEach(side => {
    const fx = side * (W/2 + wt + 0.01);
    addBox(g, fx,        winY,  0.1, 0.04, winH,      0.85, winColor, true);
    addBox(g, fx,        winY, -0.1, 0.04, winH,      0.85, winColor, true);
    addBox(g, side*(W/2+wt+0.02), winY, 0.1, 0.03, winH+0.1, 0.95, fColor, true);
    addBox(g, side*(W/2+wt+0.02), winY,-0.1, 0.03, winH+0.1, 0.95, fColor, true);
  });

  // ── Roof ──────────────────────────────────────────────────
  if (roofType === 'pyramid') {
    const rm = new THREE.Mesh(
      new THREE.CylinderGeometry(0, (W/2+0.4)*Math.SQRT2, 1.8, 4),
      new THREE.MeshLambertMaterial({ color: roofColor })
    );
    rm.position.y = H + 0.9; rm.rotation.y = Math.PI/4; rm.castShadow = true; g.add(rm);
  } else if (roofType === 'steep') {
    const rm = new THREE.Mesh(
      new THREE.CylinderGeometry(0, (W/2+0.3)*Math.SQRT2, 3.2, 4),
      new THREE.MeshLambertMaterial({ color: roofColor })
    );
    rm.position.y = H + 1.6; rm.rotation.y = Math.PI/4; rm.castShadow = true; g.add(rm);
  } else if (roofType === 'flat') {
    addBox(g, 0, H+0.18, 0, W+0.6, 0.35, D+0.6, roofColor);
    addBox(g, W/4, H+0.7, D/4, 0.4, 0.9, 0.4, 0x555555); // chimney
  } else if (roofType === 'cone') {
    const rm = new THREE.Mesh(
      new THREE.ConeGeometry(W*0.72, 2.2, 9),
      new THREE.MeshLambertMaterial({ color: roofColor })
    );
    rm.position.y = H + 1.1; rm.castShadow = true; g.add(rm);
  }

  // ── Furniture ─────────────────────────────────────────────
  if (furnish) furnish(g, W, D, H);

  // ── Door (pivot at left hinge) ────────────────────────────
  const doorPivot = new THREE.Group();
  doorPivot.position.set(-dW/2, 0, -D/2 - wt/2 - 0.02);
  const dGeo = new THREE.BoxGeometry(dW, dH, 0.07);
  dGeo.translate(dW/2, dH/2, 0);
  const dMesh = new THREE.Mesh(dGeo, new THREE.MeshLambertMaterial({ color: doorColor }));
  dMesh.castShadow = true;
  doorPivot.add(dMesh);
  g.add(doorPivot);

  // ── Add to scene & compute world positions ─────────────────
  g.position.set(hx, VILLAGE_FLOOR, hz);
  g.rotation.y = ry;
  scene.add(g);
  g.updateWorldMatrix(true, true);

  const worldPos = new THREE.Vector3();
  doorPivot.getWorldPosition(worldPos);

  // ── Wall colliders (5 walls + 1 door gap) ─────────────────
  const doorColliderIdx = createWallColliders(hx, hz, ry, W, D);

  doors.push({ pivot: doorPivot, open: false, worldPos, doorColliderIdx });
}

// ═══════════════════════════════════════════════════════════════
// VILLAGE
// ═══════════════════════════════════════════════════════════════
function buildVillage() {
  const VY  = VILLAGE_FLOOR;
  const pathMat = new THREE.MeshLambertMaterial({ color: 0x9a8870 });

  // Cross-shaped dirt path — thin so it sits flush on flat terrain
  const ns = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.04, 32), pathMat);
  ns.position.set(0, VY + 0.02, 0); ns.receiveShadow = true; scene.add(ns);
  const ew = new THREE.Mesh(new THREE.BoxGeometry(32, 0.04, 2.6), pathMat);
  ew.position.set(0, VY + 0.02, 0); ew.receiveShadow = true; scene.add(ew);

  // ── House 1 — Small Cottage (west, ry=PI/2 faces east) ────
  buildHouse(-11, 0, Math.PI / 2, {
    W: 5, D: 4, H: 2.8,
    wallColor: 0xd4956a, roofColor: 0x8b2020, roofType: 'pyramid',
    doorColor: 0x5a3010,
    furnish(g, W, D, H) {
      addBox(g,  0.3, 0.88,  0.5, 1.3, 0.07, 0.75, 0x8b6914);
      addBox(g,  0.3, 0.44,  0.5, 1.2, 0.75, 0.65, 0x6a4e10, true);
      addBox(g,  1.2, 0.46,  0.5, 0.42, 0.06, 0.42, 0x7a5010);
      addBox(g,  1.2, 0.72,  0.7, 0.42, 0.46, 0.06, 0x7a5010);
      addBox(g, -0.6, 0.46,  0.5, 0.42, 0.06, 0.42, 0x7a5010);
      addBox(g, -0.6, 0.72,  0.7, 0.42, 0.46, 0.06, 0x7a5010);
      addBox(g, -W/2+0.55, H*0.42, D/2-0.22, 1.1, H*0.85, 0.38, 0x444040);
      addBox(g, -W/2+0.55, 0.22,   D/2-0.22, 0.6, 0.35,   0.25, 0xff4500);
    }
  });

  // ── House 2 — Farmhouse (east, ry=-PI/2 faces west) ───────
  buildHouse(11, 0, -Math.PI / 2, {
    W: 6, D: 5, H: 3.0,
    wallColor: 0xe8e0c8, roofColor: 0x444444, roofType: 'flat',
    doorColor: 0x2d5a1a,
    furnish(g, W, D, H) {

      addBox(g, -2.0, 0.44, 1.15, 0.95, 0.14, 0.25, 0xffffff);

  // ── House 3 — Tall House (north, ry=PI faces south) ───────
  buildHouse(0, -11, Math.PI, {
    W: 4, D: 4, H: 4.5,

      addBox(g, -W/2+0.32, H*0.5,  D/2-0.28, 0.46, 0.14, 1.25, 0x2060a0, true);
      addBox(g, -W/2+0.32, H*0.7,  D/2-0.28, 0.46, 0.14, 1.25, 0x208020, true);

      addBox(g,  0.6, 0.74, D/2-0.90, 0.44, 0.46, 0.06, 0x7a5010);
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 1.6, 7),
        new THREE.MeshLambertMaterial({ color: 0xc8a020 })
      );
      pole.position.set(-0.5, 0.8, -0.6); pole.castShadow = true; g.add(pole);
      const shade = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 8, 6),
        new THREE.MeshLambertMaterial({ color: 0xffee88 })
      );
      shade.position.set(-0.5, 1.7, -0.6); g.add(shade);
    }
  });

  // ── House 4 — Hut (south, ry=0 faces north) ───────────────
  buildHouse(0, 11, 0, {
    W: 5, D: 5, H: 2.2,
    wallColor: 0xc8b878, roofColor: 0x3a7a1a, roofType: 'cone',
    doorColor: 0x9a7030,
    furnish(g, W, D, H) {
      addBox(g, -1.3, 0.07,  1.6, 1.6, 0.12, 2.4, 0xc87850);
      addBox(g, -1.3, 0.21,  0.65, 1.6, 0.12, 0.38, 0xf0e8d0);
      addBox(g,  0.8, 0.14,  0.7, 0.85, 0.14, 0.85, 0x555555);
      addBox(g,  0.8, 0.28,  0.7, 0.3,  0.22, 0.3,  0xff4500);
      addBox(g, W/2-0.45, 0.28, D/2-0.45, 0.65, 0.52, 0.65, 0x6b4020);

      const herb = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 0.55, 5),

// ═══════════════════════════════════════════════════════════════
// SCENE BUILD
// ═══════════════════════════════════════════════════════════════
function makePRNG(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0xffffffff; };
}

function buildScene() {
  // ── Terrain heightfield ──────────────────────────────────
  // PlaneGeometry local XY; after rotation.x=-PI/2 local z→world y.
  // worldX=localX, worldZ=-localY
  const groundGeo = new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE, GROUND_SEGS, GROUND_SEGS);
  const pos = groundGeo.attributes.position;
  for (let i = 0; i < pos.count; i++)
    pos.setZ(i, terrainHeight(pos.getX(i), -pos.getY(i)));
  pos.needsUpdate = true;
  groundGeo.computeVertexNormals();
  const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ color: GROUND_COLOR }));
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Water ────────────────────────────────────────────────
  const water = new THREE.Mesh(
    new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE),
    new THREE.MeshLambertMaterial({ color: WATER_COLOR, transparent: true, opacity: 0.78, side: THREE.DoubleSide })
  );
  water.rotation.x = -Math.PI / 2;
  water.position.y = WATER_LEVEL;
  scene.add(water);

  // ── Trees (outside village radius, on dry land) ───────────
  const rand   = makePRNG(42);
  const trunkMat = new THREE.MeshLambertMaterial({ color: TREE_TRUNK_COLOR });
  const leafMat  = new THREE.MeshLambertMaterial({ color: TREE_LEAF_COLOR });
  const tgA = new THREE.CylinderGeometry(0.12, 0.18, 1.6, 6);
  const tgB = new THREE.CylinderGeometry(0.10, 0.15, 2.2, 6);
  const lgA = new THREE.ConeGeometry(1.1, 2.2, 7);
  const lgB = new THREE.ConeGeometry(0.85, 1.8, 7);

  let placed = 0, attempts = 0;
  while (placed < TREE_COUNT && attempts < TREE_COUNT * 12) {
    attempts++;
    const tx = (rand() - 0.5) * (GROUND_SIZE - 10);
    const tz = (rand() - 0.5) * (GROUND_SIZE - 10);
    if (tx*tx + tz*tz < VILLAGE_INNER * VILLAGE_INNER) continue;
    const h = terrainHeight(tx, tz);
    if (h < WATER_LEVEL + 0.8) continue;
    const big = rand() > 0.45;
    const tH = big ? 1.6 : 2.2, lH = big ? 2.2 : 1.8;
    const trunk  = new THREE.Mesh(big ? tgA : tgB, trunkMat);
    trunk.position.set(tx, h + tH/2, tz); trunk.castShadow = true; scene.add(trunk);
    const leaves = new THREE.Mesh(big ? lgA : lgB, leafMat);
    leaves.position.set(tx, h + tH + lH/2, tz); leaves.castShadow = true; scene.add(leaves);
    placed++;
  }

  // ── Village ───────────────────────────────────────────────
  buildVillage();

  // ── Lights ────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const sun = new THREE.DirectionalLight(0xfff5e0, 0.9);
  sun.position.set(30, 60, 20);
  sun.castShadow = true;
  sun.shadow.mapSize.width  = 1024;
  sun.shadow.mapSize.height = 1024;
  sun.shadow.camera.near   = 0.5;
  sun.shadow.camera.far    = 150;
  sun.shadow.camera.left = sun.shadow.camera.bottom = -70;
  sun.shadow.camera.right = sun.shadow.camera.top   =  70;
  scene.add(sun);
}

// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════
const game = { state: 'locked', lastTime: 0 };

// ═══════════════════════════════════════════════════════════════
// POINTER LOCK
// ═══════════════════════════════════════════════════════════════
overlay.addEventListener('click', () => canvas.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === canvas) {
    game.state = 'playing';
    overlay.classList.add('hidden');
    crosshair.style.display = 'block';
  } else {
    game.state = 'locked';
    overlay.classList.remove('hidden');
    crosshair.style.display = 'none';
    for (const k in keys) keys[k] = false;
  }
});

document.addEventListener('mousemove', e => {
  if (game.state !== 'playing') return;
  cam.yaw   -= e.movementX * MOUSE_SENSITIVITY;
  cam.pitch -= e.movementY * MOUSE_SENSITIVITY;
  cam.pitch  = Math.max(CAM_PITCH_MIN, Math.min(CAM_PITCH_MAX, cam.pitch));
});

// ═══════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════
function updateHUD(player) {
  const state = player.isSwimming  ? 'SWIMMING'
              : player.isSprinting ? 'SPRINTING'
              : player.isMoving    ? 'WALKING'
              : 'IDLE';
  const air      = (!player.onGround && !player.isSwimming) ? '  |  AIRBORNE' : '';
  const door     = nearestDoor(player.pos);
  const doorHint = door
    ? `<br><span style="color:#ffe080">E — ${door.open ? 'Close door' : 'Open door'}</span>`
    : '';
  hudEl.innerHTML =
    `${state}${air}${doorHint}<br>` +
    `<span style="color:#999;font-size:11px">WASD move &nbsp; SHIFT sprint &nbsp; SPACE jump &nbsp; E door &nbsp; ESC pause</span>`;
}

// ═══════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - game.lastTime, 50);
  game.lastTime = timestamp;

  if (game.state === 'playing') {
    if (ePressedThisFrame) tryInteractDoor(player.pos);
    player.update(dt);
    updateCamera(player.pos);
    updateHUD(player);
  }
  ePressedThisFrame = false;

  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

// ── Bootstrap ─────────────────────────────────────────────────
buildScene();
const player = new Player();
updateCamera(player.pos);
requestAnimationFrame(ts => { game.lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
