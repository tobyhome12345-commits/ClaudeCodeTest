<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas { display: block; }

    /* ── Hub button ─────────────────────────────────────────────── */
    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: #a8dadc;
      border: 1px solid #1a3a6a; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; cursor: pointer; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }

    /* ── Gold display ────────────────────────────────────────────── */
    #gold-display {
      position: fixed; top: 14px; right: 14px;
      background: rgba(13,13,26,0.85); color: #f0c060;
      border: 1px solid #7a5020; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.85rem; font-weight: 700;
      letter-spacing: 1px; z-index: 10; pointer-events: none;
    }

    /* ── Interaction prompt ─────────────────────────────────────── */
    #interact-prompt {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;
      padding: 7px 20px; font-size: 0.82rem; letter-spacing: 1.2px;
      text-transform: uppercase; pointer-events: none;
      opacity: 0; transition: opacity 0.15s; z-index: 10; white-space: nowrap;
    }
    #interact-prompt.show { opacity: 1; }

    /* ── Dialog box ─────────────────────────────────────────────── */
    #dialog-box {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: min(540px, 92vw);
      background: rgba(8,12,26,0.97); color: #e8eaf6;
      border: 2px solid #2a5a8a; border-radius: 14px;
      padding: 18px 24px 14px; font-size: 0.93rem; line-height: 1.6;
      display: none; z-index: 20; pointer-events: none;
    }
    #dialog-box.show { display: block; }
    #dialog-name { font-weight: 700; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #a8dadc; margin-bottom: 6px; }
    #dialog-text { color: #dde; }
    #dialog-hint { margin-top: 10px; font-size: 0.7rem; color: #445; letter-spacing: 1px; text-transform: uppercase; text-align: right; }

    /* ── I-menu overlay ─────────────────────────────────────────── */
    #menu-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center;
      z-index: 50;
    }
    #menu-overlay.show { display: flex; }
    #menu-panel {
      background: rgba(8,12,26,0.98);
      border: 1px solid #1a3a6a; border-radius: 16px;
      width: min(480px, 92vw); max-height: 70vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }
    #menu-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 8px 0 0; border-bottom: 1px solid #1a3a6a;
    }
    .menu-tabs { display: flex; }
    .menu-tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: #556; padding: 14px 22px; font-size: 0.78rem;
      font-family: inherit; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: color 0.15s;
    }
    .menu-tab:hover { color: #88a; }
    .menu-tab.active { color: #a8dadc; border-bottom-color: #a8dadc; }
    #menu-close-hint { font-size: 0.65rem; color: #334; letter-spacing: 1.5px; text-transform: uppercase; padding-right: 4px; }
    #menu-gold { font-size: 0.82rem; color: #f0c060; font-weight: 700; padding: 10px 24px; border-bottom: 1px solid #0e1828; }
    #menu-body { padding: 20px 24px; overflow-y: auto; flex: 1; }

    /* Quest entries */
    .quest-entry { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid #111a2e; }
    .quest-entry:last-child { border-bottom: none; margin-bottom: 0; }
    .quest-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .quest-title { font-weight: 700; font-size: 0.95rem; color: #e8eaf6; }
    .quest-badge { font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 12px; font-weight: 700; }
    .badge-active    { background: rgba(90,180,80,.15);  color: #7dc; border: 1px solid rgba(90,180,80,.3); }
    .badge-completed { background: rgba(80,160,220,.15); color: #8cf; border: 1px solid rgba(80,160,220,.3); }
    .quest-desc  { font-size: 0.83rem; color: #778; line-height: 1.5; margin-bottom: 6px; }
    .quest-reward { font-size: 0.75rem; color: #f0c060; margin-bottom: 4px; }
    .quest-progress { font-size: 0.78rem; color: #aaa; }
    .progress-bar-track { height: 4px; background: #111a2e; border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .progress-bar-fill  { height: 100%; background: #4a9; border-radius: 2px; transition: width 0.4s; }

    /* Inventory entries */
    .inv-empty { color: #334; font-size: 0.85rem; text-align: center; padding: 30px 0; letter-spacing: 1px; text-transform: uppercase; }
    .inv-item { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid #111a2e; }
    .inv-item:last-child { border-bottom: none; }
    .inv-icon  { font-size: 1.5rem; }
    .inv-info  { flex: 1; }
    .inv-name  { font-size: 0.9rem; color: #ccd; }
    .inv-tag   { font-size: 0.65rem; color: #556; letter-spacing: 1px; text-transform: uppercase; }
    .inv-count { font-size: 1rem; font-weight: 700; color: #a8dadc; }

    /* ── Shop overlay ────────────────────────────────────────────── */
    #shop-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center;
      z-index: 50;
    }
    #shop-overlay.show { display: flex; }
    #shop-panel {
      background: rgba(8,12,26,0.98);
      border: 1px solid #7a5020; border-radius: 16px;
      width: min(520px, 94vw); max-height: 78vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }
    #shop-top { padding: 14px 20px 0; border-bottom: 1px solid #3a2010; }
    #shop-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    #shop-title { font-size: 1.05rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: #f0c060; }
    #shop-gold-display { font-size: 0.85rem; color: #f0c060; font-weight: 700; }
    .shop-tabs { display: flex; }
    .shop-tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: #556; padding: 10px 20px; font-size: 0.75rem;
      font-family: inherit; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: color 0.15s;
    }
    .shop-tab:hover { color: #c09050; }
    .shop-tab.active { color: #f0c060; border-bottom-color: #f0c060; }
    #shop-body { padding: 14px 20px; overflow-y: auto; flex: 1; }
    #shop-footer { padding: 8px 20px 12px; border-top: 1px solid #2a1808; text-align: right; }
    #shop-close-hint { font-size: 0.65rem; color: #334; letter-spacing: 1.5px; text-transform: uppercase; }

    .shop-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid #0e1828; }
    .shop-item:last-child { border-bottom: none; }
    .shop-item-icon { font-size: 1.5rem; width: 34px; text-align: center; flex-shrink: 0; }
    .shop-item-info { flex: 1; }
    .shop-item-name { font-size: 0.9rem; color: #dde; font-weight: 600; }
    .shop-item-desc { font-size: 0.72rem; color: #556; margin-top: 2px; line-height: 1.4; }
    .shop-item-locked { font-size: 0.7rem; color: #e06040; margin-top: 2px; }
    .shop-item-price { font-size: 0.95rem; color: #f0c060; font-weight: 700; min-width: 52px; text-align: right; padding-right: 10px; flex-shrink: 0; }
    .shop-btn {
      padding: 5px 14px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
      font-family: inherit; transition: filter 0.15s, transform 0.1s; white-space: nowrap; flex-shrink: 0;
    }
    .shop-btn:hover:not(:disabled) { filter: brightness(1.2); transform: scale(1.05); }
    .shop-btn:disabled { opacity: 0.3; cursor: default; }
    .shop-btn-buy  { background: #3a7a2a; color: #cfe; }
    .shop-btn-sell { background: #7a5020; color: #fec; }
    .shop-empty { color: #334; font-size: 0.85rem; text-align: center; padding: 30px 0; letter-spacing: 1px; text-transform: uppercase; }

    /* ── Quest notification toast ────────────────────────────────── */
    #quest-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(8,12,26,0.95); color: #7dc;
      border: 1px solid rgba(90,180,80,.4); border-radius: 10px;
      padding: 10px 22px; font-size: 0.8rem; letter-spacing: 1.5px;
      text-transform: uppercase; pointer-events: none;
      opacity: 0; transition: opacity 0.4s; z-index: 60;
    }
    #quest-toast.show { opacity: 1; }
  </style>
</head>
<body>
<a id="hub-btn" href="index.html">&#8592; Hub</a>
<div id="gold-display">Gold: 40g</div>
<div id="interact-prompt"></div>

<div id="dialog-box">
  <div id="dialog-name"></div>
  <div id="dialog-text"></div>
  <div id="dialog-hint">[F] Continue</div>
</div>

<!-- I-key menu -->
<div id="menu-overlay">
  <div id="menu-panel">
    <div id="menu-header">
      <div class="menu-tabs">
        <button class="menu-tab active" data-tab="quests">Quests</button>
        <button class="menu-tab"        data-tab="inventory">Inventory</button>
      </div>
      <span id="menu-close-hint">[I] Close</span>
    </div>
    <div id="menu-gold">Gold: 40g</div>
    <div id="menu-body"></div>
  </div>
</div>

<!-- Shop overlay -->
<div id="shop-overlay">
  <div id="shop-panel">
    <div id="shop-top">
      <div id="shop-title-row">
        <span id="shop-title">Market</span>
        <span id="shop-gold-display">Gold: 40g</span>
      </div>
      <div class="shop-tabs">
        <button class="shop-tab active" data-stab="buy">Buy</button>
        <button class="shop-tab"        data-stab="sell">Sell</button>
      </div>
    </div>
    <div id="shop-body"></div>
    <div id="shop-footer">
      <span id="shop-close-hint">[E] Close Shop</span>
    </div>
  </div>
</div>

<div id="quest-toast"></div>
<canvas id="canvas"></canvas>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const TILE           = 32;
const MAP_COLS       = 80;
const MAP_ROWS       = 80;
const PLAYER_R       = 9;
const PLAYER_SPEED   = 170;
const SPRINT_SPEED   = 310;
const WALL_T         = 9;
const DOOR_W         = TILE;
const INTERACT_DIST  = 54;
const TALK_DIST      = 48;
const COLLECT_DIST   = 18;
const FARM_INTERACT_DIST = 60;
const SHOP_INTERACT_DIST = 60;
const STARTING_GOLD  = 40;

// ─── Shop catalogue ──────────────────────────────────────────────────────────
const SHOP_CATALOG = [
  { id:'hoe',        name:'Hoe',              icon:'⛏',  price:15,  qty:1, desc:'Till soil so you can plant seeds.' },
  { id:'steelHoe',   name:'Steel Hoe',         icon:'⚒',  price:80,  qty:1, desc:'Halves crop grow time. Required for Herb Seedlings.' },
  { id:'seedCarrot', name:'Carrot Seeds ×3',   icon:'🥕', price:6,   qty:3, desc:'Grows in 25s  ·  Sells for 10g each.' },
  { id:'seedWheat',  name:'Wheat Seeds ×3',    icon:'🌾', price:10,  qty:3, desc:'Grows in 45s  ·  Sells for 18g each.' },
  { id:'seedHerb',   name:'Herb Seedlings ×2', icon:'🌱', price:18,  qty:2, desc:'Grows in 80s  ·  Sells for 35g each. Requires Steel Hoe.' },
];

// ─── Seeded RNG ──────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── Grass map ───────────────────────────────────────────────────────────────
const GRASS_COLORS = ['#4a7c3f','#5a9449','#3a6332','#3d6b35'];
const map = Array.from({ length: MAP_ROWS }, () =>
  Array.from({ length: MAP_COLS }, () => Math.floor(Math.random() * 4))
);
(function () {
  for (let p = 0; p < 200; p++) {
    const cr = Math.floor(Math.random() * MAP_ROWS);
    const cc = Math.floor(Math.random() * MAP_COLS);
    const sz = 2 + Math.floor(Math.random() * 5);
    const v  = Math.floor(Math.random() * 4);
    for (let dr = -sz; dr <= sz; dr++)
      for (let dc = -sz; dc <= sz; dc++)
        if (dr*dr+dc*dc <= sz*sz) {
          const nr = cr+dr, nc = cc+dc;
          if (nr>=0 && nr<MAP_ROWS && nc>=0 && nc<MAP_COLS) map[nr][nc] = v;
        }
  }
})();

const FOREST_C0 = 50, FOREST_R0 = 0, FOREST_C1 = 79, FOREST_R1 = 35;
for (let r = FOREST_R0; r <= FOREST_R1; r++)
  for (let c = FOREST_C0; c <= FOREST_C1; c++)
    map[r][c] = 2;

const mapCanvas = document.createElement('canvas');
mapCanvas.width  = MAP_COLS * TILE;
mapCanvas.height = MAP_ROWS * TILE;
const mctx = mapCanvas.getContext('2d');
(function () {
  for (let r = 0; r < MAP_ROWS; r++)
    for (let c = 0; c < MAP_COLS; c++) {
      mctx.fillStyle = GRASS_COLORS[map[r][c]];
      mctx.fillRect(c*TILE, r*TILE, TILE, TILE);
      mctx.strokeStyle = 'rgba(0,0,0,0.07)';
      mctx.lineWidth = 0.5;
      mctx.strokeRect(c*TILE, r*TILE, TILE, TILE);
    }
  mctx.fillStyle = 'rgba(0,30,0,0.28)';
  mctx.fillRect(FOREST_C0*TILE, FOREST_R0*TILE,
    (FOREST_C1-FOREST_C0+1)*TILE, (FOREST_R1-FOREST_R0+1)*TILE);
  const rng = mulberry32(77);
  for (let i = 0; i < 1200; i++) {
    const x = rng() * MAP_COLS * TILE;
    const y = rng() * MAP_ROWS * TILE;
    const h = 4 + rng() * 7, lean = (rng()-0.5)*5;
    mctx.strokeStyle = rng()>0.5 ? '#2e5227' : '#6aab5a';
    mctx.lineWidth = 1;
    mctx.beginPath(); mctx.moveTo(x,y); mctx.lineTo(x+lean,y-h); mctx.stroke();
  }
})();

// ─── Trees ───────────────────────────────────────────────────────────────────
const trees = [];
const trng = mulberry32(123);
for (let gr = FOREST_R0+1; gr < FOREST_R1; gr += 4) {
  for (let gc = FOREST_C0+1; gc < FOREST_C1; gc += 4) {
    const jx = (trng()-0.5)*TILE*1.2, jy = (trng()-0.5)*TILE*1.2;
    const r = 10+trng()*5;
    trees.push({ x: gc*TILE+TILE/2+jx, y: gr*TILE+TILE/2+jy, r, canopyR: r*2.1+trng()*6 });
  }
}

function drawTree(ctx2, tree) {
  const { x, y, r, canopyR } = tree;
  ctx2.save(); ctx2.globalAlpha=0.18; ctx2.fillStyle='#000';
  ctx2.beginPath(); ctx2.ellipse(x+4, y+r*0.9, canopyR*0.7, canopyR*0.28, 0, 0, Math.PI*2); ctx2.fill(); ctx2.restore();
  ctx2.fillStyle='#5c3a1e'; ctx2.fillRect(x-4, y-r*0.3, 8, r*0.9);
  for (let layer=2; layer>=0; layer--) {
    const ly=y-r*0.4-layer*canopyR*0.22, lr=canopyR*(1-layer*0.18);
    const g=ctx2.createRadialGradient(x-lr*0.2, ly-lr*0.2, 1, x, ly, lr);
    g.addColorStop(0, layer===0?'#6ab84a':'#4e9636'); g.addColorStop(1,'#2c6018');
    ctx2.beginPath(); ctx2.arc(x,ly,lr,0,Math.PI*2); ctx2.fillStyle=g; ctx2.fill();
    ctx2.strokeStyle='rgba(0,0,0,0.15)'; ctx2.lineWidth=1; ctx2.stroke();
  }
}

// ─── Houses ──────────────────────────────────────────────────────────────────
const HOUSE_DEFS = [
  { tx:  5, ty:  5, wallColor:'#c9935a', roofColor:'#7a3b1e' },
  { tx: 48, ty:  6, wallColor:'#b8a070', roofColor:'#5c3b18' },
  { tx:  6, ty: 50, wallColor:'#c4a882', roofColor:'#6b3d1a' },
  { tx: 50, ty: 50, wallColor:'#b09060', roofColor:'#4e2e10' },
  { tx: 36, ty: 10, wallColor:'#d4a96a', roofColor:'#8a4820' },
  { tx: 10, ty: 36, wallColor:'#bf9355', roofColor:'#6e3a16' },
];
const houses = HOUSE_DEFS.map(d => ({
  x:d.tx*TILE, y:d.ty*TILE, w:4*TILE, h:3*TILE,
  wallColor:d.wallColor, roofColor:d.roofColor, doorOpen:false,
}));

function getHouseWalls(house) {
  const { x,y,w,h,doorOpen } = house;
  const ds = w/2-DOOR_W/2;
  const rects = [
    {x,y,w,h:WALL_T}, {x,y,w:WALL_T,h}, {x:x+w-WALL_T,y,w:WALL_T,h},
    {x,y:y+h-WALL_T,w:ds,h:WALL_T},
    {x:x+ds+DOOR_W,y:y+h-WALL_T,w:w-ds-DOOR_W,h:WALL_T},
  ];
  if (!doorOpen) rects.push({x:x+ds,y:y+h-WALL_T,w:DOOR_W,h:WALL_T});
  return rects;
}
function doorCenter(house) { return {x:house.x+house.w/2, y:house.y+house.h}; }

// ─── Quests ──────────────────────────────────────────────────────────────────
const quests = {
  lostSheep: {
    id:'lostSheep', title:'Lost Sheep', giver:'Finn',
    description:"Finn's 10 sheep have wandered off across the fields.",
    type:'collect', itemId:'sheep', required:10, reward:50, status:'inactive',
  },
  forestHerbs: {
    id:'forestHerbs', title:'Forest Herbs', giver:'Old Maren',
    description:'Collect 5 medicinal herbs from the forest for Old Maren.',
    type:'collect', itemId:'herb', required:5, reward:40, status:'inactive',
  },
  greenThumb: {
    id:'greenThumb', title:'Green Thumb', giver:'Merchant',
    description:'Harvest 5 crops from your farm plots.',
    type:'harvest', required:5, progress:0, reward:75, status:'inactive',
  },
};

// ─── Inventory ───────────────────────────────────────────────────────────────
const inventory = {
  // Quest collectibles
  sheep:      { name:'Sheep',            icon:'🐑', count:0 },
  herb:       { name:'Medicinal Herb',   icon:'🌿', count:0 },
  // Tools
  hoe:        { name:'Hoe',              icon:'⛏', count:0, type:'tool' },
  steelHoe:   { name:'Steel Hoe',        icon:'⚒', count:0, type:'tool' },
  // Seeds
  seedCarrot: { name:'Carrot Seeds',     icon:'🥕', count:0, type:'seed', growsInto:'carrot',  growTime:25 },
  seedWheat:  { name:'Wheat Seeds',      icon:'🌾', count:0, type:'seed', growsInto:'wheat',   growTime:45 },
  seedHerb:   { name:'Herb Seedlings',   icon:'🌱', count:0, type:'seed', growsInto:'herbCrop',growTime:80 },
  // Crops (sellable)
  carrot:     { name:'Carrot',   icon:'🥕', count:0, type:'crop', sellPrice:10 },
  wheat:      { name:'Wheat',    icon:'🌾', count:0, type:'crop', sellPrice:18 },
  herbCrop:   { name:'Herb',     icon:'🌿', count:0, type:'crop', sellPrice:35 },
};

// ─── Collectibles ─────────────────────────────────────────────────────────────
const SHEEP_SPOTS = [
  {tx:11,ty:12},{tx:15,ty:11},{tx:18,ty:14},{tx:22,ty:30},
  {tx:24,ty:26},{tx:19,ty:32},{tx:44,ty:18},{tx:46,ty:23},
  {tx:40,ty:22},{tx:30,ty:20},
];
const HERB_SPOTS = [
  {tx:54,ty:8},{tx:62,ty:14},{tx:70,ty:6},{tx:58,ty:22},{tx:66,ty:18},
];

const collectibles = [
  ...SHEEP_SPOTS.map(p => ({x:p.tx*TILE+TILE/2, y:p.ty*TILE+TILE/2, itemId:'sheep', collected:false})),
  ...HERB_SPOTS.map(p => ({x:p.tx*TILE+TILE/2, y:p.ty*TILE+TILE/2, itemId:'herb',  collected:false})),
];

function getQuestForItem(itemId) {
  return Object.values(quests).find(q => q.itemId === itemId) || null;
}

function drawCollectible(ctx2, c) {
  const { x, y, itemId } = c;
  if (itemId === 'sheep') {
    ctx2.fillStyle = 'rgba(0,0,0,0.15)';
    ctx2.beginPath(); ctx2.ellipse(x+2, y+8, 7, 3, 0, 0, Math.PI*2); ctx2.fill();
    ctx2.fillStyle = '#f0f0ee';
    ctx2.beginPath(); ctx2.arc(x, y, 8, 0, Math.PI*2); ctx2.fill();
    ctx2.fillStyle = '#e0e0dc';
    ctx2.beginPath(); ctx2.arc(x-4, y-2, 5, 0, Math.PI*2); ctx2.fill();

  cropId: null, plantedAt: 0, growTime: 0,
}));

function findAvailableSeed() {
  for (const [k, v] of Object.entries(inventory)) {
    if (v.type !== 'seed' || !v.count) continue;
    if (k === 'seedHerb' && !inventory.steelHoe.count) continue;
    return k;
  }
  return null;
}

function getFarmPrompt(plot) {
  if (plot.state === 'idle') {
    if (inventory.hoe.count || inventory.steelHoe.count)
      return { label:'[E] Till soil', canInteract:true };
    return { label:'Farm plot — needs Hoe', canInteract:false };
  }
  if (plot.state === 'tilled') {
    const sid = findAvailableSeed();
    if (sid) return { label:`[E] Plant ${inventory[sid].name}`, canInteract:true };
    return { label:'Tilled — buy seeds at shop', canInteract:false };
  }
  if (plot.state === 'seeded') {
    const rem = Math.max(0, Math.ceil((plot.plantedAt + plot.growTime - Date.now()) / 1000));
    return rem > 0
      ? { label:`Growing… ${rem}s remaining`, canInteract:false }
      : null; // state will flip to 'grown' in update()
  }
  if (plot.state === 'grown') return { label:'[E] Harvest', canInteract:true };
  return null;
}

function doFarmAction(plot) {
  if (plot.state === 'idle') {
    plot.state = 'tilled';
    showToast('Soil tilled!');
  } else if (plot.state === 'tilled') {
    const sid = findAvailableSeed();
    if (!sid) return;
    const seedItem = inventory[sid];
    const growMs = inventory.steelHoe.count
      ? seedItem.growTime * 500   // halved with Steel Hoe
      : seedItem.growTime * 1000;
    plot.state     = 'seeded';
    plot.cropId    = seedItem.growsInto;
    plot.growTime  = growMs;
    plot.plantedAt = Date.now();
    inventory[sid].count--;
    showToast(`Planted: ${seedItem.name}`);
  } else if (plot.state === 'grown') {
    const cropId = plot.cropId;
    inventory[cropId].count++;
    plot.state = 'idle'; plot.cropId = null; plot.growTime = 0;
    // Green Thumb quest progress
    if (quests.greenThumb.status === 'active') {
      quests.greenThumb.progress++;
      renderMenu();
      if (quests.greenThumb.progress >= quests.greenThumb.required)
        showToast('Return to Merchant to complete: Green Thumb!');
    }
    showToast(`Harvested: ${inventory[cropId].name}!`);
    updateGoldDisplay();
  }
}

function drawFarmPlot(ctx2, plot) {
  const { x, y, state, cropId } = plot;
  const hw = TILE * 0.44;

  ctx2.fillStyle = state === 'idle' ? '#7a5028' : '#4e3010';

// ─── Dialog helpers ──────────────────────────────────────────────────────────
function buildDialogForVillager(v) {
  if (!v.questId) return { lines:[...v.lines], hint:'[F] Continue', onComplete:null };
  const q = quests[v.questId];
  const have = q.type==='harvest'
    ? (q.progress||0)
    : (inventory[q.itemId]||{count:0}).count;

  if (q.status === 'inactive') {
    let offerLines;
    if (q.id === 'lostSheep') offerLines = [
      'Oh, thank goodness someone stopped by!',
      'My 10 sheep have wandered off across the fields.',
      `Would you find them and bring them back? I will pay ${q.reward}g!`,
    ];
    else if (q.id === 'forestHerbs') offerLines = [
      'My old bones ache something fierce this season.',
      'I need five healing herbs from the forest, but I dare not go myself.',
      `Would you fetch them for me? Worth ${q.reward}g.`,
    ];
    else offerLines = [
      "I see you're new to farming, friend.",
      'Till a plot, plant some seeds, and harvest the crops.',
      `Bring me proof of 5 harvests and I'll pay you ${q.reward}g.`,
    ];
    return {
      lines: offerLines, hint: '[F] Accept Quest',
      onComplete: () => { q.status = 'active'; showToast('Quest started: ' + q.title); renderMenu(); },
    };
  }

  if (q.status === 'active') {
    if (have >= q.required) {
      let turnInLines;
      if (q.id === 'lostSheep') turnInLines = [
        'You found all 10 of my sheep!',
        'Thank you so very much — I was so worried!',
        `Here is your ${q.reward}g reward.`,
      ];
      else if (q.id === 'forestHerbs') turnInLines = [
        'Bless you, child. All five herbs!',
        'These will keep the whole village healthy through winter.',
        `Here — ${q.reward}g as promised.`,
      ];
      else turnInLines = [
        'Five harvests — impressive!',
        `Here is your ${q.reward}g as promised. Happy farming!`,
      ];
      return {
        lines: turnInLines, hint: '[F] Complete Quest',
        onComplete: () => {
          q.status = 'completed';
          if (q.type !== 'harvest') inventory[q.itemId].count -= q.required;
          player.gold += q.reward;
          updateGoldDisplay();
          showToast(`Quest complete! +${q.reward}g`);
          renderMenu();
        },
      };
    }
    let progressLines;
    if (q.id === 'lostSheep') progressLines = [
      'Any sign of my sheep?',
      `You have ${have} of ${q.required} so far. Keep looking!`,
    ];
    else if (q.id === 'forestHerbs') progressLines = [
      'Have you found the herbs yet?',
      `You have ${have} of ${q.required} needed. They are in the forest.`,
    ];
    else progressLines = [
      "How's the farming going?",
      `You've harvested ${have} of ${q.required} crops. Keep at it!`,
    ];
    return { lines: progressLines, hint: '[F] Continue', onComplete: null };
  }

  return { lines:[...v.completedLines], hint:'[F] Continue', onComplete:null };
}

// ─── Player ──────────────────────────────────────────────────────────────────
const player = {
  x: (MAP_COLS/2)*TILE, y: (MAP_ROWS/2)*TILE,
  gold: STARTING_GOLD,
  sprinting: false, walkCycle: 0,
};

function drawPlayer(ctx2, p) {
  const {x,y,walkCycle,sprinting}=p;
  const moving=keys['w']||keys['s']||keys['a']||keys['d']||
               keys['arrowup']||keys['arrowdown']||keys['arrowleft']||keys['arrowright'];
  const wb=moving?Math.sin(walkCycle*8)*3:0;
  ctx2.save(); ctx2.globalAlpha=0.2; ctx2.fillStyle='#000';
  ctx2.beginPath(); ctx2.ellipse(x,y+12,9,3.5,0,0,Math.PI*2); ctx2.fill(); ctx2.restore();
  ctx2.strokeStyle=sprinting?'#3355bb':'#4466aa'; ctx2.lineWidth=4; ctx2.lineCap='round';
  ctx2.beginPath(); ctx2.moveTo(x-3,y+3); ctx2.lineTo(x-3+wb,y+12); ctx2.stroke();
  ctx2.beginPath(); ctx2.moveTo(x+3,y+3); ctx2.lineTo(x+3-wb,y+12); ctx2.stroke();
  ctx2.fillStyle=sprinting?'#cc5533':'#3377cc';
  ctx2.beginPath(); ctx2.roundRect(x-6,y-8,12,13,3); ctx2.fill();
  ctx2.strokeStyle='#e0aa80'; ctx2.lineWidth=3; ctx2.lineCap='round';
  ctx2.beginPath(); ctx2.moveTo(x-6,y-5); ctx2.lineTo(x-11,y+1+wb); ctx2.stroke();
  ctx2.beginPath(); ctx2.moveTo(x+6,y-5); ctx2.lineTo(x+11,y+1-wb); ctx2.stroke();
  ctx2.fillStyle='#e8b070';
  ctx2.beginPath(); ctx2.arc(x,y-15,8,0,Math.PI*2); ctx2.fill();
  ctx2.strokeStyle='rgba(0,0,0,0.2)'; ctx2.lineWidth=1; ctx2.stroke();
  ctx2.fillStyle='#5c3010';
  ctx2.beginPath(); ctx2.ellipse(x,y-20,8,5,0,Math.PI,Math.PI*2); ctx2.fill();
  ctx2.fillStyle='#333';
  ctx2.beginPath(); ctx2.arc(x-3,y-15,1.3,0,Math.PI*2); ctx2.fill();
  ctx2.beginPath(); ctx2.arc(x+3,y-15,1.3,0,Math.PI*2); ctx2.fill();
}

// ─── Collision ───────────────────────────────────────────────────────────────
function resolveCircleRect(px,py,rect) {
  const nx=Math.max(rect.x,Math.min(px,rect.x+rect.w));
  const ny=Math.max(rect.y,Math.min(py,rect.y+rect.h));
  const dx=px-nx, dy=py-ny, d2=dx*dx+dy*dy;
  if (d2<PLAYER_R*PLAYER_R) {
    const d=Math.sqrt(d2)||0.01;
    return {x:px+(dx/d)*(PLAYER_R-d), y:py+(dy/d)*(PLAYER_R-d)};
  }
  return null;
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys={};
let ePressed=false, fPressed=false, iPressed=false;
window.addEventListener('keydown', e => {
  const k=e.key.toLowerCase();
  keys[k]=true;
  if (k==='e') ePressed=true;
  if (k==='f') fPressed=true;
  if (k==='i') iPressed=true;
  if (k==='escape') { closeMenu(); closeShop(); }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()]=false; });

// ─── Dialog ──────────────────────────────────────────────────────────────────
let dialogVillager=null, dialogLines=[], dialogLineIdx=0;
let dialogOnComplete=null, dialogFinalHint='[F] Continue';
const dialogBox  = document.getElementById('dialog-box');
const dialogName = document.getElementById('dialog-name');
const dialogText = document.getElementById('dialog-text');
const dialogHint = document.getElementById('dialog-hint');

function openDialog(v) {
  const {lines, hint, onComplete} = buildDialogForVillager(v);
  dialogVillager=v; dialogLines=lines; dialogLineIdx=0;
  dialogOnComplete=onComplete; dialogFinalHint=hint;
  dialogName.textContent=v.name;
  dialogText.textContent=lines[0];
  dialogHint.textContent = lines.length===1 ? hint : '[F] Continue';
  dialogBox.classList.add('show');
}
function advanceDialog() {
  if (!dialogVillager) return;
  dialogLineIdx++;
  if (dialogLineIdx>=dialogLines.length) {
    if (dialogOnComplete) dialogOnComplete();
    closeDialog(); return;
  }
  dialogText.textContent=dialogLines[dialogLineIdx];
  const isLast = dialogLineIdx===dialogLines.length-1;
  dialogHint.textContent = isLast ? dialogFinalHint : '[F] Continue';
}
function closeDialog() {
  dialogBox.classList.remove('show'); dialogVillager=null;
}

// ─── I-key menu ──────────────────────────────────────────────────────────────
let menuOpen=false, menuTab='quests';
const menuOverlay = document.getElementById('menu-overlay');
const menuBody    = document.getElementById('menu-body');
const menuTabBtns = document.querySelectorAll('.menu-tab');
const menuGoldEl  = document.getElementById('menu-gold');

menuTabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    menuTab=btn.dataset.tab;
    menuTabBtns.forEach(b=>b.classList.toggle('active',b.dataset.tab===menuTab));
    renderMenuBody();
  });
});

function openMenu()  { menuOpen=true;  menuOverlay.classList.add('show');    renderMenu(); }
function closeMenu() { menuOpen=false; menuOverlay.classList.remove('show'); }
function toggleMenu(){ menuOpen ? closeMenu() : openMenu(); }

function renderMenu() {
  menuGoldEl.textContent = `Gold: ${player.gold}g`;
  menuTabBtns.forEach(b=>b.classList.toggle('active',b.dataset.tab===menuTab));
  renderMenuBody();
}
function renderMenuBody() {
  if (menuTab==='quests') renderQuestsTab(); else renderInventoryTab();
}
function renderQuestsTab() {
  const active = Object.values(quests).filter(q=>q.status!=='inactive');
  if (!active.length) {
    menuBody.innerHTML='<div class="inv-empty">No quests yet — talk to villagers!</div>'; return;
  }
  menuBody.innerHTML = active.map(q => {
    const have = q.type==='harvest'
      ? Math.min(q.progress||0, q.required)
      : Math.min((inventory[q.itemId]||{count:0}).count, q.required);
    const pct  = Math.round((have/q.required)*100);
    const itemLabel = q.type==='harvest' ? 'crops harvested'
      : (inventory[q.itemId]||{name:'items'}).name+'s collected';
    const badgeClass = q.status==='completed' ? 'badge-completed' : 'badge-active';
    const badgeText  = q.status==='completed' ? 'Completed' : 'Active';
    const progressHtml = q.status==='active'
      ? `<div class="quest-progress">${have} / ${q.required} ${itemLabel}</div>
         <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`
      : `<div class="quest-progress" style="color:#4a9">All done ✓</div>`;
    return `<div class="quest-entry">
      <div class="quest-header">
        <span class="quest-title">${q.title}</span>
        <span class="quest-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="quest-desc">${q.description}</div>
      <div class="quest-reward">Reward: ${q.reward}g</div>
      ${progressHtml}
    </div>`;
  }).join('');
}
function renderInventoryTab() {
  const items = Object.entries(inventory).filter(([,v])=>v.count>0).map(([k,v])=>({...v,key:k}));
  if (!items.length) {
    menuBody.innerHTML='<div class="inv-empty">Your inventory is empty</div>'; return;
  }
  menuBody.innerHTML = items.map(item=>`
    <div class="inv-item">
      <span class="inv-icon">${item.icon}</span>
      <div class="inv-info">
        <div class="inv-name">${item.name}</div>
        ${item.type ? `<div class="inv-tag">${item.type}${item.sellPrice?' · sell '+item.sellPrice+'g each':''}</div>` : ''}
      </div>
      <span class="inv-count">×${item.count}</span>
    </div>`).join('');
}

// ─── Shop UI ─────────────────────────────────────────────────────────────────
let shopOpen=false, shopTab='buy';
const shopOverlay  = document.getElementById('shop-overlay');
const shopBody     = document.getElementById('shop-body');
const shopGoldDisp = document.getElementById('shop-gold-display');
const goldDisplayEl= document.getElementById('gold-display');
const shopTabBtns  = document.querySelectorAll('.shop-tab');

shopTabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    shopTab=btn.dataset.stab;
    shopTabBtns.forEach(b=>b.classList.toggle('active',b.dataset.stab===shopTab));
    renderShopBody();
  });
});

function openShop()  {
  shopOpen=true;
  closeMenu();
  shopTab='buy';
  shopTabBtns.forEach(b=>b.classList.toggle('active',b.dataset.stab==='buy'));
  shopOverlay.classList.add('show');
  renderShopBody();
}
function closeShop() { shopOpen=false; shopOverlay.classList.remove('show'); }

function updateGoldDisplay() {
  goldDisplayEl.textContent = `Gold: ${player.gold}g`;
  shopGoldDisp.textContent  = `Gold: ${player.gold}g`;
  if (menuOpen) menuGoldEl.textContent = `Gold: ${player.gold}g`;
}

function renderShopBody() {
  updateGoldDisplay();
  if (shopTab === 'buy') {
    shopBody.innerHTML = SHOP_CATALOG.map(item => {
      const canAfford   = player.gold >= item.price;
      const needsSteel  = item.id === 'seedHerb' && !inventory.steelHoe.count;
      const alreadyHas  = (item.id === 'hoe' || item.id === 'steelHoe') && inventory[item.id].count > 0;
      const locked      = needsSteel;
      const disabled    = !canAfford || locked || alreadyHas;
      const lockedNote  = locked ? '<div class="shop-item-locked">Requires Steel Hoe</div>' : '';
      const ownedNote   = alreadyHas ? '<div class="shop-item-locked" style="color:#8cf">Already owned</div>' : '';
      return `<div class="shop-item">
        <span class="shop-item-icon">${item.icon}</span>
        <div class="shop-item-info">
          <div class="shop-item-name">${item.name}</div>
          <div class="shop-item-desc">${item.desc}</div>
          ${lockedNote}${ownedNote}
        </div>
        <span class="shop-item-price">${item.price}g</span>
        <button class="shop-btn shop-btn-buy" onclick="buyItem('${item.id}')" ${disabled?'disabled':''}>Buy</button>
      </div>`;
    }).join('');
  } else {
    const sellable = Object.entries(inventory)
      .filter(([,v])=>v.sellPrice && v.count>0)
      .map(([k,v])=>({...v,key:k}));
    if (!sellable.length) {
      shopBody.innerHTML = '<div class="shop-empty">Nothing to sell yet — harvest some crops!</div>';
    } else {
      shopBody.innerHTML = sellable.map(item=>`
        <div class="shop-item">
          <span class="shop-item-icon">${item.icon}</span>
          <div class="shop-item-info">
            <div class="shop-item-name">${item.name}</div>
            <div class="shop-item-desc">×${item.count} in inventory &nbsp;·&nbsp; ${item.sellPrice}g each</div>
          </div>
          <span class="shop-item-price">${item.count * item.sellPrice}g</span>
          <button class="shop-btn shop-btn-sell" onclick="sellItem('${item.key}')">Sell All</button>
        </div>`).join('');
    }
  }
}

function buyItem(itemId) {
  const cat = SHOP_CATALOG.find(i=>i.id===itemId);
  if (!cat || player.gold < cat.price) return;
  if (itemId === 'seedHerb' && !inventory.steelHoe.count) { showToast('Steel Hoe required!'); return; }
  const tool = cat.id === 'hoe' || cat.id === 'steelHoe';
  if (tool && inventory[itemId].count > 0) return;
  player.gold -= cat.price;
  inventory[itemId].count += (cat.qty || 1);
  updateGoldDisplay();
  renderShopBody();
  showToast(`Bought: ${cat.name}`);
}

function sellItem(itemId) {
  const item = inventory[itemId];
  if (!item || !item.count || !item.sellPrice) return;
  const earned = item.count * item.sellPrice;
  player.gold += earned;
  item.count = 0;
  updateGoldDisplay();
  renderShopBody();
  renderMenu();
  showToast(`Sold! +${earned}g`);
}

// ─── Toast ───────────────────────────────────────────────────────────────────
let toastTimer=null;
const toastEl=document.getElementById('quest-toast');
function showToast(msg) {
  toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),3000);
}

// ─── Camera ──────────────────────────────────────────────────────────────────
const cam={x:player.x, y:player.y};

// ─── Minimap ─────────────────────────────────────────────────────────────────
function drawMinimap(W, H) {
  const mmW=130,mmH=130,mmX=W-mmW-14,mmY=H-mmH-14;
  const sx=mmW/(MAP_COLS*TILE), sy=mmH/(MAP_ROWS*TILE);
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(mmX-4,mmY-4,mmW+8,mmH+8,6); ctx.fill();
  ctx.drawImage(mapCanvas,mmX,mmY,mmW,mmH);
  ctx.fillStyle='rgba(0,60,0,0.35)';
  ctx.fillRect(mmX+FOREST_C0*TILE*sx,mmY,
    (FOREST_C1-FOREST_C0+1)*TILE*sx,(FOREST_R1-FOREST_R0+1)*TILE*sy);
  ctx.fillStyle='rgba(80,160,60,0.45)';
  for (const f of farms) ctx.fillRect(mmX+f.x*sx,mmY+f.y*sy,f.w*sx,f.h*sy);
  ctx.fillStyle='#c9935a';
  for (const h of houses) ctx.fillRect(mmX+h.x*sx,mmY+h.y*sy,h.w*sx,h.h*sy);
  // Shop on minimap (gold)
  ctx.fillStyle='#f0c040';
  ctx.fillRect(mmX+SHOP_DEF.tx*TILE*sx,mmY+SHOP_DEF.ty*TILE*sy,SHOP_DEF.tw*TILE*sx,SHOP_DEF.th*TILE*sy);
  // Farm plots on minimap
  ctx.fillStyle='#7a5028';
  for (const p of farmPlots) ctx.fillRect(mmX+p.x*sx-2,mmY+p.y*sy-2,4,4);
  ctx.fillStyle='#ffdd88';
  for (const v of villagers) { ctx.beginPath(); ctx.arc(mmX+v.x*sx,mmY+v.y*sy,2,0,Math.PI*2); ctx.fill(); }
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(mmX+player.x*sx,mmY+player.y*sy,3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1a3a6a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(mmX-4,mmY-4,mmW+8,mmH+8,6); ctx.stroke();
}

// ─── Update ──────────────────────────────────────────────────────────────────
function update(dt) {
  if (iPressed) {
    if (shopOpen) closeShop(); else toggleMenu();
    iPressed=false;
  }

  // Shop blocks all input except closing
  if (shopOpen) {
    if (ePressed) closeShop();
    ePressed=fPressed=false;
    const lerp=1-Math.pow(0.01,dt);
    cam.x+=(player.x-cam.x)*lerp; cam.y+=(player.y-cam.y)*lerp;
    return;
  }

  if (menuOpen) {
    ePressed=fPressed=false;
    const lerp=1-Math.pow(0.01,dt);
    cam.x+=(player.x-cam.x)*lerp; cam.y+=(player.y-cam.y)*lerp;
    return;
  }

  if (dialogVillager) {
    if (fPressed) advanceDialog();
    ePressed=fPressed=false;
    const lerp=1-Math.pow(0.01,dt);
    cam.x+=(player.x-cam.x)*lerp; cam.y+=(player.y-cam.y)*lerp;
    return;
  }

  // Sprint — unlimited, no stamina
  player.sprinting = keys['shift']||keys['shiftleft']||keys['shiftright'];
  const speed = player.sprinting ? SPRINT_SPEED : PLAYER_SPEED;

  // Movement
  let dx=0,dy=0;
  if (keys['w']||keys['arrowup'])    dy-=1;
  if (keys['s']||keys['arrowdown'])  dy+=1;
  if (keys['a']||keys['arrowleft'])  dx-=1;
  if (keys['d']||keys['arrowright']) dx+=1;
  if (dx!==0||dy!==0) {
    const len=Math.sqrt(dx*dx+dy*dy);
    dx/=len; dy/=len;
    player.x+=dx*speed*dt; player.y+=dy*speed*dt;
    player.walkCycle+=dt;
  }
  player.x=Math.max(PLAYER_R,Math.min(MAP_COLS*TILE-PLAYER_R,player.x));
  player.y=Math.max(PLAYER_R,Math.min(MAP_ROWS*TILE-PLAYER_R,player.y));

  // House collision
  for (const house of houses)
    for (const rect of getHouseWalls(house)) {
      const r=resolveCircleRect(player.x,player.y,rect);
      if (r) { player.x=r.x; player.y=r.y; }
    }
  // Tree collision
  for (const t of trees) {
    const minD=PLAYER_R+t.r*0.45;
    const dx2=player.x-t.x, dy2=player.y-t.y, d=Math.sqrt(dx2*dx2+dy2*dy2);
    if (d<minD&&d>0) { player.x+=(dx2/d)*(minD-d); player.y+=(dy2/d)*(minD-d); }
  }

  // Auto-collect quest items
  for (const c of collectibles) {
    if (c.collected) continue;
    const q=getQuestForItem(c.itemId);
    if (!q||q.status!=='active') continue;
    if (Math.hypot(player.x-c.x,player.y-c.y)<COLLECT_DIST) {
      c.collected=true;
      inventory[c.itemId].count++;
      renderMenu();
    }
  }

  // Grow check for farm plots
  const now=Date.now();
  for (const plot of farmPlots) {
    if (plot.state==='seeded' && now-plot.plantedAt>=plot.growTime)
      plot.state='grown';
  }

  // ── Proximity checks ─────────────────────────────────────────
  let nearVillager=null, nearVillagerDist=Infinity;
  let nearDoor=null,     nearDoorDist=Infinity;
  let nearFarm=null,     nearFarmDist=Infinity;

  for (const v of villagers) {
    const d=Math.hypot(player.x-v.x,player.y-v.y);
    if (d<nearVillagerDist) { nearVillagerDist=d; nearVillager=v; }
  }
  for (const h of houses) {
    const dc=doorCenter(h), d=Math.hypot(player.x-dc.x,player.y-dc.y);
    if (d<nearDoorDist) { nearDoorDist=d; nearDoor=h; }
  }
  for (const plot of farmPlots) {
    const d=Math.hypot(player.x-plot.x,player.y-plot.y);
    if (d<nearFarmDist) { nearFarmDist=d; nearFarm=plot; }
  }

  const promptEl=document.getElementById('interact-prompt');

  if (nearVillagerDist<TALK_DIST) {
    const q = nearVillager.questId ? quests[nearVillager.questId] : null;
    const have = q ? (q.type==='harvest'?(q.progress||0):(inventory[q.itemId]||{count:0}).count) : 0;
    let label = `[F] Talk to ${nearVillager.name}`;
    if (nearVillager.isShopkeeper) label += '   [E] Open Shop';
    if (q && q.status==='inactive')                   label = `[F] Quest: ${nearVillager.name}` + (nearVillager.isShopkeeper?'   [E] Open Shop':'');
    else if (q && q.status==='active' && have>=q.required) label = `[F] Turn in: ${q.title}` + (nearVillager.isShopkeeper?'   [E] Open Shop':'');
    promptEl.textContent=label; promptEl.classList.add('show');
    if (fPressed) openDialog(nearVillager);
    if (ePressed && nearVillager.isShopkeeper) openShop();
  } else if (nearFarmDist<FARM_INTERACT_DIST) {
    const fp=getFarmPrompt(nearFarm);
    if (fp) {
      promptEl.textContent=fp.label; promptEl.classList.add('show');
      if (ePressed && fp.canInteract) doFarmAction(nearFarm);
    } else promptEl.classList.remove('show');
  } else if (nearDoorDist<INTERACT_DIST) {
    promptEl.textContent=nearDoor.doorOpen?'[E] Close door':'[E] Open door';
    promptEl.classList.add('show');
    if (ePressed) nearDoor.doorOpen=!nearDoor.doorOpen;
  } else {
    promptEl.classList.remove('show');
  }

  ePressed=fPressed=false;
  const lerp=1-Math.pow(0.01,dt);
  cam.x+=(player.x-cam.x)*lerp; cam.y+=(player.y-cam.y)*lerp;
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function draw() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const offX=Math.round(W/2-cam.x), offY=Math.round(H/2-cam.y);
  ctx.save(); ctx.translate(offX,offY);

  ctx.drawImage(mapCanvas,0,0);
  for (const farm of farms) drawFarm(ctx,farm);

  // Farm plots (ground level, drawn before entities)
  for (const plot of farmPlots) drawFarmPlot(ctx, plot);

  // Shop building (ground level)
  drawShopBuilding(ctx);

  for (const house of houses) drawHouseFloor(ctx,house);

  // Active collectibles
  for (const c of collectibles) {
    if (c.collected) continue;
    const q=getQuestForItem(c.itemId);
    if (!q||q.status!=='active') continue;
    drawCollectible(ctx,c);
  }

  // Y-sorted entities
  const entities=[
    ...trees.map(t=>({y:t.y+t.r,    draw:()=>drawTree(ctx,t)})),
    ...villagers.map(v=>({y:v.y+12,  draw:()=>drawVillager(ctx,v)})),
    {y:player.y+12, draw:()=>drawPlayer(ctx,player)},
  ];
  entities.sort((a,b)=>a.y-b.y);
  for (const e of entities) e.draw();

  for (const house of houses) drawHouseWalls(ctx,house);

  ctx.fillStyle='rgba(0,20,0,0.18)';
  ctx.fillRect(FOREST_C0*TILE,FOREST_R0*TILE,
    (FOREST_C1-FOREST_C0+1)*TILE,(FOREST_R1-FOREST_R0+1)*TILE);

  ctx.restore();
  drawMinimap(W,H);

  // Bottom hint
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.font='11px sans-serif';
  ctx.fillText('[I] Quests & Inventory  ·  Farm plots (NW) and Market (NE) are near spawn', 14, H-14);
}

// ─── Loop ────────────────────────────────────────────────────────────────────
let lastTime=0;
function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts; update(dt); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
