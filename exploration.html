<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #hub-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      background: rgba(13,13,26,0.85);
      color: #a8dadc;
      border: 1px solid #1a3a6a;
      border-radius: 20px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      z-index: 10;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }
  </style>
</head>
<body>

<a id="hub-btn" href="index.html">&#8592; Hub</a>
<canvas id="canvas"></canvas>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const TILE        = 32;          // pixels per tile
const MAP_COLS    = 60;
const MAP_ROWS    = 60;
const PLAYER_SIZE = 20;          // pixel diameter of the player circle
const PLAYER_SPEED = 160;        // pixels per second

// Grass tile variants — indices used to pick colours
const GRASS_BASE    = '#4a7c3f';
const GRASS_LIGHT   = '#5a9449';
const GRASS_DARK    = '#3a6332';
const GRASS_PATCH   = '#3d6b35';

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Map generation ──────────────────────────────────────────────────────────
// Each cell stores a variant 0-3 for grass shading variety
const map = [];
for (let r = 0; r < MAP_ROWS; r++) {
  map[r] = [];
  for (let c = 0; c < MAP_COLS; c++) {
    map[r][c] = Math.floor(Math.random() * 4);
  }
}

// Pre-build a noise-like blotch pattern using simple random-walk seed blobs
(function stampPatches() {
  const patches = 120;
  for (let p = 0; p < patches; p++) {
    const cr = Math.floor(Math.random() * MAP_ROWS);
    const cc = Math.floor(Math.random() * MAP_COLS);
    const size = 2 + Math.floor(Math.random() * 4);
    const variant = Math.floor(Math.random() * 4);
    for (let dr = -size; dr <= size; dr++) {
      for (let dc = -size; dc <= size; dc++) {
        if (dr * dr + dc * dc <= size * size) {
          const nr = cr + dr, nc = cc + dc;
          if (nr >= 0 && nr < MAP_ROWS && nc >= 0 && nc < MAP_COLS) {
            map[nr][nc] = variant;
          }
        }
      }
    }
  }
})();

const TILE_COLORS = [GRASS_BASE, GRASS_LIGHT, GRASS_DARK, GRASS_PATCH];

// ─── Pre-render the map to an offscreen canvas ───────────────────────────────
const mapCanvas = document.createElement('canvas');
mapCanvas.width  = MAP_COLS * TILE;
mapCanvas.height = MAP_ROWS * TILE;
const mctx = mapCanvas.getContext('2d');

(function drawMap() {
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      mctx.fillStyle = TILE_COLORS[map[r][c]];
      mctx.fillRect(c * TILE, r * TILE, TILE, TILE);

      // subtle grid lines
      mctx.strokeStyle = 'rgba(0,0,0,0.08)';
      mctx.lineWidth = 0.5;
      mctx.strokeRect(c * TILE, r * TILE, TILE, TILE);
    }
  }

  // Scatter small grass detail sprites
  const rng = mulberry32(42);
  for (let i = 0; i < 800; i++) {
    const x = rng() * MAP_COLS * TILE;
    const y = rng() * MAP_ROWS * TILE;
    drawGrassDetail(mctx, x, y, rng);
  }
})();

function drawGrassDetail(ctx2, x, y, rng) {
  const h = 5 + rng() * 6;
  const lean = (rng() - 0.5) * 4;
  ctx2.strokeStyle = rng() > 0.5 ? '#2e5227' : '#6aab5a';
  ctx2.lineWidth = 1;
  ctx2.beginPath();
  ctx2.moveTo(x, y);
  ctx2.lineTo(x + lean, y - h);
  ctx2.stroke();
}

// Simple seeded RNG so details are deterministic
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Player ──────────────────────────────────────────────────────────────────
const player = {
  x: (MAP_COLS / 2) * TILE,
  y: (MAP_ROWS / 2) * TILE,
  facing: 0,   // radians, 0 = right
};

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

// ─── Camera ──────────────────────────────────────────────────────────────────
const cam = { x: player.x, y: player.y };

// ─── Game loop ───────────────────────────────────────────────────────────────
let lastTime = 0;

function update(dt) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    dy -= 1;
  if (keys['s'] || keys['arrowdown'])  dy += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx !== 0 || dy !== 0) {
    // Normalise diagonal movement
    const len = Math.sqrt(dx * dx + dy * dy);
    dx /= len; dy /= len;

    player.facing = Math.atan2(dy, dx);

    const nx = player.x + dx * PLAYER_SPEED * dt;
    const ny = player.y + dy * PLAYER_SPEED * dt;
    const half = PLAYER_SIZE / 2;
    const maxX = MAP_COLS * TILE - half;
    const maxY = MAP_ROWS * TILE - half;

    player.x = Math.max(half, Math.min(maxX, nx));
    player.y = Math.max(half, Math.min(maxY, ny));
  }

  // Smooth camera follow
  const lerp = 1 - Math.pow(0.01, dt);
  cam.x += (player.x - cam.x) * lerp;
  cam.y += (player.y - cam.y) * lerp;
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Offset so camera is centred on screen
  const offX = Math.round(W / 2 - cam.x);
  const offY = Math.round(H / 2 - cam.y);

  ctx.save();
  ctx.translate(offX, offY);

  // Clamp visible map region for performance
  const startC = Math.max(0, Math.floor(-offX / TILE) - 1);
  const startR = Math.max(0, Math.floor(-offY / TILE) - 1);
  const endC   = Math.min(MAP_COLS, startC + Math.ceil(W / TILE) + 2);
  const endR   = Math.min(MAP_ROWS, startR + Math.ceil(H / TILE) + 2);

  // Draw the pre-rendered map (only the visible slice)
  ctx.drawImage(
    mapCanvas,
    startC * TILE, startR * TILE,
    (endC - startC) * TILE, (endR - startR) * TILE,
    startC * TILE, startR * TILE,
    (endC - startC) * TILE, (endR - startR) * TILE
  );

  // Player shadow
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(player.x, player.y + PLAYER_SIZE * 0.45, PLAYER_SIZE * 0.45, PLAYER_SIZE * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Player body
  drawPlayer(ctx, player.x, player.y, player.facing);

  ctx.restore();

  // HUD — mini-map
  drawMinimap(W, H);
}

function drawPlayer(ctx2, x, y, facing) {
  const r = PLAYER_SIZE / 2;

  // Body circle
  ctx2.beginPath();
  ctx2.arc(x, y, r, 0, Math.PI * 2);
  const grad = ctx2.createRadialGradient(x - r * 0.3, y - r * 0.3, 1, x, y, r);
  grad.addColorStop(0, '#6ec6f5');
  grad.addColorStop(1, '#2277bb');
  ctx2.fillStyle = grad;
  ctx2.fill();
  ctx2.strokeStyle = '#aaddff';
  ctx2.lineWidth = 1.5;
  ctx2.stroke();

  // Direction indicator (small dot)
  const dotDist = r * 0.6;
  const dotX = x + Math.cos(facing) * dotDist;
  const dotY = y + Math.sin(facing) * dotDist;
  ctx2.beginPath();
  ctx2.arc(dotX, dotY, 3, 0, Math.PI * 2);
  ctx2.fillStyle = '#fff';
  ctx2.fill();
}

function drawMinimap(W, H) {
  const mmW = 120, mmH = 120;
  const mmX = W - mmW - 14, mmY = H - mmH - 14;
  const scaleX = mmW / (MAP_COLS * TILE);
  const scaleY = mmH / (MAP_ROWS * TILE);

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(mmX - 4, mmY - 4, mmW + 8, mmH + 8, 6);
  ctx.fill();

  // Map surface
  ctx.drawImage(mapCanvas, mmX, mmY, mmW, mmH);

  // Player dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(mmX + player.x * scaleX, mmY + player.y * scaleY, 3, 0, Math.PI * 2);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#1a3a6a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(mmX - 4, mmY - 4, mmW + 8, mmH + 8, 6);
  ctx.stroke();
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>

</body>
</html>
