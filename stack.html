<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Stack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; cursor: pointer; }
    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: #a8dadc;
      border: 1px solid #1a3a6a; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }
  </style>
</head>
<body>
<a id="hub-btn" href="index.html">&#8592; Hub</a>
<canvas id="c"></canvas>

<script>
// ── Constants ────────────────────────────────────────────────────
const W = 400, H = 640;
const STACK_AREA_TOP = 80;   // y where stack top can reach
const STACK_BOTTOM = 600;    // y of ground
const BLOCK_H = 28;
const MAX_BLOCKS = (STACK_BOTTOM - STACK_AREA_TOP) / BLOCK_H; // ~18
const INITIAL_W = 240;
const INITIAL_SPD = 130;     // px/s
const MAX_SPD = 480;
const SPD_STEP = 18;         // added each drop
const PERFECT_THRESHOLD = 8; // px either side = perfect
const MIN_WIDTH = 6;         // game over below this

// Neon colour palette cycling
const COLORS = [
  '#c084fc','#a78bfa','#818cf8','#60a5fa','#38bdf8',
  '#34d399','#4ade80','#facc15','#fb923c','#f87171',
  '#e879f9','#f0abfc',
];

// ── Canvas setup ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 1;

function scaleCanvas() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  canvas.width  = W;
  canvas.height = H;
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// ── Game state ───────────────────────────────────────────────────
let state = 'title'; // 'title' | 'playing' | 'gameover'
let score, hiScore, blocks, slider, combo, bestCombo, drops;
let particles = [], trail = [];
let animTime = 0, lastTime = 0;
let sliderDir = 1, sliderSpd;
let colorIdx = 0;

function loadHi() { hiScore = parseInt(localStorage.getItem('stack_hi') || '0', 10); }
function saveHi() { if (score > hiScore) { hiScore = score; localStorage.setItem('stack_hi', hiScore); } }
loadHi();

// ── Particle system ──────────────────────────────────────────────
function spawnParticles(x, y, w, color, perfect) {
  const n = perfect ? 18 : 8;
  for (let i = 0; i < n; i++) {
    const ang = (Math.random() * Math.PI * 2);
    const spd = perfect ? (60 + Math.random() * 140) : (30 + Math.random() * 80);
    particles.push({
      x: x + Math.random() * w,
      y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - (perfect ? 60 : 20),
      life: 1,
      decay: perfect ? (0.6 + Math.random() * 0.8) : (0.9 + Math.random() * 1.2),
      r: perfect ? (2 + Math.random() * 3) : (1 + Math.random() * 2),
      color,
    });
  }
}

function spawnCutParticle(x, y, w, color) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: x + Math.random() * w, y,
      vx: (Math.random() - 0.5) * 60,
      vy: 40 + Math.random() * 80,
      life: 1, decay: 1.5 + Math.random(),
      r: 1.5 + Math.random() * 1.5,
      color: '#ff4466',
    });
  }
}

// ── Init / reset ─────────────────────────────────────────────────
function initGame() {
  score = 0; combo = 0; bestCombo = 0; drops = 0;
  colorIdx = 0;
  sliderSpd = INITIAL_SPD;
  particles = [];

  // Start with 3 fixed base blocks so the tower looks grounded
  blocks = [];
  const bx = (W - INITIAL_W) / 2;
  for (let i = 0; i < 3; i++) {
    const y = STACK_BOTTOM - BLOCK_H - i * BLOCK_H;
    blocks.push({ x: bx, y, w: INITIAL_W, color: COLORS[colorIdx++ % COLORS.length] });
  }

  spawnSlider();
  state = 'playing';
}

function spawnSlider() {
  const top = blocks[blocks.length - 1];
  const w = top.w;
  // bounce the slider off either wall with a random start side
  const side = Math.random() < 0.5 ? 0 : W - w;
  sliderDir = side === 0 ? 1 : -1;
  slider = {
    x: side,
    y: top.y - BLOCK_H,
    w,
    color: COLORS[colorIdx++ % COLORS.length],
  };
}

// ── Drop logic ───────────────────────────────────────────────────
function drop() {
  if (state !== 'playing') return;

  const top = blocks[blocks.length - 1];
  const ovLeft  = top.x - slider.x;      // positive = slider sticks left
  const ovRight = (slider.x + slider.w) - (top.x + top.w); // positive = sticks right
  const overlap = slider.w - Math.max(0, ovLeft) - Math.max(0, ovRight);

  if (overlap <= MIN_WIDTH) {
    // missed entirely (or basically missed)
    saveHi();
    state = 'gameover';
    // explode slider
    spawnCutParticle(slider.x, slider.y, slider.w, '#ff4466');
    return;
  }

  // Compute aligned block
  const newX = slider.x + Math.max(0, ovLeft);
  const newW = overlap;

  // Check perfect
  const centerDiff = Math.abs((newX + newW / 2) - (top.x + top.w / 2));
  const perfect = centerDiff <= PERFECT_THRESHOLD;

  let actualX = newX, actualW = newW;
  let pts = Math.round(10 + drops * 2);

  if (perfect) {
    // snap to exact alignment, keep width
    actualX = top.x;
    actualW = top.w;
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    pts = Math.round(pts * (1 + combo * 0.5));
    spawnParticles(actualX, slider.y + BLOCK_H, actualW, slider.color, true);
  } else {
    combo = 0;
    // Spawn cut piece particles
    if (ovLeft > 0)  spawnCutParticle(slider.x, slider.y + BLOCK_H, ovLeft, '#ff4466');
    if (ovRight > 0) spawnCutParticle(slider.x + slider.w - ovRight, slider.y + BLOCK_H, ovRight, '#ff4466');
    spawnParticles(actualX, slider.y + BLOCK_H, actualW, slider.color, false);
  }

  score += pts;
  drops++;

  // Scroll everything down if stack is getting high
  const newBlockY = top.y - BLOCK_H;
  if (newBlockY < STACK_AREA_TOP + 80) {
    const shift = BLOCK_H;
    blocks.forEach(b => b.y += shift);
    // shift new block too (it'll be placed below)
  }

  blocks.push({ x: actualX, y: top.y - BLOCK_H, w: actualW, color: slider.color });

  // Speed up
  sliderSpd = Math.min(MAX_SPD, sliderSpd + SPD_STEP);

  spawnSlider();
}

// ── Input ─────────────────────────────────────────────────────────
function handleAction() {
  if (state === 'playing') { drop(); return; }
  if (state === 'title')   { initGame(); return; }
  if (state === 'gameover') { state = 'title'; return; }
}

canvas.addEventListener('click', handleAction);
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  handleAction();
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); handleAction(); }
});

// ── Update ────────────────────────────────────────────────────────
function update(dt) {
  // Update particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 220 * dt; // gravity
    p.life -= p.decay * dt;
  }
  particles = particles.filter(p => p.life > 0);

  if (state === 'playing') {
    slider.x += sliderDir * sliderSpd * dt;
    if (slider.x + slider.w >= W) { slider.x = W - slider.w; sliderDir = -1; }
    if (slider.x <= 0)            { slider.x = 0;            sliderDir =  1; }
  }
}

// ── Draw helpers ─────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBlock(x, y, w, h, color, glow) {
  ctx.save();
  if (glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
  }
  roundRect(x + 1, y + 1, w - 2, h - 2, 5);
  ctx.fillStyle = color + '33';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // inner highlight
  ctx.shadowBlur = 0;
  roundRect(x + 3, y + 3, w - 6, 6, 3);
  ctx.fillStyle = color + '55';
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Draw states ───────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);
  // subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawHUD() {
  // Score
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 36px Segoe UI';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#c084fc';
  ctx.shadowBlur = 20;
  ctx.fillText(score, W / 2, 42);

  ctx.font = 'bold 12px Segoe UI';
  ctx.fillStyle = '#7986a8';
  ctx.shadowBlur = 0;
  ctx.fillText('BEST  ' + hiScore, W / 2, 60);

  // Combo
  if (combo > 1) {
    const pulse = 0.5 + 0.5 * Math.sin(animTime * 6);
    ctx.font = `bold ${14 + pulse * 4}px Segoe UI`;
    ctx.fillStyle = '#facc15';
    ctx.shadowColor = '#facc15';
    ctx.shadowBlur = 12 + pulse * 10;
    ctx.textAlign = 'right';
    ctx.fillText('x' + combo + ' COMBO', W - 12, 42);
  }

  // Speed bar (right side, vertical)
  const speedFrac = Math.min(1, (sliderSpd - INITIAL_SPD) / (MAX_SPD - INITIAL_SPD));
  const barH = 120, barX = W - 16, barY = 80;
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  roundRect(barX - 6, barY, 8, barH, 4);
  ctx.fill();
  ctx.fillStyle = `hsl(${280 - speedFrac * 200}, 80%, 65%)`;
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 8;
  roundRect(barX - 6, barY + barH * (1 - speedFrac), 8, barH * speedFrac, 4);
  ctx.fill();

  ctx.font = '9px Segoe UI';
  ctx.fillStyle = '#7986a8';
  ctx.shadowBlur = 0;
  ctx.textAlign = 'right';
  ctx.fillText('SPD', W - 10, barY + barH + 14);

  ctx.restore();
}

function drawGame() {
  // Draw stack blocks (all but the last, which is the "ground" top)
  for (const b of blocks) {
    drawBlock(b.x, b.y, b.w, BLOCK_H, b.color, false);
  }

  // Draw sliding block with glow
  if (slider) {
    // ghost guide line
    const top = blocks[blocks.length - 1];
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(top.x, slider.y + BLOCK_H / 2);
    ctx.lineTo(top.x + top.w, slider.y + BLOCK_H / 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    drawBlock(slider.x, slider.y, slider.w, BLOCK_H, slider.color, true);
  }
}

function drawTitle() {
  drawBg();

  // Animated demo stack in background
  const demoBlocks = [];
  const dw = 200;
  const dbx = (W - dw) / 2;
  const dColors = ['#c084fc','#818cf8','#60a5fa','#34d399','#facc15'];
  for (let i = 0; i < 5; i++) {
    const offset = (i % 2 === 0 ? 1 : -1) * 15 * (i / 5);
    demoBlocks.push({
      x: dbx + offset,
      y: H - 80 - i * BLOCK_H,
      w: dw - Math.abs(offset) * 2,
      color: dColors[i],
    });
  }
  for (const b of demoBlocks) {
    drawBlock(b.x, b.y, b.w, BLOCK_H, b.color, false);
  }

  // Demo sliding block
  const dSlide = ((Math.sin(animTime * 0.9) + 1) / 2) * (W - 180);
  drawBlock(dSlide, demoBlocks[demoBlocks.length - 1].y - BLOCK_H, 180, BLOCK_H, '#f0abfc', true);

  const pulse = 0.5 + 0.5 * Math.sin(animTime * 1.8);

  ctx.save();
  ctx.textAlign = 'center';

  // Title
  ctx.font = 'bold 62px Segoe UI';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#c084fc';
  ctx.shadowBlur = 30 + pulse * 20;
  ctx.fillText('NEON', W / 2, 170);

  ctx.font = 'bold 68px Segoe UI';
  ctx.fillStyle = '#c084fc';
  ctx.shadowColor = '#c084fc';
  ctx.shadowBlur = 40 + pulse * 30;
  ctx.fillText('STACK', W / 2, 240);

  ctx.shadowBlur = 0;
  ctx.font = '15px Segoe UI';
  ctx.fillStyle = '#7986a8';
  ctx.fillText('Drop blocks. Stack perfectly. Don\'t miss.', W / 2, 280);

  // Blinking prompt
  const blink = Math.sin(animTime * 2.5) > 0;
  if (blink) {
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = '#c084fc';
    ctx.shadowColor = '#c084fc';
    ctx.shadowBlur = 14;
    ctx.fillText('TAP / SPACE TO START', W / 2, 330);
  }

  if (hiScore > 0) {
    ctx.shadowBlur = 0;
    ctx.font = '13px Segoe UI';
    ctx.fillStyle = '#7986a8';
    ctx.fillText('Best: ' + hiScore, W / 2, 358);
  }

  ctx.restore();
}

function drawGameOver() {
  drawBg();
  drawParticles();

  ctx.save();
  ctx.textAlign = 'center';

  const pulse = 0.5 + 0.5 * Math.sin(animTime * 2.2);

  ctx.font = 'bold 54px Segoe UI';
  ctx.fillStyle = '#f87171';
  ctx.shadowColor = '#f87171';
  ctx.shadowBlur = 20 + pulse * 20;
  ctx.fillText('GAME OVER', W / 2, 180);

  ctx.shadowBlur = 0;
  ctx.font = 'bold 48px Segoe UI';
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W / 2, 260);

  ctx.font = '16px Segoe UI';
  ctx.fillStyle = '#7986a8';
  ctx.fillText('SCORE', W / 2, 285);

  const isNew = score >= hiScore && score > 0;
  if (isNew) {
    ctx.font = 'bold 15px Segoe UI';
    ctx.fillStyle = '#facc15';
    ctx.shadowColor = '#facc15';
    ctx.shadowBlur = 14;
    ctx.fillText('★ NEW BEST ★', W / 2, 315);
    ctx.shadowBlur = 0;
  } else if (hiScore > 0) {
    ctx.font = '13px Segoe UI';
    ctx.fillStyle = '#7986a8';
    ctx.fillText('Best: ' + hiScore, W / 2, 315);
  }

  // Stats
  const sy = 350;
  const stats = [
    ['BLOCKS', drops],
    ['BEST COMBO', bestCombo],
  ];
  ctx.font = '13px Segoe UI';
  ctx.fillStyle = '#7986a8';
  stats.forEach(([label, val], i) => {
    const x = W / 2 + (i === 0 ? -70 : 70);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px Segoe UI';
    ctx.fillText(val, x, sy);
    ctx.font = '11px Segoe UI';
    ctx.fillStyle = '#7986a8';
    ctx.fillText(label, x, sy + 18);
  });

  // Tap to continue
  const blink = Math.sin(animTime * 2.5) > 0;
  if (blink) {
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = '#c084fc';
    ctx.shadowColor = '#c084fc';
    ctx.shadowBlur = 12;
    ctx.fillText('TAP TO PLAY AGAIN', W / 2, 420);
  }

  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  animTime += dt;

  update(dt);

  if (state === 'title') {
    drawTitle();
  } else if (state === 'playing') {
    drawBg();
    drawGame();
    drawParticles();
    drawHUD();
  } else if (state === 'gameover') {
    drawGameOver();
    drawHUD();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
