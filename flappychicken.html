<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Chicken</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; cursor: pointer; image-rendering: pixelated; }

    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: #a8dadc;
      border: 1px solid #1a3a6a; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }
  </style>
</head>
<body>
<a id="hub-btn" href="index.html">&#8592; Hub</a>
<canvas id="canvas"></canvas>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const W            = 480;
const H            = 640;
const GRAVITY      = 1900;   // px/s²
const FLAP_FORCE   = -570;   // px/s
const PIPE_SPEED   = 195;    // px/s
const PIPE_W       = 68;
const PIPE_GAP     = 158;
const PIPE_IVLBASE = 1.85;   // seconds between pipes
const GROUND_H     = 72;
const CHICKEN_X    = 108;    // fixed horizontal position
const HIT_R        = 13;     // collision radius (forgiving)

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Seeded RNG for background ───────────────────────────────────────────────
function rand(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 0xFFFFFFFF; };
}
const rng = rand(42);

// ─── Background elements ─────────────────────────────────────────────────────
// Clouds
const clouds = Array.from({ length: 7 }, () => ({
  x:     rng() * W,
  y:     30 + rng() * (H - GROUND_H - 150),
  w:     55 + rng() * 65,
  speed: 12 + rng() * 18,
}));

// Background hills (static, drawn once)
const hillCanvas = document.createElement('canvas');
hillCanvas.width = W; hillCanvas.height = H;
const hctx = hillCanvas.getContext('2d');
(function () {
  // Sky gradient
  const sky = hctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  sky.addColorStop(0,    '#5aafe8');
  sky.addColorStop(0.55, '#90d4f8');
  sky.addColorStop(1,    '#c8eeff');
  hctx.fillStyle = sky;
  hctx.fillRect(0, 0, W, H - GROUND_H);

  // Sun
  const sunX = W - 70, sunY = 62;
  const sunGlow = hctx.createRadialGradient(sunX, sunY, 8, sunX, sunY, 52);
  sunGlow.addColorStop(0,   'rgba(255,240,80,0.9)');
  sunGlow.addColorStop(0.45,'rgba(255,210,30,0.55)');
  sunGlow.addColorStop(1,   'rgba(255,200,0,0)');
  hctx.fillStyle = sunGlow;
  hctx.beginPath(); hctx.arc(sunX, sunY, 52, 0, Math.PI * 2); hctx.fill();
  hctx.fillStyle = '#ffe840';
  hctx.beginPath(); hctx.arc(sunX, sunY, 22, 0, Math.PI * 2); hctx.fill();

  // Distant hills
  hctx.fillStyle = 'rgba(110,175,110,0.4)';
  hctx.beginPath();
  hctx.moveTo(0, H - GROUND_H);
  const pts = [[0,0.82],[0.12,0.68],[0.25,0.74],[0.38,0.62],[0.52,0.70],[0.65,0.60],[0.78,0.67],[0.90,0.58],[1.0,0.63],[1.0,1.0],[0,1.0]];
  for (const [fx, fy] of pts) hctx.lineTo(fx * W, fy * (H - GROUND_H));
  hctx.closePath(); hctx.fill();

  // Nearer hills
  hctx.fillStyle = 'rgba(80,148,70,0.55)';
  hctx.beginPath();
  const pts2 = [[0,0.88],[0.08,0.78],[0.20,0.83],[0.33,0.74],[0.48,0.80],[0.60,0.72],[0.75,0.79],[0.88,0.71],[1.0,0.77],[1.0,1.0],[0,1.0]];
  for (const [fx, fy] of pts2) hctx.lineTo(fx * W, fy * (H - GROUND_H));
  hctx.closePath(); hctx.fill();

  // Ground
  const gY = H - GROUND_H;
  hctx.fillStyle = '#5a9449';
  hctx.fillRect(0, gY, W, 14);
  hctx.fillStyle = '#7ab850';
  // Grass tufts
  for (let gx = 6; gx < W; gx += 16) {
    hctx.beginPath();
    hctx.moveTo(gx, gY + 14);
    hctx.lineTo(gx - 3, gY + 6);
    hctx.lineTo(gx, gY + 10);
    hctx.lineTo(gx + 3, gY + 5);
    hctx.lineTo(gx + 6, gY + 14);
    hctx.fill();
  }
  hctx.fillStyle = '#7a5228';
  hctx.fillRect(0, gY + 14, W, GROUND_H - 14);
  // Dirt horizontal lines
  hctx.strokeStyle = 'rgba(0,0,0,0.08)'; hctx.lineWidth = 1;
  for (let dy = gY + 24; dy < H; dy += 12) {
    hctx.beginPath(); hctx.moveTo(0, dy); hctx.lineTo(W, dy); hctx.stroke();
  }
})();

// ─── Draw background (background canvas + scrolling clouds) ──────────────────
function drawBackground() {
  ctx.drawImage(hillCanvas, 0, 0);
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  for (const c of clouds) {
    ctx.beginPath();
    ctx.arc(c.x,            c.y,      c.w * 0.28, 0, Math.PI * 2);
    ctx.arc(c.x - c.w*0.22, c.y + 6,  c.w * 0.22, 0, Math.PI * 2);
    ctx.arc(c.x + c.w*0.22, c.y + 4,  c.w * 0.24, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── Pipe drawing ────────────────────────────────────────────────────────────
function drawPipe(px, py, pw, ph, isTop) {
  if (ph <= 0) return;

  // Main shaft
  const shaftGrad = ctx.createLinearGradient(px - pw/2, 0, px + pw/2, 0);
  shaftGrad.addColorStop(0,    '#5c3010');
  shaftGrad.addColorStop(0.18, '#c08848');
  shaftGrad.addColorStop(0.5,  '#d4a060');
  shaftGrad.addColorStop(0.75, '#a87038');
  shaftGrad.addColorStop(1,    '#5c3010');
  ctx.fillStyle = shaftGrad;
  ctx.fillRect(px - pw/2, py, pw, ph);

  // Wood grain lines
  ctx.save(); ctx.globalAlpha = 0.13;
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const lx = px - pw/2 + (pw / 4) * i;
    ctx.beginPath(); ctx.moveTo(lx, py); ctx.lineTo(lx, py + ph); ctx.stroke();
  }
  ctx.restore();

  // Horizontal ring bands
  const bandCount = Math.floor(ph / 38);
  ctx.save(); ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#3a1c00';
  for (let b = 1; b <= bandCount; b++) {
    const by = isTop ? py + ph - b * 38 : py + b * 38;
    ctx.fillRect(px - pw/2, by - 2, pw, 5);
  }
  ctx.restore();

  // Cap
  const capH = 24, capW = pw + 18;
  const capY = isTop ? py + ph - capH : py;
  const capGrad = ctx.createLinearGradient(px - capW/2, 0, px + capW/2, 0);
  capGrad.addColorStop(0,    '#4a2408');
  capGrad.addColorStop(0.2,  '#a87030');
  capGrad.addColorStop(0.5,  '#c89050');
  capGrad.addColorStop(0.75, '#9a6828');
  capGrad.addColorStop(1,    '#4a2408');
  ctx.fillStyle = capGrad;
  ctx.fillRect(px - capW/2, capY, capW, capH);

  // Cap highlight
  ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#fff';
  ctx.fillRect(px - capW/2 + 4, capY + 3, capW - 8, 4); ctx.restore();

  // Cap border
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(px - capW/2, capY, capW, capH);

  // Nails on cap
  ctx.fillStyle = '#aaa';
  for (const nx of [px - capW/2 + 10, px + capW/2 - 10]) {
    ctx.beginPath(); ctx.arc(nx, capY + capH/2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 0.8; ctx.stroke();
  }

  // Shaft outline
  ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(px - pw/2, py, pw, ph);
}

// ─── Chicken drawing ─────────────────────────────────────────────────────────
function drawChicken(cx, cy, angle, flapT, dead) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  // Shadow
  ctx.save(); ctx.globalAlpha = 0.18; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(3, 22, 17, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();

  // Tail feathers
  ctx.fillStyle = '#c89020';
  ctx.beginPath();
  ctx.moveTo(-14, -1);
  ctx.lineTo(-28, -14); ctx.lineTo(-24, -1); ctx.lineTo(-28, 6);
  ctx.lineTo(-22, 10); ctx.lineTo(-14, 6);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1; ctx.stroke();
  // Feather detail
  ctx.strokeStyle = '#a07010'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-14, 2); ctx.lineTo(-27, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14, 4); ctx.lineTo(-26, 8); ctx.stroke();

  // Wing (behind body)
  const wingRot = dead ? 0.2 : Math.sin(flapT * Math.PI * 2.5) * 0.55 - 0.1;
  ctx.save();
  ctx.translate(-3, 0);
  ctx.rotate(wingRot);
  const wGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, 16);
  wGrad.addColorStop(0, '#f0c840'); wGrad.addColorStop(1, '#c88820');
  ctx.fillStyle = wGrad;
  ctx.beginPath(); ctx.ellipse(0, 4, 14, 9, -0.25, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  // Body
  const bodyGrad = ctx.createRadialGradient(-4, -2, 2, 0, 4, 20);
  bodyGrad.addColorStop(0, '#ffe060'); bodyGrad.addColorStop(1, '#d4980c');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.ellipse(0, 5, 19, 16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Neck
  ctx.fillStyle = '#f0c030';
  ctx.beginPath(); ctx.ellipse(10, -4, 7, 9, 0.15, 0, Math.PI * 2); ctx.fill();

  // Head
  const hGrad = ctx.createRadialGradient(10, -12, 2, 12, -11, 12);
  hGrad.addColorStop(0, '#ffe060'); hGrad.addColorStop(1, '#d4940a');
  ctx.fillStyle = hGrad;
  ctx.beginPath(); ctx.arc(12, -11, 12, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Comb
  ctx.fillStyle = '#d42010';
  ctx.beginPath();
  ctx.moveTo(6,  -20);
  ctx.bezierCurveTo(5,  -28, 12, -30, 12, -22);
  ctx.bezierCurveTo(13, -30, 19, -28, 17, -20);
  ctx.bezierCurveTo(20, -28, 25, -26, 22, -19);
  ctx.lineTo(6, -20);
  ctx.fill();
  ctx.strokeStyle = '#a01008'; ctx.lineWidth = 0.8; ctx.stroke();

  // Wattle
  ctx.fillStyle = '#d42010';
  ctx.beginPath(); ctx.ellipse(17, -5, 4.5, 6, 0.3, 0, Math.PI * 2); ctx.fill();

  // Beak
  ctx.fillStyle = '#e87820';
  ctx.beginPath();
  ctx.moveTo(21, -13); ctx.lineTo(31, -10); ctx.lineTo(21, -7);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.8; ctx.stroke();
  // Beak line
  ctx.strokeStyle = '#c05010'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(21, -10); ctx.lineTo(30, -10); ctx.stroke();

  // Eye white
  ctx.fillStyle = dead ? '#ccc' : '#fff';
  ctx.beginPath(); ctx.arc(16, -13, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();

  if (dead) {
    // X eyes
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(13,-16); ctx.lineTo(19,-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(19,-16); ctx.lineTo(13,-10); ctx.stroke();
  } else {
    // Pupil
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(17, -13, 2.8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(18.2, -14.2, 1.1, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
}

// ─── Feather burst on death ───────────────────────────────────────────────────
let feathers = [];
function spawnFeathers(cx, cy) {
  for (let i = 0; i < 12; i++) {
    const ang = (Math.PI * 2 * i / 12) + (Math.random() - 0.5) * 0.8;
    const spd = 120 + Math.random() * 180;
    feathers.push({
      x: cx, y: cy,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 80,
      rot: Math.random() * Math.PI * 2,
      vRot: (Math.random() - 0.5) * 8,
      life: 1.0,
      w: 6 + Math.random() * 8,
      color: ['#f0c030','#e8a010','#d4940a','#fff8c0'][Math.floor(Math.random()*4)],
    });
  }
}
function updateFeathers(dt) {
  for (const f of feathers) {
    f.x += f.vx * dt; f.y += f.vy * dt;
    f.vy += 600 * dt;
    f.rot += f.vRot * dt;
    f.life -= dt * 0.9;
  }
  feathers = feathers.filter(f => f.life > 0);
}
function drawFeathers() {
  for (const f of feathers) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.translate(f.x, f.y); ctx.rotate(f.rot);
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.w, f.w * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Score flash ─────────────────────────────────────────────────────────────
let scoreFlash = 0;

// ─── Game state ──────────────────────────────────────────────────────────────
let state = 'waiting'; // 'waiting' | 'playing' | 'dead'
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappyChickenBest') || '0', 10);
let chicken, pipes, pipeTimer, deathFeathersSpawned;

function initGame() {
  chicken = { y: H / 2 - 20, vy: 0, angle: 0, flapT: 0 };
  pipes   = [];
  pipeTimer = PIPE_IVLBASE * 0.55;
  score   = 0;
  feathers = [];
  deathFeathersSpawned = false;
}

// ─── Flap / input ────────────────────────────────────────────────────────────
function flap() {
  if (state === 'waiting') {
    state = 'playing';
    chicken.vy = FLAP_FORCE;
    chicken.flapT = 1;
    return;
  }
  if (state === 'dead') {
    state = 'waiting';
    initGame();
    return;
  }
  chicken.vy   = FLAP_FORCE;
  chicken.flapT = 1;
}

canvas.addEventListener('click',   flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
window.addEventListener('keydown',  e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

// ─── Pipe spawning ────────────────────────────────────────────────────────────
function spawnPipe() {
  const minTop = 70;
  const maxTop = H - GROUND_H - PIPE_GAP - 70;
  const topH   = minTop + Math.random() * (maxTop - minTop);
  pipes.push({
    x:        W + PIPE_W / 2 + 10,
    topH,
    bottomY:  topH + PIPE_GAP,
    scored:   false,
  });
}

// ─── Collision ────────────────────────────────────────────────────────────────
function checkCollision() {
  const cx = CHICKEN_X, cy = chicken.y, r = HIT_R;
  if (cy - r <= 0 || cy + r >= H - GROUND_H) return true;
  for (const p of pipes) {
    const left  = p.x - PIPE_W / 2 - r;
    const right = p.x + PIPE_W / 2 + r;
    if (cx > left && cx < right) {
      if (cy - r < p.topH || cy + r > p.bottomY) return true;
    }
  }
  return false;
}

// ─── HUD drawing ─────────────────────────────────────────────────────────────
function drawScore() {
  const alpha = 1 + (scoreFlash > 0 ? Math.sin(scoreFlash * Math.PI) * 0.6 : 0);
  ctx.save(); ctx.globalAlpha = Math.min(1, alpha);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = 'bold 52px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(score, W/2 + 3, 76);
  // Main
  ctx.fillStyle = scoreFlash > 0 ? '#ffe060' : '#ffffff';
  ctx.fillText(score, W/2, 73);
  ctx.restore();
  ctx.textAlign = 'left';
  if (scoreFlash > 0) scoreFlash -= 0.04;
}

function drawBestBadge() {
  if (bestScore === 0) return;
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.roundRect(W - 14 - 90, 14, 90, 28, 14); ctx.fill();
  ctx.fillStyle = '#f0c030'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`BEST ${bestScore}`, W - 14 - 45, 33);
  ctx.textAlign = 'left';
}

// ─── Overlays ────────────────────────────────────────────────────────────────
function drawPanel(title, lines, tintColor) {
  // Dim
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.fillRect(0, 0, W, H);

  const pw = 310, ph = 195;
  const px = (W - pw) / 2, py = (H - ph) / 2 - 20;

  // Panel background
  ctx.fillStyle = 'rgba(8,12,26,0.97)';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 18); ctx.fill();
  ctx.strokeStyle = tintColor; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 18); ctx.stroke();

  // Title
  ctx.fillStyle = tintColor;
  ctx.font = 'bold 34px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(title, W/2, py + 52);

  // Lines
  ctx.fillStyle = '#e8eaf6'; ctx.font = '17px sans-serif';
  ctx.fillText(lines[0], W/2, py + 90);
  ctx.fillStyle = '#a0a8c0'; ctx.font = '14px sans-serif';
  for (let i = 1; i < lines.length; i++) {
    ctx.fillText(lines[i], W/2, py + 90 + i * 34);
  }
  ctx.textAlign = 'left';
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lastTs = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  // ── Update clouds
  for (const c of clouds) {
    c.x -= c.speed * dt;
    if (c.x + c.w * 0.5 < 0) {
      c.x = W + c.w * 0.5;
      c.y = 30 + rng() * (H - GROUND_H - 140);
    }
  }

  // ── Game logic
  if (state === 'playing') {
    chicken.vy    += GRAVITY * dt;
    chicken.y     += chicken.vy * dt;
    chicken.angle  = Math.max(-0.45, Math.min(Math.PI * 0.38, chicken.vy / 620));
    chicken.flapT  = Math.max(0, chicken.flapT - dt * 3.2);

    pipeTimer -= dt;
    if (pipeTimer <= 0) {
      spawnPipe();
      pipeTimer = PIPE_IVLBASE;
    }

    for (const p of pipes) {
      p.x -= PIPE_SPEED * dt;
      if (!p.scored && p.x + PIPE_W / 2 < CHICKEN_X - HIT_R) {
        p.scored = true;
        score++;
        scoreFlash = 1;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('flappyChickenBest', bestScore);
        }
      }
    }
    pipes = pipes.filter(p => p.x + PIPE_W / 2 + 20 > 0);

    if (checkCollision()) {
      state = 'dead';
      chicken.vy = Math.min(chicken.vy, -200);
    }
  } else if (state === 'dead') {
    if (!deathFeathersSpawned) {
      spawnFeathers(CHICKEN_X, chicken.y);
      deathFeathersSpawned = true;
    }
    chicken.vy   += GRAVITY * dt;
    chicken.y    += chicken.vy * dt;
    chicken.angle = Math.PI * 0.42;
    if (chicken.y > H + 40) chicken.y = H + 40;
    updateFeathers(dt);
  } else if (state === 'waiting') {
    // Gentle bob
    chicken.y = H / 2 - 20 + Math.sin(ts / 600) * 8;
    chicken.angle = 0;
    chicken.flapT = (Math.sin(ts / 300) + 1) / 2;
  }

  // ── Draw
  drawBackground();

  // Pipes
  for (const p of pipes) {
    drawPipe(p.x, 0,          PIPE_W, p.topH,                  true);
    drawPipe(p.x, p.bottomY,  PIPE_W, H - GROUND_H - p.bottomY, false);
  }

  // Feathers
  drawFeathers();

  // Chicken (hide if fallen off bottom)
  if (chicken.y < H + 30) {
    drawChicken(CHICKEN_X, chicken.y, chicken.angle, chicken.flapT, state === 'dead');
  }

  // HUD
  drawScore();
  drawBestBadge();

  // Overlays
  if (state === 'waiting') {
    drawChicken(W / 2, H / 2 - 90, 0, (Math.sin(ts / 300) + 1) / 2, false);
    drawPanel(
      'FLAPPY CHICKEN',
      ['Click or [Space] to flap!', `Best: ${bestScore}`],
      '#f0c030'
    );
  } else if (state === 'dead') {
    drawPanel(
      score > 0 && score === bestScore ? 'NEW BEST!' : 'BAWK!',
      [`Score: ${score}`, `Best: ${bestScore}`, 'Click or [Space] to retry'],
      score === bestScore && score > 0 ? '#ffe060' : '#e05040'
    );
  }

  requestAnimationFrame(loop);
}

// ─── Start ────────────────────────────────────────────────────────────────────
initGame();
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
