<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dash</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; cursor: pointer; }
    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: #a8dadc;
      border: 1px solid #1a3a6a; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }
  </style>
</head>
<body>
<a id="hub-btn" href="index.html">&#8592; Hub</a>
<canvas id="c"></canvas>
<script>
// ── Canvas ────────────────────────────────────────────────────────
const W = 480, H = 640;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 1;
function scaleCanvas() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
  canvas.width = W; canvas.height = H;
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// ── Constants ─────────────────────────────────────────────────────
const GROUND_Y    = 520;
const CUBE_SIZE   = 30;
const CUBE_X      = 90;
const GRAVITY     = 1600;
const JUMP_V      = -560;
const INIT_SPD    = 240;
const MAX_SPD     = 620;
const SPD_ACCEL   = 12;      // px/s per second
const SPIKE_W     = 28;
const SPIKE_H     = 26;
const GAP_MIN     = 90;
const GAP_MAX     = 140;
const CEIL_Y      = 80;      // top boundary for ceiling spikes

// Colour themes that rotate every 800 distance units
const THEMES = [
  { cube:'#c084fc', trail:'#7c3aed', spike:'#f87171', ground:'#1e1035', floor:'#312060', bg:'#0d0d1a' },
  { cube:'#38bdf8', trail:'#0284c7', spike:'#fb923c', ground:'#0c1a2e', floor:'#1e3a5f', bg:'#070d1a' },
  { cube:'#4ade80', trail:'#16a34a', spike:'#f87171', ground:'#0d1f12', floor:'#1a3d22', bg:'#070d0a' },
  { cube:'#facc15', trail:'#ca8a04', spike:'#f87171', ground:'#1f1a09', floor:'#3d3310', bg:'#0d0b04' },
  { cube:'#f472b6', trail:'#be185d', spike:'#60a5fa', ground:'#1f0d1a', floor:'#3d1a35', bg:'#0d070d' },
];

// ── Persistent state ──────────────────────────────────────────────
let hiScore = parseInt(localStorage.getItem('ndash_hi') || '0', 10);

// ── Game state ────────────────────────────────────────────────────
let state = 'title'; // 'title' | 'playing' | 'dead' | 'gameover'
let cube, obstacles, particles, trail;
let score, dist, worldSpd, jumpsLeft;
let animTime = 0, lastTime = 0, deathTimer = 0;
let bgStars = [];

// ── Background stars (static, pre-generated) ─────────────────────
function makeStars() {
  bgStars = Array.from({ length: 80 }, () => ({
    x: Math.random() * W,
    y: Math.random() * GROUND_Y,
    r: Math.random() * 1.2 + 0.2,
    spd: 0.15 + Math.random() * 0.35,
  }));
}
makeStars();

// ── Obstacle generation ───────────────────────────────────────────
// Each obstacle is one of:
//   { type:'spike', x, count }        – 1-3 ground spikes
//   { type:'gap',   x, w }            – gap in the floor
//   { type:'cspike', x, count }       – 1-2 ceiling spikes (above cube path)
//   { type:'combo',  x, spikes, gap } – gap + ceiling spike above the gap
let nextObstX = 0;

function nextTheme() {
  return THEMES[Math.floor(dist / 800) % THEMES.length];
}

function scheduleNext(afterX) {
  // spacing: tighter as speed rises
  const minGap = 160 + (1 - (worldSpd - INIT_SPD) / (MAX_SPD - INIT_SPD)) * 200;
  nextObstX = afterX + minGap + Math.random() * 120;
}

function spawnObstacle() {
  const x = nextObstX;
  const difficulty = Math.min(1, (dist - 0) / 2000);
  const roll = Math.random();

  let ob;
  if (dist < 200) {
    // Only single spikes at start
    ob = { type: 'spike', x, count: 1 };
  } else if (difficulty < 0.3) {
    if (roll < 0.6) ob = { type: 'spike', x, count: 1 + (Math.random() < 0.4 ? 1 : 0) };
    else            ob = { type: 'gap', x, w: GAP_MIN + Math.random() * 40 };
  } else if (difficulty < 0.6) {
    if (roll < 0.35)      ob = { type: 'spike', x, count: 1 + Math.floor(Math.random() * 2) };
    else if (roll < 0.65) ob = { type: 'gap', x, w: GAP_MIN + Math.random() * (GAP_MAX - GAP_MIN) };
    else if (roll < 0.85) ob = { type: 'cspike', x, count: 1 };
    else                  ob = { type: 'combo', x, gap: GAP_MIN + Math.random() * 40, spikes: 1 };
  } else {
    if (roll < 0.25)      ob = { type: 'spike', x, count: 2 + (Math.random() < 0.5 ? 1 : 0) };
    else if (roll < 0.5)  ob = { type: 'gap', x, w: GAP_MIN + Math.random() * (GAP_MAX - GAP_MIN) };
    else if (roll < 0.7)  ob = { type: 'cspike', x, count: 1 + (Math.random() < 0.4 ? 1 : 0) };
    else                  ob = { type: 'combo', x, gap: GAP_MIN + Math.random() * 50, spikes: 1 };
  }

  obstacles.push(ob);
  scheduleNext(x + (ob.type === 'combo' ? ob.gap : ob.type === 'gap' ? ob.w : ob.count * SPIKE_W));
}

// ── Collision helpers ─────────────────────────────────────────────
function cubeRect() {
  return { x: CUBE_X, y: cube.y, w: CUBE_SIZE, h: CUBE_SIZE };
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function checkCollision() {
  const cr = cubeRect();
  for (const ob of obstacles) {
    if (ob.type === 'spike') {
      for (let i = 0; i < ob.count; i++) {
        const sx = ob.x + i * SPIKE_W;
        // Spike hitbox slightly inset
        if (rectsOverlap(cr, { x: sx + 4, y: GROUND_Y - SPIKE_H + 4, w: SPIKE_W - 8, h: SPIKE_H - 4 })) return true;
      }
    } else if (ob.type === 'gap') {
      // Falling into gap
      if (cube.y + CUBE_SIZE > GROUND_Y && cr.x + cr.w > ob.x + 4 && cr.x < ob.x + ob.w - 4) return true;
    } else if (ob.type === 'cspike') {
      for (let i = 0; i < ob.count; i++) {
        const sx = ob.x + i * SPIKE_W;
        if (rectsOverlap(cr, { x: sx + 4, y: CEIL_Y, w: SPIKE_W - 8, h: SPIKE_H - 4 })) return true;
      }
    } else if (ob.type === 'combo') {
      // Gap
      if (cube.y + CUBE_SIZE > GROUND_Y && cr.x + cr.w > ob.x + 4 && cr.x < ob.x + ob.gap - 4) return true;
      // Ceiling spike above gap centre
      const sx = ob.x + ob.gap / 2 - SPIKE_W / 2;
      if (rectsOverlap(cr, { x: sx + 4, y: CEIL_Y, w: SPIKE_W - 8, h: SPIKE_H - 4 })) return true;
    }
  }
  return false;
}

// ── Particles ─────────────────────────────────────────────────────
function spawnDeath(x, y, color) {
  for (let i = 0; i < 28; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 220;
    particles.push({
      x: x + CUBE_SIZE / 2, y: y + CUBE_SIZE / 2,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 80,
      life: 1, decay: 0.6 + Math.random() * 0.8,
      r: 2 + Math.random() * 3, color,
      square: Math.random() < 0.4,
      size: 4 + Math.random() * 6,
    });
  }
}

// ── Init ──────────────────────────────────────────────────────────
function initGame() {
  cube = { y: GROUND_Y - CUBE_SIZE, vy: 0, alive: true, angle: 0 };
  obstacles = []; particles = []; trail = [];
  score = 0; dist = 0;
  worldSpd = INIT_SPD;
  jumpsLeft = 2;
  nextObstX = 500;
  scheduleNext(500);
  state = 'playing';
}

// ── Jump ──────────────────────────────────────────────────────────
function jump() {
  if (state === 'playing' && jumpsLeft > 0) {
    cube.vy = JUMP_V;
    jumpsLeft--;
    // Small jump particles
    const theme = nextTheme();
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: CUBE_X + Math.random() * CUBE_SIZE,
        y: cube.y + CUBE_SIZE,
        vx: (Math.random() - 0.5) * 80,
        vy: 40 + Math.random() * 60,
        life: 1, decay: 2.5 + Math.random(),
        r: 1.5 + Math.random(), color: theme.trail, square: false,
      });
    }
  }
}

// ── Input ─────────────────────────────────────────────────────────
function handleTap() {
  if (state === 'title')    { initGame(); return; }
  if (state === 'playing')  { jump(); return; }
  if (state === 'gameover') { state = 'title'; return; }
}

canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchend', e => { e.preventDefault(); handleTap(); }, { passive: false });
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Enter') {
    e.preventDefault(); handleTap();
  }
});

// ── Update ────────────────────────────────────────────────────────
function update(dt) {
  animTime += dt;

  // Update particles
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 500 * dt;
    p.life -= p.decay * dt;
  }
  particles = particles.filter(p => p.life > 0);

  if (state === 'dead') {
    deathTimer -= dt;
    // Scroll stars still
    for (const s of bgStars) {
      s.x -= s.spd * worldSpd * 0.003 * dt * 60;
      if (s.x < 0) s.x += W;
    }
    if (deathTimer <= 0) {
      if (score > hiScore) hiScore = score;
      localStorage.setItem('ndash_hi', hiScore);
      state = 'gameover';
    }
    return;
  }

  if (state !== 'playing') return;

  // Speed ramp
  worldSpd = Math.min(MAX_SPD, worldSpd + SPD_ACCEL * dt);

  // Scroll stars parallax
  for (const s of bgStars) {
    s.x -= s.spd * worldSpd * 0.003 * dt * 60;
    if (s.x < 0) s.x += W;
  }

  // Distance / score
  dist += worldSpd * dt;
  score = Math.floor(dist / 10);

  // Scroll obstacles
  for (const ob of obstacles) ob.x -= worldSpd * dt;
  obstacles = obstacles.filter(ob => ob.x > -300);

  // Spawn next
  if (nextObstX - worldSpd * dt < W + 200) spawnObstacle();

  // Cube physics
  cube.vy += GRAVITY * dt;
  cube.y  += cube.vy * dt;
  cube.angle += (worldSpd / 160) * dt * Math.PI; // spin proportional to speed

  // Land on ground
  const onGap = isOverGap();
  if (cube.y + CUBE_SIZE >= GROUND_Y && !onGap) {
    cube.y = GROUND_Y - CUBE_SIZE;
    cube.vy = 0;
    jumpsLeft = 2;
  }

  // Ceiling
  if (cube.y < CEIL_Y + SPIKE_H) {
    cube.y = CEIL_Y + SPIKE_H;
    cube.vy = Math.abs(cube.vy) * 0.3;
  }

  // Trail
  trail.push({ x: CUBE_X + CUBE_SIZE / 2, y: cube.y + CUBE_SIZE / 2, life: 1 });
  trail = trail.filter(t => t.life > 0);
  for (const t of trail) t.life -= dt * 5;

  // Collision
  if (checkCollision()) {
    const theme = nextTheme();
    spawnDeath(CUBE_X, cube.y, theme.cube);
    state = 'dead';
    deathTimer = 1.2;
  }
}

function isOverGap() {
  for (const ob of obstacles) {
    if ((ob.type === 'gap' || ob.type === 'combo')) {
      const gapW = ob.type === 'combo' ? ob.gap : ob.w;
      if (CUBE_X + CUBE_SIZE > ob.x + 4 && CUBE_X < ob.x + gapW - 4) return true;
    }
  }
  return false;
}

// ── Draw ──────────────────────────────────────────────────────────
function drawBg(theme) {
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 48) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GROUND_Y); ctx.stroke();
  }
  for (let y = 0; y < GROUND_Y; y += 48) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (const s of bgStars) {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
}

function drawGround(theme, offsetX) {
  // Ground platform with scrolling grid pattern
  ctx.fillStyle = theme.ground;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Floor tiles
  const tileW = 48;
  const off = offsetX % tileW;
  ctx.strokeStyle = theme.floor;
  ctx.lineWidth = 1;
  for (let x = -off; x < W + tileW; x += tileW) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();

  // Floor glow line
  ctx.save();
  ctx.shadowColor = theme.cube + '88';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = theme.cube + '44';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  ctx.restore();
}

function drawGaps(theme) {
  for (const ob of obstacles) {
    const gapW = ob.type === 'gap' ? ob.w : ob.type === 'combo' ? ob.gap : 0;
    if (!gapW) continue;
    // Cut out gap in floor
    ctx.fillStyle = theme.bg;
    ctx.fillRect(ob.x, GROUND_Y, gapW, H - GROUND_Y);
    // Dark pit
    const grad = ctx.createLinearGradient(ob.x, GROUND_Y, ob.x, GROUND_Y + 60);
    grad.addColorStop(0, 'rgba(0,0,0,0.7)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(ob.x, GROUND_Y, gapW, 60);
    // Gap edge glow
    ctx.save();
    ctx.shadowColor = '#ff3355';
    ctx.shadowBlur = 10;
    ctx.strokeStyle = '#ff3355';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ob.x, GROUND_Y); ctx.lineTo(ob.x + gapW, GROUND_Y); ctx.stroke();
    ctx.restore();
  }
}

function drawSpike(x, y, w, h, color, ceiling) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.fillStyle = color;
  ctx.beginPath();
  if (!ceiling) {
    // Ground spike pointing up
    ctx.moveTo(x, y + h);
    ctx.lineTo(x + w / 2, y);
    ctx.lineTo(x + w, y + h);
  } else {
    // Ceiling spike pointing down
    ctx.moveTo(x, y);
    ctx.lineTo(x + w / 2, y + h);
    ctx.lineTo(x + w, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawObstacles(theme) {
  for (const ob of obstacles) {
    if (ob.type === 'spike') {
      for (let i = 0; i < ob.count; i++) {
        drawSpike(ob.x + i * SPIKE_W, GROUND_Y - SPIKE_H, SPIKE_W, SPIKE_H, theme.spike, false);
      }
    } else if (ob.type === 'cspike') {
      for (let i = 0; i < ob.count; i++) {
        drawSpike(ob.x + i * SPIKE_W, CEIL_Y, SPIKE_W, SPIKE_H, theme.spike, true);
      }
    } else if (ob.type === 'combo') {
      // Ceiling spike above gap
      const sx = ob.x + ob.gap / 2 - SPIKE_W / 2;
      drawSpike(sx, CEIL_Y, SPIKE_W, SPIKE_H, theme.spike, true);
    }
  }
}

function drawCube(theme) {
  ctx.save();
  ctx.translate(CUBE_X + CUBE_SIZE / 2, cube.y + CUBE_SIZE / 2);
  ctx.rotate(cube.angle);

  // Glow
  ctx.shadowColor = theme.cube;
  ctx.shadowBlur = 20;

  // Fill
  ctx.fillStyle = theme.cube + '33';
  ctx.fillRect(-CUBE_SIZE / 2, -CUBE_SIZE / 2, CUBE_SIZE, CUBE_SIZE);

  // Border
  ctx.strokeStyle = theme.cube;
  ctx.lineWidth = 2.5;
  ctx.strokeRect(-CUBE_SIZE / 2 + 1, -CUBE_SIZE / 2 + 1, CUBE_SIZE - 2, CUBE_SIZE - 2);

  // Inner cross accent
  ctx.shadowBlur = 0;
  ctx.strokeStyle = theme.cube + '66';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-CUBE_SIZE / 4, -CUBE_SIZE / 4);
  ctx.lineTo(CUBE_SIZE / 4, CUBE_SIZE / 4);
  ctx.moveTo(CUBE_SIZE / 4, -CUBE_SIZE / 4);
  ctx.lineTo(-CUBE_SIZE / 4, CUBE_SIZE / 4);
  ctx.stroke();
  ctx.restore();
}

function drawTrail(theme) {
  for (const t of trail) {
    ctx.save();
    ctx.globalAlpha = t.life * 0.45;
    ctx.fillStyle = theme.trail;
    ctx.shadowColor = theme.trail;
    ctx.shadowBlur = 8;
    const s = CUBE_SIZE * t.life * 0.6;
    ctx.fillRect(t.x - s / 2, t.y - s / 2, s, s);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    if (p.square) {
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawHUD(theme) {
  ctx.save();
  ctx.textAlign = 'center';

  // Score
  ctx.font = 'bold 32px Segoe UI';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = theme.cube;
  ctx.shadowBlur = 16;
  ctx.fillText(score, W / 2, 38);

  // Hi score
  ctx.font = 'bold 11px Segoe UI';
  ctx.fillStyle = '#7986a8';
  ctx.shadowBlur = 0;
  ctx.fillText('BEST  ' + hiScore, W / 2, 56);

  // Jump dots (right)
  const dotY = 34, dotR = 5, dotGap = 14;
  for (let i = 0; i < 2; i++) {
    const filled = i < jumpsLeft;
    ctx.beginPath();
    ctx.arc(W - 28 + i * dotGap, dotY, dotR, 0, Math.PI * 2);
    if (filled) {
      ctx.fillStyle = theme.cube;
      ctx.shadowColor = theme.cube;
      ctx.shadowBlur = 10;
      ctx.fill();
    } else {
      ctx.strokeStyle = '#7986a8';
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Speed bar (left)
  const speedFrac = Math.min(1, (worldSpd - INIT_SPD) / (MAX_SPD - INIT_SPD));
  const bw = 80, bh = 5;
  const bx = 16, by = 56;
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill();
  ctx.fillStyle = theme.cube;
  ctx.shadowColor = theme.cube;
  ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.roundRect(bx, by, bw * speedFrac, bh, 3); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.font = '9px Segoe UI';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#7986a8';
  ctx.fillText('SPEED', bx, by - 2);

  ctx.restore();
}

function drawTitle() {
  const theme = THEMES[0];
  drawBg(theme);
  drawGround(theme, 0);

  const pulse = 0.5 + 0.5 * Math.sin(animTime * 1.8);

  ctx.save();
  ctx.textAlign = 'center';

  ctx.font = 'bold 66px Segoe UI';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = theme.cube;
  ctx.shadowBlur = 28 + pulse * 22;
  ctx.fillText('NEON', W / 2, 200);

  ctx.font = 'bold 72px Segoe UI';
  ctx.fillStyle = theme.cube;
  ctx.shadowBlur = 40 + pulse * 30;
  ctx.fillText('DASH', W / 2, 276);

  ctx.shadowBlur = 0;
  ctx.font = '15px Segoe UI';
  ctx.fillStyle = '#7986a8';
  ctx.fillText('Jump over spikes. Don\'t fall in gaps.', W / 2, 318);
  ctx.fillText('TAP anywhere to double-jump.', W / 2, 340);

  if (Math.sin(animTime * 2.5) > 0) {
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = theme.cube;
    ctx.shadowColor = theme.cube;
    ctx.shadowBlur = 14;
    ctx.fillText('TAP / SPACE TO START', W / 2, 388);
  }

  if (hiScore > 0) {
    ctx.shadowBlur = 0;
    ctx.font = '13px Segoe UI';
    ctx.fillStyle = '#7986a8';
    ctx.fillText('Best: ' + hiScore, W / 2, 412);
  }

  // Demo cube on ground
  const demoX = 90 + Math.sin(animTime) * 20;
  ctx.shadowColor = theme.cube;
  ctx.shadowBlur = 16;
  ctx.strokeStyle = theme.cube;
  ctx.lineWidth = 2.5;
  ctx.strokeRect(demoX, GROUND_Y - CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);

  ctx.restore();
}

function drawGameOver() {
  const theme = THEMES[Math.floor(score / 80) % THEMES.length];
  drawBg(theme);
  drawGround(theme, 0);
  drawParticles();

  const pulse = 0.5 + 0.5 * Math.sin(animTime * 2.2);
  ctx.save();
  ctx.textAlign = 'center';

  ctx.font = 'bold 52px Segoe UI';
  ctx.fillStyle = theme.spike;
  ctx.shadowColor = theme.spike;
  ctx.shadowBlur = 20 + pulse * 18;
  ctx.fillText('GAME OVER', W / 2, 190);

  ctx.font = 'bold 52px Segoe UI';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 10;
  ctx.fillText(score, W / 2, 268);

  ctx.shadowBlur = 0;
  ctx.font = '14px Segoe UI';
  ctx.fillStyle = '#7986a8';
  ctx.fillText('SCORE', W / 2, 288);

  const isNew = score >= hiScore && score > 0;
  if (isNew) {
    ctx.font = 'bold 15px Segoe UI';
    ctx.fillStyle = '#facc15';
    ctx.shadowColor = '#facc15';
    ctx.shadowBlur = 14;
    ctx.fillText('★ NEW BEST ★', W / 2, 320);
    ctx.shadowBlur = 0;
  } else if (hiScore > 0) {
    ctx.font = '13px Segoe UI';
    ctx.fillStyle = '#7986a8';
    ctx.shadowBlur = 0;
    ctx.fillText('Best: ' + hiScore, W / 2, 320);
  }

  if (Math.sin(animTime * 2.5) > 0) {
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = theme.cube;
    ctx.shadowColor = theme.cube;
    ctx.shadowBlur = 12;
    ctx.fillText('TAP TO PLAY AGAIN', W / 2, 400);
  }

  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────────
let floorScrollX = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  update(dt);
  if (state === 'playing' || state === 'dead') floorScrollX += (state === 'playing' ? worldSpd : worldSpd * 0.2) * dt;

  const theme = nextTheme();

  if (state === 'title') {
    drawTitle();
  } else if (state === 'playing' || state === 'dead') {
    drawBg(theme);
    drawTrail(theme);
    drawGround(theme, floorScrollX);
    drawGaps(theme);
    drawObstacles(theme);
    if (state === 'playing') drawCube(theme);
    drawParticles();
    drawHUD(theme);
  } else if (state === 'gameover') {
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
