<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccer Shooter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; cursor: crosshair; }
    #hub-btn {
      position: fixed; top: 14px; left: 14px;
      background: rgba(13,13,26,0.85); color: #a8dadc;
      border: 1px solid #1a3a6a; border-radius: 20px;
      padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    #hub-btn:hover { border-color: #a8dadc; color: #fff; }
  </style>
</head>
<body>
<a id="hub-btn" href="index.html">&#8592; Hub</a>
<canvas id="canvas"></canvas>
<script>
// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 820, H = 500;
canvas.width = W; canvas.height = H;
function applyScale() {
  const s = Math.min(window.innerWidth / W, (window.innerHeight - 10) / H);
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
applyScale();
window.addEventListener('resize', applyScale);

// ─── Layout ───────────────────────────────────────────────────────────────────
const GROUND_Y  = H - 80;
const BALL_R    = 13;
const BALL_X0   = 115;
const BALL_Y0   = GROUND_Y - BALL_R;

// Goal geometry
const GOAL_X    = W - 82;   // x of the front post's inner edge (goal opening starts here)
const GOAL_NET  = 54;       // net depth (goal interior width)
const GOAL_H    = 148;
const POST_W    = 14;
const GOAL_TOP  = GROUND_Y - GOAL_H;

// ─── Physics ──────────────────────────────────────────────────────────────────
const GRAVITY      = 680;
const BOUNCE       = 0.42;
const ROLL_FRIC    = 0.984;   // per-frame friction when ball is on ground
const AIR_DRAG     = 0.9998;  // per-frame horizontal air drag
const MIN_BOUNCE_V = 55;      // below this vy, stop bouncing and just roll
const STOP_SPEED   = 5;       // below this total speed, start stopped timer
const MAX_SHOOT    = 840;
const MIN_SHOOT    = 260;
const MAX_ATTEMPTS = 3;

// ─── Levels ───────────────────────────────────────────────────────────────────
// Types: wall (static), vmover (vertical oscillator), spinner (rotating bar)
// vmover: baseY = vertical centre, amp = oscillation amplitude
const LEVELS = [
  {
    name: 'Open Goal',
    tip:  'Hold to charge power. Release to shoot!',
    obstacles: [],
  },
  {
    name: 'Low Wall',
    tip:  'Loft it over the wall.',
    obstacles: [
      { type:'wall', x:400, y:GROUND_Y - 110, w:22, h:110 },
    ],
  },
  {
    name: 'High Gap',
    tip:  'Roll it through the gap at the bottom.',
    obstacles: [
      { type:'wall', x:410, y:0, w:22, h:GROUND_Y - 80 },
    ],
  },
  {
    name: 'Sliding Shield',
    tip:  'The shield moves — watch for the gap!',
    obstacles: [
      { type:'vmover', x:390, baseY:GROUND_Y - 120, w:24, h:115, amp:95, freq:1.4, t:0 },
    ],
  },
  {
    name: 'Spin Zone',
    tip:  'Time your shot around the spinning bar.',
    obstacles: [
      { type:'spinner', cx:440, cy:GROUND_Y - 115, len:108, speed:2.4, angle:0, w:14 },
    ],
  },
  {
    name: 'Wall & Spinner',
    tip:  'Clear the wall, then thread the spinner.',
    obstacles: [
      { type:'wall',    x:340, y:GROUND_Y - 120, w:22, h:120 },
      { type:'spinner', cx:510, cy:GROUND_Y - 100, len:95, speed:-2.8, angle:0.8, w:14 },
    ],
  },
  {
    name: 'Full Chaos',
    tip:  'Everything at once. Find a path.',
    obstacles: [
      { type:'wall',    x:320, y:GROUND_Y - 130, w:22, h:130 },
      { type:'vmover',  x:460, baseY:GROUND_Y - 110, w:24, h:100, amp:90, freq:1.6, t:0.4 },
      { type:'spinner', cx:580, cy:GROUND_Y - 95,  len:85, speed:3.1, angle:1.5, w:13 },
    ],
  },
];

// ─── Game state ───────────────────────────────────────────────────────────────
let levelIdx    = 0;
let attempts    = MAX_ATTEMPTS;
let totalScore  = 0;
let state       = 'menu'; // menu | aiming | charging | flying | pausing | gameover | win

// Ball state
let ball = {};
function resetBall() {
  ball = { x: BALL_X0, y: BALL_Y0, vx: 0, vy: 0, spin: 0, trail: [], prevX: BALL_X0, onGround: false };
}

// Mouse
const mouse = { x: 0, y: 0, down: false };
let power = 0;

// Obstacles (live copy per level)
let obs = [];

// Pause / auto-advance
let pauseTimer  = 0;
let pauseAction = null;
function schedPause(dur, fn) { pauseTimer = dur; pauseAction = fn; }

// Scored goals this level (for star count)
let shotsUsed = 0;

// Toast notification
let toast = { msg:'', color:'#fff', t:0, dur:0 };
function showToast(msg, color, dur) { toast = { msg, color, t: dur, dur }; }

function initLevel() {
  const lev = LEVELS[levelIdx];
  obs = lev.obstacles.map(o => {
    const copy = { ...o, t: o.t || 0 };
    // vmover needs o.y initialised before the first updateObs call
    if (copy.type === 'vmover') copy.y = copy.baseY;
    return copy;
  });
  resetBall();
  shotsUsed = 0;
  state = 'aiming';
}

// ─── Input ────────────────────────────────────────────────────────────────────
function canvasXY(e) {
  const r  = canvas.getBoundingClientRect();
  const sx = W / r.width, sy = H / r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
}
canvas.addEventListener('mousemove',  e => { const p = canvasXY(e); mouse.x = p.x; mouse.y = p.y; });
canvas.addEventListener('mousedown',  e => { mouse.down = true;  onPress(); });
canvas.addEventListener('mouseup',    e => { mouse.down = false; onRelease(); });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); const p = canvasXY(e); mouse.x = p.x; mouse.y = p.y; }, { passive:false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = canvasXY(e); mouse.x = p.x; mouse.y = p.y; mouse.down = true; onPress(); }, { passive:false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); mouse.down = false; onRelease(); }, { passive:false });

function onPress() {
  if (state === 'menu')     { levelIdx = 0; attempts = MAX_ATTEMPTS; totalScore = 0; initLevel(); }
  if (state === 'aiming')   { state = 'charging'; power = 0; }
  if (state === 'pausing')  { // skip the toast/pause immediately
    pauseTimer = 0;
    if (pauseAction) { pauseAction(); pauseAction = null; }
  }
  if (state === 'gameover') { levelIdx = 0; attempts = MAX_ATTEMPTS; totalScore = 0; state = 'menu'; }
  if (state === 'win')      { levelIdx = 0; attempts = MAX_ATTEMPTS; totalScore = 0; state = 'menu'; }
}
function onRelease() {
  if (state === 'charging') shoot();
}
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (state === 'aiming') { state = 'charging'; power = 0; } }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' && state === 'charging') shoot();
});

function shoot() {
  const dx = mouse.x - ball.x;
  const dy = mouse.y - ball.y;
  const ang = Math.atan2(dy, dx);
  const spd = MIN_SHOOT + power * (MAX_SHOOT - MIN_SHOOT);
  ball.vx = Math.cos(ang) * spd;
  ball.vy = Math.sin(ang) * spd;
  ball.trail = [];
  state = 'flying';
  shotsUsed++;
}

// ─── Obstacle update ──────────────────────────────────────────────────────────
function updateObs(dt) {
  for (const o of obs) {
    if (o.type === 'spinner') {
      o.angle = (o.angle || 0) + o.speed * dt;
    } else if (o.type === 'vmover') {
      o.t += dt;
      o.y = o.baseY - o.amp / 2 + (Math.sin(o.t * o.freq) * 0.5 + 0.5) * o.amp;
    }
  }
}

// ─── Collision helpers ────────────────────────────────────────────────────────
function resolveCircleRect(bx, by, r, rx, ry, rw, rh) {
  const cx = Math.max(rx, Math.min(bx, rx + rw));
  const cy = Math.max(ry, Math.min(by, ry + rh));
  const dx = bx - cx, dy = by - cy;
  const d2 = dx*dx + dy*dy;
  if (d2 >= r*r) return null;
  const dist = Math.sqrt(d2) || 0.001;
  return { nx: dx/dist, ny: dy/dist, pen: r - dist };
}
function resolveCircleSegment(bx, by, r, ax, ay, bx2, by2) {
  const ex = bx2-ax, ey = by2-ay, len2 = ex*ex+ey*ey;
  if (!len2) return null;
  const t  = Math.max(0, Math.min(1, ((bx-ax)*ex + (by-ay)*ey) / len2));
  const px = ax+t*ex, py = ay+t*ey;
  const dx = bx-px, dy = by-py, d2 = dx*dx+dy*dy;
  if (d2 >= r*r) return null;
  const dist = Math.sqrt(d2) || 0.001;
  return { nx: dx/dist, ny: dy/dist, pen: r - dist };
}
function bounceOff(res, restitution) {
  ball.x += res.nx * (res.pen + 0.5);
  ball.y += res.ny * (res.pen + 0.5);
  const dot = ball.vx*res.nx + ball.vy*res.ny;
  if (dot < 0) {
    ball.vx -= (1 + restitution) * dot * res.nx;
    ball.vy -= (1 + restitution) * dot * res.ny;
  }
}

// ─── Goal / miss helpers ──────────────────────────────────────────────────────
function onGoal() {
  const stars = Math.max(1, MAX_ATTEMPTS - shotsUsed + 1);
  totalScore += stars;
  const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  showToast(`GOAL!  ${starStr}`, '#4ddd88', 2.2);
  schedPause(2.2, () => {
    levelIdx++;
    if (levelIdx >= LEVELS.length) { state = 'win'; }
    else { attempts = MAX_ATTEMPTS; initLevel(); }
  });
  state = 'pausing';
}
function onMiss(reason) {
  attempts--;
  if (attempts <= 0) {
    showToast(reason + ' — Level failed!', '#e94560', 2.0);
    schedPause(2.0, () => { state = 'gameover'; });
  } else {
    showToast(`${reason}  (${attempts} shot${attempts > 1 ? 's' : ''} left)`, '#f0a030', 1.4);
    schedPause(1.4, () => { resetBall(); state = 'aiming'; });
  }
  state = 'pausing';
}

// ─── Physics update ───────────────────────────────────────────────────────────
let stopTimer = 0;

function updateBall(dt) {
  // Store previous x for goal line-crossing detection
  ball.prevX = ball.x;

  // Gravity
  ball.vy += GRAVITY * dt;

  // Air drag (minimal)
  ball.vx *= Math.pow(AIR_DRAG, dt * 60);

  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // ── Ground ─────────────────────────────────────────────────────────────────
  ball.onGround = false;
  if (ball.y + BALL_R >= GROUND_Y) {
    ball.y = GROUND_Y - BALL_R;
    ball.onGround = true;
    if (Math.abs(ball.vy) > MIN_BOUNCE_V) {
      ball.vy = -Math.abs(ball.vy) * BOUNCE;
    } else {
      ball.vy = 0;
    }
    ball.vx *= ROLL_FRIC;
  }

  // Rolling spin — always tracks vx
  ball.spin += (ball.vx / BALL_R) * dt;

  // Trail
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 20) ball.trail.shift();

  // ── Boundaries ─────────────────────────────────────────────────────────────
  if (ball.y - BALL_R < 0) {
    ball.y  = BALL_R;
    ball.vy = Math.abs(ball.vy) * 0.5;
  }
  if (ball.x - BALL_R < 0) {
    ball.x  = BALL_R;
    ball.vx = Math.abs(ball.vx) * 0.6;
  }

  // ── Goal crossbar & back-post collision (so ball can't cheat over top) ─────
  // Crossbar (top of goal, horizontal)
  const cbRes = resolveCircleRect(ball.x, ball.y, BALL_R,
    GOAL_X - POST_W, GOAL_TOP - POST_W, GOAL_NET + POST_W * 2, POST_W);
  if (cbRes) bounceOff(cbRes, 0.35);

  // Back of net (ball stays in goal, or bounces back)
  const backRes = resolveCircleRect(ball.x, ball.y, BALL_R,
    GOAL_X + GOAL_NET, GOAL_TOP, POST_W, GOAL_H);
  if (backRes) bounceOff(backRes, 0.1);

  // ── Obstacle collisions ────────────────────────────────────────────────────
  for (const o of obs) {
    if (o.type === 'wall' || o.type === 'vmover') {
      const res = resolveCircleRect(ball.x, ball.y, BALL_R, o.x, o.y, o.w, o.h);
      if (res) bounceOff(res, 0.55);
    } else if (o.type === 'spinner') {
      const cos = Math.cos(o.angle), sin = Math.sin(o.angle);
      const ax = o.cx - cos * o.len, ay = o.cy - sin * o.len;
      const bx = o.cx + cos * o.len, by = o.cy + sin * o.len;
      const res = resolveCircleSegment(ball.x, ball.y, BALL_R + o.w / 2, ax, ay, bx, by);
      if (res) {
        bounceOff(res, 0.55);
        // Impart spin-bar momentum
        ball.vx +=  o.speed * res.ny * 70;
        ball.vy -= o.speed * res.nx * 70;
      }
    }
  }

  // ── Goal scoring — line-crossing detection ─────────────────────────────────
  // Ball must cross x = GOAL_X from left to right while inside goal opening
  if (ball.prevX < GOAL_X && ball.x >= GOAL_X) {
    if (ball.y > GOAL_TOP && ball.y < GROUND_Y - 2) {
      onGoal();
      return;
    }
  }

  // ── Right side out of bounds ───────────────────────────────────────────────
  if (ball.x - BALL_R > W + 30) {
    onMiss('Wide!');
    return;
  }

  // ── Stopped on ground ─────────────────────────────────────────────────────
  const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (spd < STOP_SPEED && ball.onGround) {
    stopTimer += dt;
    if (stopTimer > 0.6) { stopTimer = 0; onMiss('Blocked!'); }
  } else {
    stopTimer = 0;
  }
}

// ─── Pre-render field ─────────────────────────────────────────────────────────
const fieldCvs = document.createElement('canvas');
fieldCvs.width = W; fieldCvs.height = H;
const fctx = fieldCvs.getContext('2d');
(function () {
  const bg = fctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,   '#0a1525');
  bg.addColorStop(0.65,'#0d1e35');
  bg.addColorStop(1,   '#0e1a2c');
  fctx.fillStyle = bg; fctx.fillRect(0, 0, W, H);

  // Stadium floodlights
  for (const lx of [W*0.18, W*0.5, W*0.82]) {
    const g = fctx.createRadialGradient(lx, 0, 4, lx, 0, 240);
    g.addColorStop(0, 'rgba(255,245,210,0.10)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    fctx.fillStyle = g; fctx.fillRect(0, 0, W, H);
  }

  // Grass stripes
  const stripes = ['#2e7d32','#337d38'];
  for (let sx = 0; sx < W; sx += 56) {
    fctx.fillStyle = stripes[Math.floor(sx/56) % 2];
    fctx.fillRect(sx, GROUND_Y - 2, 56, H - GROUND_Y + 2);
  }
  // Grass edge
  fctx.fillStyle = '#4d8f40';
  fctx.fillRect(0, GROUND_Y - 5, W, 5);

  // Dirt
  fctx.fillStyle = '#6b4520';
  fctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  fctx.strokeStyle = 'rgba(0,0,0,0.1)'; fctx.lineWidth = 1;
  for (let dy = GROUND_Y + 14; dy < H; dy += 12) {
    fctx.beginPath(); fctx.moveTo(0, dy); fctx.lineTo(W, dy); fctx.stroke();
  }

  // Pitch markings
  fctx.strokeStyle = 'rgba(255,255,255,0.13)'; fctx.lineWidth = 1.5;
  // Centre
  fctx.beginPath(); fctx.moveTo(W/2, GROUND_Y - 2); fctx.lineTo(W/2, GROUND_Y - 70); fctx.stroke();
  fctx.beginPath(); fctx.arc(W/2, GROUND_Y, 58, -Math.PI, 0); fctx.stroke();
  // Penalty boxes
  fctx.strokeRect(GOAL_X - 115, GROUND_Y - 165, 115 + POST_W + GOAL_NET, 165);
  fctx.strokeRect(0, GROUND_Y - 125, 105, 125);
  // Spots
  fctx.fillStyle = 'rgba(255,255,255,0.18)';
  fctx.beginPath(); fctx.arc(BALL_X0, GROUND_Y - 3, 4, 0, Math.PI * 2); fctx.fill();
  fctx.beginPath(); fctx.arc(GOAL_X - 88, GROUND_Y - 3, 4, 0, Math.PI * 2); fctx.fill();
})();

// ─── Draw functions ───────────────────────────────────────────────────────────
function drawGoal() {
  const x  = GOAL_X, t = GOAL_TOP, net = GOAL_NET, pw = POST_W;

  // Net
  ctx.save(); ctx.globalAlpha = 0.22;
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.8;
  for (let nx = 0; nx <= net; nx += 10) {
    ctx.beginPath(); ctx.moveTo(x+nx, t+pw); ctx.lineTo(x+nx, GROUND_Y); ctx.stroke();
  }
  for (let ny = t+pw; ny <= GROUND_Y; ny += 10) {
    ctx.beginPath(); ctx.moveTo(x, ny); ctx.lineTo(x+net+pw, ny); ctx.stroke();
  }
  ctx.restore();

  // Inner glow
  ctx.save(); ctx.globalAlpha = 0.10;
  ctx.fillStyle = '#50e870';
  ctx.fillRect(x, t + pw, net + pw, GOAL_H - pw);
  ctx.restore();

  // Posts — bright white with subtle 3-D bevel
  const postGrad = ctx.createLinearGradient(x - pw, 0, x, 0);
  postGrad.addColorStop(0, '#ccc'); postGrad.addColorStop(0.4, '#fff'); postGrad.addColorStop(1, '#aaa');
  ctx.fillStyle = postGrad;
  ctx.fillRect(x - pw, t,      pw, GOAL_H);         // front post
  ctx.fillRect(x,      t,      net + pw, pw);        // crossbar
  ctx.fillRect(x + net, t,     pw, GOAL_H);          // back post

  // Post outlines
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(x - pw, t, pw, GOAL_H);
  ctx.strokeRect(x, t, net + pw, pw);
  ctx.strokeRect(x + net, t, pw, GOAL_H);
}

function drawObstacle(o) {
  if (o.type === 'wall' || o.type === 'vmover') {
    // Gradient red block with highlight
    const g = ctx.createLinearGradient(o.x, 0, o.x + o.w, 0);
    g.addColorStop(0,   '#b01828'); g.addColorStop(0.45,'#f03050');
    g.addColorStop(0.55,'#f03050'); g.addColorStop(1,   '#b01828');
    ctx.fillStyle = g;
    ctx.fillRect(o.x, o.y, o.w, o.h);
    // Highlight stripe
    ctx.save(); ctx.globalAlpha = 0.22; ctx.fillStyle = '#fff';
    ctx.fillRect(o.x + 3, o.y + 3, o.w - 6, Math.min(o.h - 6, 20)); ctx.restore();
    // Warning chevrons
    ctx.save(); ctx.globalAlpha = 0.3; ctx.fillStyle = '#000';
    const seg = 24, total = Math.floor(o.h / seg);
    for (let i = 0; i < total; i++) {
      const ty = o.y + i * seg;
      if (i % 2 === 1) ctx.fillRect(o.x, ty, o.w, seg);
    }
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,60,60,0.5)'; ctx.lineWidth = 1.5;
    ctx.strokeRect(o.x, o.y, o.w, o.h);
    // Arrow on vmover
    if (o.type === 'vmover') {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      const mx = o.x + o.w / 2, my = o.y + o.h / 2;
      ctx.beginPath(); ctx.moveTo(mx, my-16); ctx.lineTo(mx-7, my-8); ctx.lineTo(mx+7, my-8); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(mx, my+16); ctx.lineTo(mx-7, my+8); ctx.lineTo(mx+7, my+8); ctx.closePath(); ctx.fill();
    }
  } else if (o.type === 'spinner') {
    const angle = o.angle || 0;
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const ax = o.cx - cos*o.len, ay = o.cy - sin*o.len;
    const bx = o.cx + cos*o.len, by = o.cy + sin*o.len;

    // Glow
    ctx.save(); ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#f0a020'; ctx.lineWidth = o.w * 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    ctx.restore();

    // Bar
    const bg = ctx.createLinearGradient(ax, ay, bx, by);
    bg.addColorStop(0, '#7a4008'); bg.addColorStop(0.5, '#d4a030'); bg.addColorStop(1, '#7a4008');
    ctx.strokeStyle = bg; ctx.lineWidth = o.w; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();

    // Pivot
    ctx.fillStyle = '#f0d060';
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.w * 0.95, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#806010'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

function drawBall() {
  const { x, y, spin } = ball;
  // Shadow — drawn before rotation so it always stays flat on the ground
  const distToGround = GROUND_Y - y - BALL_R;
  const shadowAlpha = Math.max(0, 0.32 - distToGround * 0.0014);
  const shadowW     = Math.max(0, BALL_R * (1 - distToGround * 0.003));
  if (shadowAlpha > 0 && shadowW > 0) {
    ctx.save();
    ctx.globalAlpha = shadowAlpha;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(x + 2, GROUND_Y + 2, shadowW, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save(); ctx.translate(x, y); ctx.rotate(spin);

  // Ball
  const grad = ctx.createRadialGradient(-BALL_R*0.35, -BALL_R*0.35, 1, 0, 0, BALL_R);
  grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#c8c8c8');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI * 2); ctx.fill();

  // Pentagon patches
  ctx.fillStyle = '#1a1a2e';
  const centers = [[0,0],[BALL_R*.55,-BALL_R*.38],[-BALL_R*.55,-BALL_R*.38],[BALL_R*.34,BALL_R*.52],[-BALL_R*.34,BALL_R*.52]];
  for (const [px, py] of centers) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = i/5*Math.PI*2 - Math.PI/2, r = BALL_R*0.28;
      i===0 ? ctx.moveTo(px+Math.cos(a)*r, py+Math.sin(a)*r)
            : ctx.lineTo(px+Math.cos(a)*r, py+Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function drawTrail() {
  for (let i = 1; i < ball.trail.length; i++) {
    const alpha = (i / ball.trail.length) * 0.35;
    const r = BALL_R * (i / ball.trail.length) * 0.55;
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = '#7ab8dc';
    ctx.beginPath(); ctx.arc(ball.trail[i].x, ball.trail[i].y, r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawPlayer() {
  const px = BALL_X0 - 6, py = GROUND_Y;
  const charging = state === 'charging';

  ctx.save(); ctx.globalAlpha = 0.15; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(px+2, py+2, 15, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();

  // Legs
  ctx.strokeStyle = '#1550a0'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(px-4, py-10); ctx.lineTo(px-8, py); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px+4, py-10); ctx.lineTo(px+9, py); ctx.stroke();
  // Boots
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(px-8, py+2, 7, 3.5, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px+9, py+2, 7, 3.5, -0.2, 0, Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle = charging ? '#c01828' : '#1a5fc8';
  ctx.beginPath(); ctx.roundRect(px-9, py-40, 18, 30, 3); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.stroke();
  // Arms
  ctx.strokeStyle = '#e0a870'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(px-9, py-32); ctx.lineTo(charging ? px-22 : px-17, charging ? py-46 : py-24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px+9, py-32); ctx.lineTo(px+17, py-22); ctx.stroke();
  // Head
  ctx.fillStyle = '#e8b070';
  ctx.beginPath(); ctx.arc(px, py-50, 11, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();
  // Hair
  ctx.fillStyle = '#4a2808';
  ctx.beginPath(); ctx.ellipse(px, py-57, 11, 5, 0, Math.PI, Math.PI*2); ctx.fill();
}

function drawAim() {
  const dx = mouse.x - ball.x, dy = mouse.y - ball.y;
  const ang = Math.atan2(dy, dx);
  const spd = MIN_SHOOT + power * (MAX_SHOOT - MIN_SHOOT);

  // Dotted trajectory preview — uses real physics so dots match actual flight
  let px = ball.x, py2 = ball.y;
  let pvx = Math.cos(ang) * spd, pvy = Math.sin(ang) * spd;
  const step = 0.022;
  let bounced = false;
  for (let i = 0; i < 48; i++) {
    pvy += GRAVITY * step;
    pvx *= Math.pow(AIR_DRAG, step * 60);
    px  += pvx * step;
    py2 += pvy * step;
    if (py2 >= GROUND_Y) {
      py2 = GROUND_Y;
      if (!bounced && Math.abs(pvy) > MIN_BOUNCE_V) {
        pvy = -Math.abs(pvy) * BOUNCE;
        pvx *= ROLL_FRIC;
        bounced = true;
      } else {
        // rolling — keep going but damp
        pvy = 0;
        pvx *= ROLL_FRIC;
      }
    }
    if (px > W + 10) break;
    const frac = i / 47;
    const r    = Math.max(0.5, 3.5 - frac * 2.5);
    const a    = Math.max(0, 0.6 - frac * 0.55);
    ctx.save(); ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px, py2, r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Arrow from ball
  ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ang);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.moveTo(BALL_R+10,0); ctx.lineTo(BALL_R+26,-6); ctx.lineTo(BALL_R+26,6); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawPowerBar() {
  if (state !== 'charging') return;
  const bw = 170, bh = 13;
  const bx = W/2 - bw/2, by = GROUND_Y + 22;

  // Track
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(bx - 4, by - 4, bw + 8, bh + 8, 8); ctx.fill();
  ctx.fillStyle = '#0d1a30';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 5); ctx.fill();

  // Fill with colour gradient based on power
  const col = power < 0.45 ? '#40cc70' : power < 0.78 ? '#f0c030' : '#e94560';
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.roundRect(bx, by, bw * power, bh, 5); ctx.fill();
  // Highlight
  ctx.save(); ctx.globalAlpha = 0.2; ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(bx, by, bw * power, bh / 2, [5,5,0,0]); ctx.fill();
  ctx.restore();

  // Label
  ctx.fillStyle = 'rgba(200,210,230,0.7)'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('POWER', W/2, by + bh + 14);
  ctx.textAlign = 'left';
}

function drawHUD() {
  const lev = LEVELS[levelIdx];

  // Level panel (top left)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(10, 10, 205, 54, 10); ctx.fill();
  ctx.fillStyle = '#6ab4c8'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`LEVEL ${levelIdx + 1} / ${LEVELS.length}`, 22, 27);
  ctx.fillStyle = '#e8eaf6'; ctx.font = 'bold 17px sans-serif';
  ctx.fillText(lev.name, 22, 49);

  // Shots remaining (top right)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(W - 145, 10, 135, 54, 10); ctx.fill();
  ctx.fillStyle = '#6ab4c8'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('SHOTS', W - 20, 27);
  // Mini ball icons for shots
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    const bx = W - 38 - i * 30, by2 = 40;
    ctx.save();
    ctx.globalAlpha = i < attempts ? 1.0 : 0.2;
    // Tiny ball
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bx, by2, 9, 0, Math.PI*2); ctx.fill();
    // Pentagon patches on mini ball
    ctx.fillStyle = '#1a1a2e';
    const patches2 = [[0,0],[3.8,-2.6],[-3.8,-2.6],[2.3,3.6],[-2.3,3.6]];
    for (const [pcx, pcy] of patches2) {
      ctx.beginPath();
      for (let k = 0; k < 5; k++) {
        const a3 = k/5*Math.PI*2 - Math.PI/2, rr = 2.2;
        k===0 ? ctx.moveTo(bx+pcx+Math.cos(a3)*rr, by2+pcy+Math.sin(a3)*rr)
              : ctx.lineTo(bx+pcx+Math.cos(a3)*rr, by2+pcy+Math.sin(a3)*rr);
      }
      ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(bx, by2, 9, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Score (top centre)
  if (totalScore > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(W/2 - 52, 10, 104, 36, 18); ctx.fill();
    ctx.fillStyle = '#f0c030'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`★ ${totalScore} pts`, W/2, 32);
  }

  // Tip
  ctx.fillStyle = 'rgba(180,200,220,0.25)';
  ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(lev.tip, W/2, H - 16);
  ctx.textAlign = 'left';
}

function drawToast() {
  if (toast.t <= 0) return;
  const fade = Math.min(toast.t * 4, (toast.dur - toast.t) * 5 + 0.5, 1);
  ctx.save(); ctx.globalAlpha = Math.max(0, fade);
  ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
  const tw = ctx.measureText(toast.msg).width + 52;
  const tx = W/2 - tw/2, ty = 76;
  ctx.fillStyle = 'rgba(6,10,22,0.92)';
  ctx.beginPath(); ctx.roundRect(tx, ty, tw, 36, 18); ctx.fill();
  ctx.strokeStyle = toast.color; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.roundRect(tx, ty, tw, 36, 18); ctx.stroke();
  ctx.fillStyle = toast.color;
  ctx.fillText(toast.msg, W/2, ty + 24);
  ctx.restore(); ctx.textAlign = 'left';
}

function drawFullPanel(title, lines, accentColor) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
  const pw = 360, ph = 56 + lines.length * 36 + 28;
  const px = (W - pw) / 2, py = (H - ph) / 2;
  ctx.fillStyle = '#080c1a';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.fill();
  ctx.strokeStyle = accentColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.stroke();
  ctx.fillStyle = accentColor; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(title, W/2, py + 46);
  ctx.fillStyle = '#c8d0e0'; ctx.font = '16px sans-serif';
  lines.forEach((l, i) => ctx.fillText(l, W/2, py + 82 + i * 36));
  ctx.fillStyle = '#404860'; ctx.font = '12px sans-serif';
  ctx.fillText('Click to play', W/2, py + ph - 12);
  ctx.textAlign = 'left';
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lastTs = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  // Pause / auto-advance timer
  if (pauseTimer > 0) {
    pauseTimer -= dt;
    if (pauseTimer <= 0 && pauseAction) {
      pauseAction(); pauseAction = null;
    }
  }

  // Charging: fill power
  if (state === 'charging') {
    power = Math.min(1, power + dt * 0.95);
  }

  // Obstacle animation (continues even while pausing, so players can see state)
  if (state === 'aiming' || state === 'charging' || state === 'flying' || state === 'pausing') {
    updateObs(dt);
  }

  // Ball physics
  if (state === 'flying') {
    updateBall(dt);
  }

  // Toast decay
  if (toast.t > 0) toast.t -= dt;

  // ── Draw ──────────────────────────────────────────────────────────────────
  ctx.drawImage(fieldCvs, 0, 0);
  drawGoal();

  for (const o of obs) drawObstacle(o);

  drawTrail();
  drawPlayer();
  drawBall();

  if (state === 'aiming' || state === 'charging') {
    drawAim();
    drawPowerBar();
  }

  drawHUD();
  drawToast();

  // Full-screen panels (only for menu / win / game over)
  if (state === 'menu') {
    drawFullPanel('SOCCER SHOOTER', [
      'Move mouse to aim',
      'Hold to charge power, release to shoot',
      `${LEVELS.length} levels  ·  obstacles  ·  3 shots per level`,
    ], '#00c8a0');
  } else if (state === 'gameover') {
    drawFullPanel('GAME OVER', [
      `Score: ${totalScore} pts`,
      'The defence held firm this time!',
    ], '#e94560');
  } else if (state === 'win') {
    drawFullPanel('YOU WIN! 🏆', [
      `All ${LEVELS.length} levels cleared!`,
      `Final score: ${totalScore} ★`,
    ], '#f0c030');
  }

  requestAnimationFrame(loop);
}

// ─── Kick off ─────────────────────────────────────────────────────────────────
// Do NOT call initLevel() here — it sets state='aiming' and would skip the menu.
// Just reset state variables so the menu draws correctly.
levelIdx = 0; attempts = MAX_ATTEMPTS; totalScore = 0;
obs = []; resetBall();
state = 'menu';
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
</body>
